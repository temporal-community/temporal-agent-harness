<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent · Live Enclosure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  /* "Instrument enclosure" telemetry view. Shares chat.html's dark palette so the
     two views read as one product, but the metaphor is physical: the AGENT is a
     sealed box. Messages arrive as SIGNALS from OUTSIDE and dock at the box's
     ingress port (they never wire straight into the model — what the agent does
     internally is its own business). The box renders ONLY what is happening right
     now: it EXPANDS to fit live tool calls and a momentary "what the model is
     doing" card (a thinking / citation chunk that lasts a single tick), and
     CONTRACTS back to just the model core when idle. Reply text streams out the
     egress port as packets. Lifecycle (idle / running / replied / error) is a
     STATUS BADGE on the box; an error floods the whole enclosure red.

     Everything the box shows is a pure function of the event prefix, so any
     prefix reconstructs exactly — which is what makes scrubbing / replay / jump-
     to-live correct. The view is also AGNOSTIC of any model SDK: opaque payloads
     (thought/annotation deltas) are rendered as plain JSON, never field-mined. */
  :root {
    --bg-base:       #131314;
    --bg-surface-1:  #1b1b1d;
    --bg-surface-2:  #1e1f20;
    --bg-surface-3:  #28292c;
    --bg-elevated:   #2d2e30;
    --border:        rgba(255, 255, 255, 0.08);
    --border-strong: rgba(255, 255, 255, 0.16);
    --text-primary:   #e3e3e3;
    --text-secondary: #9aa0a6;
    --text-tertiary:  #80868b;
    --accent:        #8ab4f8;
    --accent-hover:  #aecbfa;
    --success:       #81c995;
    --success-bg:    rgba(129, 201, 149, 0.16);
    --warning:       #fdd663;
    --warning-bg:    rgba(253, 214, 99, 0.16);
    --error:         #f28b82;
    --error-bg:      rgba(242, 139, 130, 0.14);
    --queue:         #c4a7f5;
    --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--mono);
    background:
      radial-gradient(circle at 1px 1px, rgba(255,255,255,0.045) 1px, transparent 0) 0 0 / 26px 26px,
      var(--bg-base);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ---- Header ------------------------------------------------------------ */
  header {
    display: flex; align-items: center; gap: 16px;
    padding: 12px 20px;
    background: linear-gradient(180deg, var(--bg-surface-1), rgba(27,27,29,0.78));
    border-bottom: 1px solid var(--border);
    flex-shrink: 0; backdrop-filter: blur(6px);
  }
  header h1 {
    font-size: 13px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase;
    display: flex; align-items: center; gap: 9px;
  }
  header h1 .glyph { color: var(--accent); font-size: 15px; }
  header h1 .dim { color: var(--text-tertiary); font-weight: 400; }
  header .nav-link {
    font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--text-tertiary); text-decoration: none;
    border: 1px solid var(--border); padding: 4px 10px; border-radius: 6px;
    transition: color .15s, border-color .15s;
  }
  header .nav-link:hover { color: var(--accent); border-color: var(--border-strong); }
  .spacer { flex: 1; }

  select#session {
    font-family: var(--mono); font-size: 12px;
    background: var(--bg-surface-3); color: var(--text-primary);
    border: 1px solid var(--border-strong); border-radius: 7px;
    padding: 7px 12px; cursor: pointer; max-width: 360px;
  }
  select#session:focus { outline: none; border-color: var(--accent); }

  .chip {
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    padding: 5px 11px; border-radius: 20px;
    background: var(--bg-surface-3); color: var(--text-tertiary);
    display: inline-flex; align-items: center; gap: 7px;
    border: 1px solid var(--border); white-space: nowrap;
  }
  .chip::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .chip.connected { color: var(--success); }
  .chip.streaming { color: var(--warning); }
  .chip.streaming::before { animation: blink 1s steps(2, start) infinite; }
  .chip.paused, .chip.playing { color: var(--queue); }
  @keyframes blink { 50% { opacity: 0.25; } }

  /* ---- Layout ------------------------------------------------------------ */
  main {
    flex: 1; overflow-y: auto; padding: 26px 24px 40px;
    display: flex; flex-direction: column; gap: 22px;
    max-width: 1240px; width: 100%; margin: 0 auto;
  }
  .panel {
    background: linear-gradient(180deg, var(--bg-surface-2), var(--bg-surface-1));
    border: 1px solid var(--border); border-radius: 14px;
    padding: 18px 20px 22px; position: relative;
  }
  .panel > .panel-title {
    font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--text-tertiary); margin-bottom: 18px;
    display: flex; align-items: center; gap: 8px;
  }
  .panel > .panel-title .rule { flex: 1; height: 1px; background: var(--border); }
  .turn-meta { color: var(--text-secondary); font-variant-numeric: tabular-nums; }

  /* ---- Per-agent panels ------------------------------------------------- */
  /* One .agent-view panel per agent in the merged stream. The root agent reads as before; each
     subagent gets its own panel as it appears. The panel-title carries the agent's label + short
     id; a stopped subagent dims and is tagged "ended" but is kept (history is never deleted). */
  #agents { display: flex; flex-direction: column; gap: 22px; }
  .agent-view { transition: opacity .3s; }
  .agent-view .panel-title .av-title { color: var(--text-secondary); font-weight: 700; }
  .agent-view .panel-title .av-id {
    color: var(--text-tertiary); letter-spacing: 1px; font-variant-numeric: tabular-nums;
  }
  /* The root/session agent reads as the primary view; subagents are visually subordinate. */
  .agent-view.subagent .av-title { color: var(--accent); }
  .agent-view.ended { opacity: 0.6; }
  .agent-view .panel-title .av-ended {
    color: var(--text-tertiary); border: 1px solid var(--border-strong); border-radius: 20px;
    padding: 2px 8px; letter-spacing: 1.5px;
  }
  .agent-view .panel-title .av-ended[hidden] { display: none; }
  /* "Degraded" = the stream merge couldn't load THIS subagent's own events (it emitted a
     synthetic subagent_stream_unavailable). Distinct from "ended" (a stopped subagent): the panel and
     its history stay visible, but a warning-toned badge marks that the detail is missing and a
     refresh would retry. Unobtrusive — just a tinted badge + faint warning border, no dimming. */
  .agent-view.degraded { border-color: color-mix(in srgb, var(--warning) 32%, var(--border)); }
  .agent-view .panel-title .av-degraded {
    color: var(--warning); border: 1px solid color-mix(in srgb, var(--warning) 45%, transparent);
    background: var(--warning-bg); border-radius: 20px; padding: 2px 8px; letter-spacing: 1px;
  }
  .agent-view .panel-title .av-degraded[hidden] { display: none; }

  /* ---- The stage: [ ingress | AGENT BOX | egress ] ---------------------- */
  /* Tone variables drive every coloured element from one source. */
  .tone-neutral { --tone: var(--text-secondary); }
  .tone-model   { --tone: var(--accent); }
  .tone-tools   { --tone: var(--warning); }
  .tone-done    { --tone: var(--success); }
  .tone-error   { --tone: var(--error); }
  .tone-queue   { --tone: var(--queue); }

  .stage {
    display: grid;
    grid-template-columns: minmax(160px, 220px) minmax(0, 1fr) minmax(120px, 168px);
    align-items: center; gap: 0;
    min-height: 240px;
  }

  /* ---- Ingress / egress lanes (OUTSIDE the box) ------------------------- */
  .lane { position: relative; height: 100%; display: flex; flex-direction: column; justify-content: center; gap: 8px; }
  .lane-cap {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; flex-direction: column; gap: 2px;
  }
  .egress .lane-cap { text-align: right; }
  .lane-tag { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text-tertiary); }
  .lane-sub { font-size: 10px; color: var(--text-secondary); font-variant-numeric: tabular-nums; }

  /* The trace is the wire the signal rides in on. Flowing dashes imply direction. */
  .trace {
    position: absolute; top: 50%; height: 2px; transform: translateY(-50%);
    background-image: repeating-linear-gradient(90deg, var(--border-strong) 0 7px, transparent 7px 14px);
    background-size: 28px 2px;
    opacity: 0.6; z-index: 0;
  }
  .ingress .trace { left: 0; right: -6px; }
  .egress  .trace { left: -6px; right: 0; }
  .stage.running .ingress .trace { animation: traceflow 1.1s linear infinite; }
  .stage.streaming-out .egress .trace { animation: traceflow .9s linear infinite; opacity: .9; }
  @keyframes traceflow { to { background-position: 28px 0; } }
  .trace::after {
    content: ""; position: absolute; top: 50%; right: -1px; width: 0; height: 0;
    transform: translateY(-50%);
    border-top: 5px solid transparent; border-bottom: 5px solid transparent;
    border-left: 8px solid var(--border-strong);
  }

  /* Momentary signal cards OUTSIDE the box: the incoming message on the ingress
     lane, the streaming reply deltas on the egress lane. */
  .msg-slot, .out-slot { position: relative; z-index: 1; }
  .msg-slot:empty, .out-slot:empty { display: none; }
  .msg-slot .act-card, .out-slot .act-card { width: 100%; }

  /* Queue = pending messages stacked OUTSIDE the box, each clickable. */
  .queue-stack {
    position: absolute; left: 0; bottom: 4px; z-index: 1;
    display: flex; flex-wrap: wrap-reverse; gap: 5px; max-width: 100%;
  }
  .q-chip {
    min-width: 26px; height: 16px; padding: 0 5px; border-radius: 3px; cursor: pointer;
    font-size: 8px; letter-spacing: .5px; color: var(--queue);
    display: inline-flex; align-items: center; justify-content: center;
    background: color-mix(in srgb, var(--queue) 22%, var(--bg-surface-3));
    border: 1px solid color-mix(in srgb, var(--queue) 55%, transparent);
    box-shadow: 0 0 6px color-mix(in srgb, var(--queue) 35%, transparent);
    transition: transform .15s;
  }
  .q-chip:hover { transform: translateY(-1px); }
  .q-chip.enter { animation: chipIn .35s cubic-bezier(.2,.9,.3,1.2); }
  @keyframes chipIn { from { opacity: 0; transform: translateX(-14px) scale(.7); } }

  /* A travelling signal packet, fired into / out of the box on a real transition. */
  .packet {
    position: absolute; top: 50%; width: 16px; height: 8px; border-radius: 2px;
    transform: translateY(-50%); pointer-events: none; z-index: 2;
    background: var(--accent); box-shadow: 0 0 12px var(--accent);
  }
  .packet.stream { width: 9px; height: 6px; background: var(--success); box-shadow: 0 0 9px var(--success); }
  .ingress .packet, .egress .packet { animation: packetTravel .62s cubic-bezier(.4,0,.2,1) forwards; }
  .egress  .packet.err { background: var(--error); box-shadow: 0 0 12px var(--error); }
  .egress  .packet.ok  { background: var(--success); box-shadow: 0 0 12px var(--success); }
  @keyframes packetTravel { 0% { left: 0; opacity: 0; } 12% { opacity: 1; } 100% { left: 100%; opacity: 0; } }

  /* Egress terminal — where the reply (or error) lands; clickable to read it. */
  .terminal {
    align-self: flex-end; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    padding: 6px 11px; border-radius: 7px; white-space: nowrap;
    background: var(--bg-surface-3); color: var(--text-tertiary);
    border: 1px solid var(--border);
    transition: color .25s, border-color .25s, background .25s, box-shadow .25s;
  }
  .terminal.lit {
    color: var(--tone); border-color: var(--tone); cursor: pointer;
    background: color-mix(in srgb, var(--tone) 16%, var(--bg-surface-3));
    box-shadow: 0 0 14px color-mix(in srgb, var(--tone) 45%, transparent);
  }

  /* ---- THE AGENT ENCLOSURE ---------------------------------------------- */
  .agent-enclosure {
    position: relative;
    margin: 0 4px;
    border: 1.5px solid var(--border-strong); border-radius: 16px;
    background: linear-gradient(180deg, var(--bg-surface-3), var(--bg-surface-2));
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.04),
      0 18px 40px rgba(0,0,0,0.45);
    overflow: hidden;
    transition: border-color .3s, box-shadow .3s, background .3s;
  }
  /* corner registration brackets — instrument-panel detail */
  .agent-enclosure::before, .agent-enclosure::after {
    content: ""; position: absolute; width: 13px; height: 13px;
    border: 1.5px solid var(--border-strong); opacity: .7; pointer-events: none; z-index: 2;
  }
  .agent-enclosure::before { top: 9px; left: 9px; border-right: 0; border-bottom: 0; }
  .agent-enclosure::after  { bottom: 9px; right: 9px; border-left: 0; border-top: 0; }

  .agent-enclosure.running {
    border-color: color-mix(in srgb, var(--accent) 55%, var(--border-strong));
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.05),
      0 0 0 1px color-mix(in srgb, var(--accent) 30%, transparent),
      0 18px 46px rgba(0,0,0,0.5),
      0 0 50px color-mix(in srgb, var(--accent) 14%, transparent);
  }
  .agent-enclosure.replied {
    border-color: color-mix(in srgb, var(--success) 60%, var(--border-strong));
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.05),
      0 0 0 1px color-mix(in srgb, var(--success) 32%, transparent),
      0 18px 46px rgba(0,0,0,0.5),
      0 0 50px color-mix(in srgb, var(--success) 16%, transparent);
  }
  /* Error floods the whole box red. */
  .agent-enclosure.error {
    border-color: var(--error);
    background: linear-gradient(180deg, color-mix(in srgb, var(--error) 12%, var(--bg-surface-3)), var(--bg-surface-2));
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.04),
      0 0 0 1px color-mix(in srgb, var(--error) 45%, transparent),
      0 18px 46px rgba(0,0,0,0.5),
      0 0 56px color-mix(in srgb, var(--error) 22%, transparent);
  }

  /* scanline only sweeps while the box is actively running */
  .scanline {
    position: absolute; left: 0; right: 0; top: 0; height: 2px; pointer-events: none; z-index: 1;
    background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--accent) 70%, transparent), transparent);
    opacity: 0;
  }
  .agent-enclosure.running .scanline { animation: scan 2.6s linear infinite; }
  @keyframes scan { 0% { top: 0; opacity: 0; } 8% { opacity: .8; } 92% { opacity: .8; } 100% { top: 100%; opacity: 0; } }

  /* Ingress / egress ports — notches on the box edges where signals dock. */
  .port {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 9px; height: 34px; border-radius: 3px;
    background: var(--bg-surface-1); border: 1.5px solid var(--border-strong);
    z-index: 3;
  }
  .port-in  { left: -5px; }
  .port-out { right: -5px; }
  .port.flash {
    border-color: var(--accent);
    box-shadow: 0 0 14px var(--accent), inset 0 0 8px color-mix(in srgb, var(--accent) 50%, transparent);
    animation: portflash .7s ease-out;
  }
  .port-out.flash.ok  { border-color: var(--success); box-shadow: 0 0 14px var(--success); }
  .port-out.flash.err { border-color: var(--error);   box-shadow: 0 0 14px var(--error); }
  @keyframes portflash { 0% { transform: translateY(-50%) scaleY(1.35); } 100% { transform: translateY(-50%) scaleY(1); } }

  /* Header strip of the box: identity + the lifecycle status badge. */
  .agent-head {
    display: flex; align-items: center; gap: 14px;
    padding: 13px 18px; border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent);
  }
  .agent-name {
    font-size: 12px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 8px; color: var(--text-secondary);
  }
  .agent-name .glyph { color: var(--accent); font-size: 14px; }

  .status-badge {
    margin-left: auto;
    font-size: 10px; letter-spacing: 1.6px; text-transform: uppercase; font-weight: 700;
    padding: 6px 13px; border-radius: 20px; white-space: nowrap;
    display: inline-flex; align-items: center; gap: 8px;
    border: 1px solid var(--border); background: var(--bg-surface-1);
    color: var(--text-tertiary);
    transition: color .25s, border-color .25s, background .25s, box-shadow .25s;
  }
  .status-badge::before {
    content: ""; width: 8px; height: 8px; border-radius: 50%; background: currentColor;
    box-shadow: 0 0 9px currentColor;
  }
  .status-badge.running {
    color: var(--accent); border-color: color-mix(in srgb, var(--accent) 50%, transparent);
    background: color-mix(in srgb, var(--accent) 14%, var(--bg-surface-1));
  }
  .status-badge.running::before { animation: blink 1.1s steps(2, start) infinite; }
  .status-badge.replied {
    color: var(--success); border-color: color-mix(in srgb, var(--success) 50%, transparent);
    background: var(--success-bg);
  }
  .status-badge.error {
    color: var(--error); border-color: color-mix(in srgb, var(--error) 60%, transparent);
    background: var(--error-bg);
  }

  /* Box interior: collapses to just the model core when idle, expands with a
     momentary "model doing" card and live tool cards. */
  .agent-body {
    display: flex; gap: 14px; align-items: stretch;
    padding: 16px;
  }
  .core-col { display: flex; flex-direction: column; gap: 9px; flex-shrink: 0; }
  .think-bay:empty { display: none; }

  .model-core {
    width: 132px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    border-radius: 12px; padding: 13px 10px;
    border: 1.5px solid var(--border-strong);
    background: radial-gradient(circle at 50% 38%, var(--bg-elevated), var(--bg-surface-2));
    color: var(--text-tertiary);
    transition: color .25s, border-color .25s, box-shadow .25s, background .25s;
  }
  .model-core .mc-glyph { font-size: 24px; line-height: 1; }
  .model-core .mc-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
  /* When the label holds an actual model id (during an interaction) it can be long and
     hyphenated — drop the wide tracking/uppercasing so it fits the 132px core and wraps. */
  .model-core .mc-label.mc-model { font-size: 10px; letter-spacing: 0.3px; text-transform: none; word-break: break-word; text-align: center; }
  .model-core .mc-sub   { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-tertiary); text-align: center; line-height: 1.4; word-break: break-word; }
  /* Clickable once an interaction has ended and the core is showing its token usage. */
  .model-core.clickable { cursor: pointer; }
  .model-core.clickable:hover { border-color: var(--accent); }
  /* Exactly two states: dormant, or a STEADY bright highlight held for every tick
     inside a model_interaction_started → model_interaction_ended bracket. No
     pulsing — the highlight reflects only whether the model is mid-interaction. */
  .model-core.active {
    color: var(--accent); border-color: var(--accent);
    background: radial-gradient(circle at 50% 38%, color-mix(in srgb, var(--accent) 26%, var(--bg-elevated)), var(--bg-surface-2));
    box-shadow: 0 0 30px color-mix(in srgb, var(--accent) 34%, transparent),
                inset 0 0 18px color-mix(in srgb, var(--accent) 12%, transparent);
  }
  .model-core.active .mc-sub { color: var(--accent); }
  .agent-enclosure.error .model-core { border-color: color-mix(in srgb, var(--error) 50%, var(--border-strong)); }

  /* The tool bay — a flexible spacer that grows the box with concurrent calls. */
  .tool-bay {
    flex: 1; min-width: 0;
    display: flex; flex-wrap: wrap; align-content: flex-start; gap: 10px;
    padding: 4px; border-radius: 10px;
    border: 1px dashed transparent;
    position: relative;
    transition: border-color .25s, background .25s;
  }
  .tool-bay.active { border-color: var(--border); background: rgba(0,0,0,0.12); }

  /* ---- Activity cards (tool / thinking / message) — clickable to inspect -- */
  .act-card {
    width: 138px; flex: 0 0 auto;
    border-radius: 9px; padding: 9px 11px;
    border: 1.5px solid var(--tone);
    background: color-mix(in srgb, var(--tone) 13%, var(--bg-surface-2));
    transition: border-color .25s, background .25s, box-shadow .25s, transform .18s;
    transform-origin: center; position: relative; cursor: pointer;
  }
  .act-card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,.4), 0 0 0 1px var(--tone); }
  .act-card .ac-head { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; }
  .act-card .ac-name { font-size: 11px; font-weight: 700; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .act-card .ac-id   { font-size: 9px; color: var(--text-tertiary); margin-left: auto; flex-shrink: 0; }
  .act-card .ac-state {
    font-size: 8.5px; letter-spacing: 1.4px; text-transform: uppercase; color: var(--tone);
    display: flex; align-items: center; gap: 6px;
  }
  .act-card .ac-state::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--tone); flex-shrink: 0; }
  .act-card .ac-preview {
    margin-top: 6px; font-size: 9.5px; line-height: 1.35; color: var(--text-secondary);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; word-break: break-word;
  }
  .act-card .ac-expand {
    position: absolute; top: 7px; right: 8px; font-size: 10px; color: var(--text-tertiary);
    opacity: 0; transition: opacity .18s;
  }
  .act-card:hover .ac-expand { opacity: .9; }
  .act-card.running { box-shadow: 0 0 0 1px color-mix(in srgb, var(--tone) 35%, transparent); animation: toolrun 1.3s ease-in-out infinite; }
  @keyframes toolrun {
    0%, 100% { box-shadow: 0 0 4px color-mix(in srgb, var(--tone) 35%, transparent); }
    50%      { box-shadow: 0 0 16px color-mix(in srgb, var(--tone) 70%, transparent); }
  }
  .act-card.running .ac-state::before { animation: blink 1s steps(2, start) infinite; }
  .act-card.enter { animation: cardIn .34s cubic-bezier(.2,.9,.3,1.2); }
  @keyframes cardIn { from { opacity: 0; transform: scale(.7) translateY(8px); } }
  .act-card.ping { animation: cardPing .5s ease-out; }
  @keyframes cardPing { 0%,100% { box-shadow: 0 0 4px var(--tone); } 45% { box-shadow: 0 0 18px var(--tone); } }
  .act-card.returning { box-shadow: 0 0 22px var(--tone); transform: scale(1.04); }
  .act-card.leaving { animation: cardOut .5s ease-in forwards; }
  @keyframes cardOut { to { opacity: 0; transform: scale(.62); } }

  /* ---- Inspector overlay (click a card / chip / terminal to read it) ----- */
  .inspector { position: fixed; inset: 0; z-index: 50; display: none; }
  .inspector.open { display: block; }
  .insp-backdrop { position: absolute; inset: 0; background: rgba(8,8,9,0.62); backdrop-filter: blur(2px); }
  .insp-panel {
    position: absolute; top: 0; right: 0; height: 100%; width: min(440px, 92vw);
    background: linear-gradient(180deg, var(--bg-surface-2), var(--bg-surface-1));
    border-left: 1px solid var(--border-strong);
    box-shadow: -18px 0 50px rgba(0,0,0,0.5);
    display: flex; flex-direction: column;
    animation: drawerIn .26s cubic-bezier(.2,.8,.3,1);
  }
  @keyframes drawerIn { from { transform: translateX(28px); opacity: 0; } }
  .insp-head {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .insp-title { font-size: 13px; font-weight: 700; letter-spacing: 1px; color: var(--text-primary); }
  .insp-state {
    font-size: 9px; letter-spacing: 1.4px; text-transform: uppercase; color: var(--tone);
    border: 1px solid var(--tone); border-radius: 20px; padding: 3px 9px;
  }
  .insp-close {
    margin-left: auto; width: 28px; height: 28px; border-radius: 6px;
    border: 1px solid var(--border-strong); background: var(--bg-surface-3);
    color: var(--text-secondary); cursor: pointer; font-size: 13px; line-height: 1;
  }
  .insp-close:hover { color: var(--accent); border-color: var(--accent); }
  .insp-body { padding: 16px 18px 26px; overflow-y: auto; }
  .insp-section { margin-bottom: 18px; }
  .insp-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 7px; }
  .insp-pre {
    font-family: var(--mono); font-size: 11.5px; line-height: 1.5; color: var(--text-primary);
    background: var(--bg-base); border: 1px solid var(--border); border-radius: 8px;
    padding: 11px 13px; white-space: pre-wrap; word-break: break-word; max-height: 360px; overflow-y: auto;
  }

  /* ---- History scrubber + transport controls --------------------------- */
  .scrubber {
    display: flex; align-items: center; gap: 10px;
    margin-top: 22px; padding-top: 16px; border-top: 1px solid var(--border);
  }
  .ctrl-btn {
    font-family: var(--mono); font-size: 13px; line-height: 1;
    width: 34px; height: 30px; flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 7px; border: 1px solid var(--border-strong);
    background: var(--bg-surface-3); color: var(--text-secondary); cursor: pointer;
    transition: color .15s, border-color .15s, background .15s;
  }
  .ctrl-btn:hover:not(:disabled) { color: var(--accent); border-color: var(--accent); }
  .ctrl-btn:disabled { opacity: .35; cursor: default; }
  .ctrl-btn.active { color: var(--queue); border-color: color-mix(in srgb, var(--queue) 45%, transparent); }
  /* Taller than a bare slider so the usage chart has room ABOVE the track. The track,
     the chart's baseline, and the turn-ticks all share one bottom line (~10px up, leaving
     room for the thumb's lower half), so the area grows UP from the timeline. */
  .scrub-wrap { position: relative; flex: 1; height: 46px; }
  .turn-ticks { position: absolute; left: 0; right: 0; bottom: 2px; top: auto; height: 16px; pointer-events: none; z-index: 2; }
  .turn-tick {
    position: absolute; top: 50%; transform: translate(-50%, -50%);
    width: 3px; height: 16px; border-radius: 1.5px; pointer-events: auto; cursor: pointer;
    background: var(--queue); box-shadow: 0 0 6px color-mix(in srgb, var(--queue) 60%, transparent);
    opacity: .75; transition: opacity .15s, height .15s;
  }
  .turn-tick:hover { opacity: 1; height: 20px; }
  .live-btn {
    font-family: var(--mono); font-size: 10px; letter-spacing: 1.2px;
    text-transform: uppercase; white-space: nowrap; flex-shrink: 0;
    /* Fixed width sized for the wider "○ JUMP TO LIVE" label (~100px of monospace glyphs
       + letter-spacing, plus padding) so the timeline doesn't resize when the button
       toggles to the shorter "● LIVE". Flex-center the label within that fixed box. */
    width: 134px; box-sizing: border-box;
    display: inline-flex; align-items: center; justify-content: center;
    padding: 7px 12px; border-radius: 7px;
    border: 1px solid var(--border-strong); background: var(--bg-surface-3);
    color: var(--text-tertiary); cursor: pointer;
    transition: color .15s, border-color .15s, background .15s;
  }
  .live-btn.following {
    color: var(--success); cursor: default;
    border-color: color-mix(in srgb, var(--success) 45%, transparent);
    background: var(--success-bg);
  }
  .live-btn:not(.following):hover { color: var(--accent); border-color: var(--border-strong); }
  /* Fixed-width readout so the slider never resizes as you scrub. The event
     TYPE is intentionally NOT shown here — it is legible in the animation above. */
  .scrub-readout {
    font-size: 11px; color: var(--text-secondary); white-space: nowrap;
    width: 118px; text-align: right; font-variant-numeric: tabular-nums; flex-shrink: 0;
  }
  input[type=range].scrub {
    position: absolute; left: 0; right: 0; bottom: 8px; width: 100%; z-index: 3;
    -webkit-appearance: none; appearance: none;
    height: 4px; border-radius: 3px; background: color-mix(in srgb, var(--bg-surface-3) 78%, transparent);
    outline: none; cursor: pointer;
  }
  input[type=range].scrub:disabled { opacity: .4; cursor: default; }
  input[type=range].scrub:focus { box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 35%, transparent); }
  input[type=range].scrub::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); border: 2px solid var(--bg-base); box-shadow: 0 0 0 1px var(--accent);
    position: relative; z-index: 2;
  }
  input[type=range].scrub::-moz-range-thumb {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); border: 2px solid var(--bg-base);
  }

  /* ---- Token usage: a per-agent top strip (per-model totals) ------------- */
  /* A flat strip at the top of an agent's own panel (one usage bar per agent), showing the
     per-model totals for that agent. Flush to the panel's top edge, divided from the runtime
     stage below by a hairline. */
  .usage-bar {
    display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
    margin: -4px -4px 14px; padding: 0 0 12px;
    border-bottom: 1px solid var(--border);
  }
  .usage-bar-label { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text-tertiary); }
  .usage-readout { margin-left: auto; color: var(--text-secondary); font-size: 11px; font-variant-numeric: tabular-nums; }
  .model-usage { display: flex; flex-wrap: wrap; gap: 8px; }
  .model-usage:empty { display: none; }
  .mu-chip {
    display: flex; flex-direction: column; gap: 2px;
    border: 1px solid var(--border); border-radius: 9px; padding: 6px 10px;
    background: var(--bg-elevated);
  }
  .mu-model { font-size: 12px; font-weight: 600; color: var(--accent); }
  .mu-stats { font-size: 11px; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
  .mu-stats.mu-calls { color: var(--text-tertiary); }

  /* ---- Token-usage area chart, overlaid behind the scrub track ----------- */
  /* Absolutely fills .scrub-wrap so its x-axis is EXACTLY the timeline's width — every
     column lines up 1:1 with a scrub position. Behind the slider (z-index 1) and
     pointer-transparent so dragging the slider still works; hover is handled on the wrap. */
  /* Baseline (svg bottom) sits on the track line at 10px up, so the area's flat base IS
     the timeline; it rises 34px toward the top of the 46px wrap.
     NOTE: the height MUST be an explicit pixel value, not `auto`. An inline SVG with
     `height:auto` derives its height from the viewBox's intrinsic ratio (cols:100), so a
     short session (few columns) computes an enormous height and shoots off the bottom of
     the page. With preserveAspectRatio="none" the viewBox stretches to fill this fixed box,
     so x still lines up 1:1 with the track. */
  .usage-chart {
    position: absolute; left: 0; right: 0; bottom: 10px; width: 100%; height: 34px;
    z-index: 1; pointer-events: none; overflow: visible;
  }
  .usage-chart .uc-area { fill: color-mix(in srgb, var(--accent) 20%, transparent); }
  .usage-chart .uc-line { fill: none; stroke: var(--accent); stroke-width: 1.5; opacity: 0.85; }
  /* Hover summary card — floats above the track, follows the cursor's x. */
  .usage-tip {
    position: absolute; bottom: calc(100% + 8px); z-index: 20; pointer-events: none;
    transform: translateX(-50%); white-space: nowrap;
    background: var(--bg-elevated); border: 1px solid var(--border-strong); border-radius: 8px;
    padding: 7px 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .usage-tip[hidden] { display: none; }
  .usage-tip .ut-model { font-size: 12px; font-weight: 600; color: var(--accent); }
  .usage-tip .ut-stats { font-size: 11px; color: var(--text-secondary); font-variant-numeric: tabular-nums; margin-top: 2px; }
  .usage-tip .ut-empty { font-size: 11px; color: var(--text-tertiary); }

  /* ---- Legend ----------------------------------------------------------- */
  #legend { display: flex; flex-wrap: wrap; gap: 8px 18px; }
  .legend-item {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 10px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-secondary);
  }
  .legend-swatch { width: 11px; height: 11px; border-radius: 3px; border: 1.5px solid var(--tone); background: color-mix(in srgb, var(--tone) 22%, transparent); }

  /* ---- Live HITL approvals (developer override surface) ----------------- */
  /* A floating panel, deliberately decoupled from the scrubber: it tracks tool
     calls awaiting approval at the LIVE head and resolves them via /api/approve,
     so a developer can drive human-in-the-loop without building their own UI. */
  .live-approvals {
    position: fixed; right: 18px; bottom: 18px; z-index: 60;
    width: 348px; max-height: 72vh; overflow-y: auto;
    background: var(--bg-elevated); border: 1px solid var(--border-strong);
    border-radius: 12px; box-shadow: 0 12px 44px rgba(0,0,0,0.55); padding: 12px 14px;
  }
  .live-approvals[hidden] { display: none; }
  .la-head {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    font-size: 11px; letter-spacing: 0.7px; text-transform: uppercase; color: var(--warning);
  }
  .la-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--warning); box-shadow: 0 0 8px var(--warning); }
  .la-count { margin-left: auto; color: var(--text-secondary); letter-spacing: 0; text-transform: none; }
  .la-item { border: 1px solid var(--border); border-radius: 9px; padding: 9px 10px; margin-bottom: 9px;
             background: color-mix(in srgb, var(--warning) 8%, transparent); }
  .la-item:last-child { margin-bottom: 0; }
  .la-name { font-weight: 600; font-size: 13px; }
  .la-id { color: var(--text-secondary); font-size: 11px; margin-left: 6px; font-variant-numeric: tabular-nums; }
  .la-input { font-size: 11px; color: var(--text-secondary); margin: 5px 0 7px; word-break: break-word; }
  .la-reason {
    width: 100%; box-sizing: border-box; font: inherit; font-size: 11px; padding: 4px 7px; margin-bottom: 7px;
    background: var(--bg-surface-3); color: var(--text-primary); border: 1px solid var(--border); border-radius: 6px;
  }
  .la-reason:focus { outline: none; border-color: var(--accent); }
  .la-actions { display: flex; flex-wrap: wrap; gap: 6px; }
  .la-actions button {
    font: inherit; font-size: 11px; padding: 4px 9px; border-radius: 6px; cursor: pointer;
    border: 1px solid var(--border); background: var(--bg-surface-3); color: var(--text-primary);
  }
  .la-actions button.la-approve { border-color: var(--accent); color: var(--accent); }
  .la-actions button.la-approve:hover { background: color-mix(in srgb, var(--accent) 18%, transparent); }
  .la-actions button.la-remember { border-color: var(--accent); color: var(--accent); opacity: 0.82; }
  .la-actions button.la-remember:hover { opacity: 1; background: color-mix(in srgb, var(--accent) 18%, transparent); }
  .la-actions button.la-deny:hover { background: var(--error-bg); color: var(--error); }
  .la-actions button:disabled { opacity: 0.5; cursor: default; }
  .la-error { color: var(--error); font-size: 11px; margin-top: 6px; }

  @media (max-width: 720px) {
    .live-approvals { left: 12px; right: 12px; width: auto; }
    .stage { grid-template-columns: 1fr; gap: 18px; }
    .lane { height: 70px; }
    .trace, .port { display: none; }
    .agent-body { flex-direction: column; }
    .model-core { width: auto; flex-direction: row; gap: 12px; }
    .insp-panel { width: 100vw; }
  }

  @media (prefers-reduced-motion: reduce) { * { animation: none !important; } .status-badge.running::before { opacity: 1; } }
</style>
</head>
<body>

<header>
  <h1><span class="glyph">◈</span> Agent <span class="dim">/</span> Live Enclosure</h1>
  <a class="nav-link" href="/">Chat ↗</a>
  <div class="spacer"></div>
  <select id="session"><option value="">— no sessions —</option></select>
  <span id="status" class="chip">connecting</span>
</header>

<main>
  <!-- One panel per agent. The merged stream now interleaves the root session agent's events
       with every subagent it drives (recursively); the page grows a new panel the first time it
       sees a never-before-seen agent_id, and routes each event to the matching panel by agent_id.
       The root agent's panel is created on session switch; subagents' panels appear as they start.
       Each agent owns its OWN event log, scrubber, usage analytics, and render state. -->
  <div id="agents"></div>
  <section class="panel" style="padding:14px 20px;"><div id="legend"></div></section>
</main>

<!-- Per-agent panel template, cloned by createAgentView. Holds everything that was a single
     static view before: the per-model token usage bar, the runtime stage (ingress | box | egress),
     and the history scrubber. IDs that used to be unique now live on classes (the factory resolves
     them within the cloned subtree), so N agents can coexist. -->
<template id="agent-view-tpl">
  <section class="panel agent-view">
    <!-- Per-model token-usage totals for THIS agent — one chip per model it used. Hidden until
         this agent completes its first model interaction. -->
    <div class="usage-bar" hidden>
      <span class="usage-bar-label">Tokens</span>
      <div class="model-usage"></div>
      <span class="usage-readout"></span>
    </div>

    <div class="panel-title">
      <span class="av-title">Agent runtime</span>
      <span class="av-id"></span>
      <span class="av-ended" hidden>ended</span>
      <span class="av-degraded" hidden title="The stream merge couldn't load this subagent's own events.">subagent detail unavailable — refresh to retry</span>
      <span class="rule"></span>
      <span class="turn-meta"></span>
    </div>

    <div class="stage">
      <!-- INGRESS: signals arrive from outside and dock at the box's left port -->
      <div class="lane ingress">
        <div class="lane-cap">
          <span class="lane-tag">Ingress</span>
          <span class="lane-sub queue-readout">idle</span>
        </div>
        <div class="trace"></div>
        <div class="msg-slot"></div>
        <div class="queue-stack"></div>
      </div>

      <!-- THE AGENT, as a box that renders only what's happening right now -->
      <div class="agent-enclosure">
        <div class="scanline"></div>
        <div class="port port-in"></div>
        <div class="port port-out"></div>
        <div class="agent-head">
          <span class="agent-name"><span class="glyph">◈</span> <span class="av-name">Agent</span></span>
          <span class="status-badge agent-status">—</span>
        </div>
        <div class="agent-body">
          <div class="core-col">
            <div class="model-core">
              <span class="mc-glyph">▣</span>
              <span class="mc-label model-label">Model</span>
              <span class="mc-sub model-sub">dormant</span>
            </div>
            <div class="think-bay"></div>
          </div>
          <div class="tool-bay"></div>
        </div>
      </div>

      <!-- EGRESS: the reply (or error) leaves through the right port -->
      <div class="lane egress">
        <div class="lane-cap">
          <span class="lane-tag">Egress</span>
          <span class="lane-sub egress-readout">—</span>
        </div>
        <div class="trace"></div>
        <div class="out-slot"></div>
        <div class="terminal egress-terminal">reply</div>
      </div>
    </div>

    <div class="scrubber">
      <button class="ctrl-btn prev-turn" title="Jump to previous turn" disabled>⏮</button>
      <button class="ctrl-btn play-btn" title="Play from here" disabled>▶</button>
      <!-- The token-usage area chart is laid directly BEHIND the scrub track (exact same
           width), so the curve has a 1:1 x-correspondence with timeline clicks: the slider
           thumb is itself the position cursor. Hover anywhere over the track for a per-
           interaction summary card. -->
      <div class="scrub-wrap">
        <svg class="usage-chart" preserveAspectRatio="none" viewBox="0 0 1 100" aria-hidden="true"></svg>
        <input class="scrub" type="range" min="0" max="0" value="0" step="1" disabled
               aria-label="Scrub through agent history">
        <div class="turn-ticks"></div>
        <div class="usage-tip" hidden></div>
      </div>
      <button class="ctrl-btn next-turn" title="Skip to next turn" disabled>⏭</button>
      <span class="scrub-readout">no events</span>
      <button class="live-btn following" title="Jump to the live tail">● LIVE</button>
    </div>
  </section>
</template>

<!-- Live HITL approvals (developer override) — only shown when calls are pending -->
<div class="live-approvals" id="live-approvals" hidden></div>

<!-- Inspector drawer -->
<div class="inspector" id="inspector">
  <div class="insp-backdrop" id="insp-backdrop"></div>
  <div class="insp-panel">
    <div class="insp-head">
      <span class="insp-title" id="insp-title">—</span>
      <span class="insp-state tone-neutral" id="insp-state"></span>
      <button class="insp-close" id="insp-close" title="Close (Esc)">✕</button>
    </div>
    <div class="insp-body" id="insp-body"></div>
  </div>
</div>

<script>
"use strict";

/* ===========================================================================
 * 1. PROTOCOL MODEL — the single, declarative source of truth.
 *
 * Mirrors harness/agent_protocol/events.py (AgentEventType). The box renders the
 * agent's CURRENT activity only — a state that is purely a function of the event
 * prefix (status, turn number, queued messages, the live tool set, and ONE
 * momentary "model is doing X" card that lasts a single tick). Because of that,
 * any prefix reconstructs exactly, which is what keeps scrubbing / replay /
 * jump-to-live correct (see §6). The renderer treats opaque payloads (thought /
 * annotation deltas) as JSON — it knows nothing about any model SDK.
 *
 *   toolMachine — ONE tool call's lifecycle (requested → running → done/failed).
 *     Each live tool card morphs through these states; its tone comes from here.
 * =========================================================================== */

const PROTOCOL_EVENTS = [
  "message_queued", "turn_started", "turn_end",
  "model_interaction_started", "model_interaction_ended",
  "tool_requested", "tool_approval_requested", "tool_approval_resolved",
  "tool_start", "tool_progress_delta", "tool_end", "tool_error",
  // Subagent lifecycle — published BY THE PARENT, naming a child (subagent_id). The merged
  // stream interleaves these with the parent's events and the child's own events.
  "subagent_started", "subagent_stopped", "subagent_message_sent", "subagent_reply_received",
  // subagent_stream_unavailable is SYNTHESIZED CLIENT-SIDE by the stream merge (never workflow-published)
  // when it gives up reading a subagent's own stream. Its agent_id == subagent_id, so it routes to
  // the affected subagent's panel and marks that panel degraded (detail missing — refresh to retry).
  "subagent_stream_unavailable",
  "reply_delta", "thought_summary", "text_annotation",
  "reply", "error",
];

const toolMachine = {
  initial: "requested",
  states: {
    requested: { label: "requested", tone: "neutral" },
    awaiting:  { label: "awaiting approval", tone: "queue" },
    approved:  { label: "approved",  tone: "tools" },
    running:   { label: "running",   tone: "tools" },
    done:      { label: "done",      tone: "done" },
    failed:    { label: "failed",    tone: "error" },
    denied:    { label: "denied",    tone: "error" },
  },
};
const toneOf = (state) => toolMachine.states[state].tone;

// The card label for a resolved approval, built ONLY from the event's own fields
// (``approved`` + the harness-supplied ``reason`` + ``remember``). The reason string
// itself conveys provenance (e.g. "auto-approved by updated policy", "agent closed before
// approval") — we surface it verbatim and never infer a category the event didn't send.
// ``remember`` marks an "approve, and don't ask again" decision (tool now allow-listed).
function resolutionText(approved, reason, remember) {
  const verb = approved ? "approved" : "denied";
  let t = reason ? `${verb} · ${reason}` : verb;
  if (remember) t += " · remembered";
  return t;
}

// Documentation-honesty guard: every protocol event must be handled by the
// driver, and the driver must not invent events the protocol doesn't define.
const DRIVEN_EVENTS = new Set([
  "message_queued", "turn_started", "turn_end",
  "model_interaction_started", "model_interaction_ended",
  "tool_requested", "tool_approval_requested", "tool_approval_resolved",
  "tool_start", "tool_progress_delta", "tool_end", "tool_error",
  "subagent_started", "subagent_stopped", "subagent_message_sent", "subagent_reply_received",
  "subagent_stream_unavailable",
  "reply_delta", "thought_summary", "text_annotation", "reply", "error",
]);
(function assertDriverMirrorsProtocol() {
  for (const ev of DRIVEN_EVENTS)
    if (!PROTOCOL_EVENTS.includes(ev)) console.warn(`[protocol drift] driver handles event not in AgentEventType: ${ev}`);
  for (const ev of PROTOCOL_EVENTS)
    if (!DRIVEN_EVENTS.has(ev)) console.warn(`[protocol drift] AgentEventType not handled by driver: ${ev}`);
})();

/* ===========================================================================
 * 2. DOM HELPERS
 * =========================================================================== */

function el(tag, attrs, kids) {
  const n = document.createElement(tag);
  for (const k in (attrs || {})) {
    if (k === "class") n.className = attrs[k];
    else if (k === "onclick") n.addEventListener("click", attrs[k]);
    else if (attrs[k] != null) n.setAttribute(k, attrs[k]);
  }
  if (kids != null) {
    if (typeof kids === "string") n.textContent = kids;
    else for (const c of kids) if (c != null) n.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return n;
}
function flash(node, cls, ms, extra) {
  node.classList.remove(cls, ...(extra || []));
  void node.offsetWidth;                       // restart the animation
  node.classList.add(cls, ...(extra || []));
  setTimeout(() => node.classList.remove(cls, ...(extra || [])), ms);
}

// --- Exit-animation registry ------------------------------------------------
// Disappear animations run on timers, but ticks can arrive far faster than the
// timer (initial catch-up once `replaying` flips, or holding the arrow key to
// scrub). On a fixed timer those fades would outlive their tick and pile up, so
// the box would show more concurrent activity than was ever really live. Every
// timed node-removal registers here; finalizeExits() force-completes them — an
// exit that began on one tick is therefore always gone before the next tick ends.
const pendingExits = new Set();
function scheduleExit(node, totalMs, { phases = [], onDone } = {}) {
  const timers = [];
  const finalize = () => {
    if (!pendingExits.delete(finalize)) return;  // already finalized
    timers.forEach(clearTimeout);
    node.remove();
    if (onDone) onDone();
  };
  for (const ph of phases) timers.push(setTimeout(() => node.classList.add(ph.class), ph.at));
  timers.push(setTimeout(finalize, totalMs));
  pendingExits.add(finalize);
}
function finalizeExits() { for (const f of [...pendingExits]) f(); }
// One-line, SDK-agnostic preview for an opaque payload: a string as-is, anything
// else as compact JSON. Truncated for the card; the inspector shows it in full.
function previewOf(value, max = 90) {
  const s = typeof value === "string" ? value : JSON.stringify(value);
  if (!s) return "—";
  return s.length > max ? s.slice(0, max) + "…" : s;
}

/* ===========================================================================
 * 3. THE INSPECTOR — a drawer that renders a snapshot as plain text / JSON.
 * A snapshot is { title, state, tone, id?, sections: [{label, value}] } where a
 * string value renders as text and anything else as pretty JSON. No SDK shapes.
 * =========================================================================== */

const inspector = document.getElementById("inspector");
const inspTitle  = document.getElementById("insp-title");
const inspState  = document.getElementById("insp-state");
const inspBody   = document.getElementById("insp-body");

function inspSection(label, value) {
  if (value == null || value === "") return null;
  if (typeof value === "object" && !Array.isArray(value) && Object.keys(value).length === 0) return null;
  if (Array.isArray(value) && value.length === 0) return null;
  const text = typeof value === "string" ? value : JSON.stringify(value, null, 2);
  return el("div", { class: "insp-section" }, [
    el("div", { class: "insp-label" }, label),
    el("pre", { class: "insp-pre" }, text),
  ]);
}
function openInspector(snap) {
  if (!snap) return;
  inspTitle.textContent = snap.title || "Detail";
  inspState.textContent = snap.state || "";
  inspState.className = "insp-state tone-" + (snap.tone || "neutral");
  inspBody.innerHTML = "";
  const parts = [];
  if (snap.id) parts.push(inspSection("Tool ID", snap.id));
  for (const s of (snap.sections || [])) parts.push(inspSection(s.label, s.value));
  const real = parts.filter(Boolean);
  if (!real.length) real.push(el("div", { class: "insp-label" }, "no detail captured for this event"));
  for (const p of real) inspBody.appendChild(p);
  inspector.classList.add("open");
}
function closeInspector() { inspector.classList.remove("open"); }
document.getElementById("insp-close").addEventListener("click", closeInspector);
document.getElementById("insp-backdrop").addEventListener("click", closeInspector);
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeInspector(); });

// Shared card factory: builds a clickable activity card and wires inspection.
function buildCard({ tone, name, id, state, preview, animate, snapshot }) {
  const card = el("div", {
    class: `act-card tone-${tone}${animate ? " enter" : ""}`,
    onclick: () => openInspector(snapshot()),
  }, [
    el("span", { class: "ac-expand" }, "⤢"),
    el("div", { class: "ac-head" }, [
      el("span", { class: "ac-name" }, name),
      id ? el("span", { class: "ac-id" }, "#" + id) : null,
    ]),
    el("div", { class: "ac-state" }, state),
    preview != null ? el("div", { class: "ac-preview" }, preview) : null,
  ]);
  return { card, stateEl: card.querySelector(".ac-state") };
}

/* ===========================================================================
 * 4. PER-AGENT VIEW — createAgentView(agentId, { label, isRoot }) builds ONE agent's
 * panel (cloned from #agent-view-tpl) and owns everything that used to be the single
 * global view: its render controllers (model core / tool bay / ingress / egress /
 * momentary cards / status badge), its driver state + applyEvent, its token-usage
 * analytics, and its OWN event log + scrubber/transport. The merged stream is routed
 * to the right view by agent_id (see §7); each agent's turn_number, state-machine node,
 * usage and history are tracked independently — nothing is shared across agents except
 * the inspector drawer and the (session-wide) live-approvals panel.
 *
 * Each render method takes `animate`: when false (scrub rebuild) it sets the resting
 * state with no signals; when true (live / single-step) it plays them.
 * =========================================================================== */

const agentsContainer = document.getElementById("agents");
const SVGNS = "http://www.w3.org/2000/svg";
const UC_H = 100;  // viewBox height; width = event count (preserveAspectRatio=none stretches it to the track)

// --- Token-usage pure helpers (shared by every agent view's analytics) -------------------
// One model interaction's token total — input + output ONLY. The provider's own
// `total_tokens` also folds in thought / cached / tool-use tokens, which inflates it
// confusingly; the full breakdown stays available by clicking the model core.
function ioTotal(usage) {
  if (!usage) return 0;
  return (usage.input_tokens || 0) + (usage.output_tokens || 0);
}
// Compact token formatting for dense readouts (1,230 → "1.2k", 2_000_000 → "2.0M").
function fmtTokens(n) {
  if (n == null) return "—";
  if (n < 1000) return String(n);
  if (n < 1e6) return (n / 1000).toFixed(n < 1e4 ? 1 : 0) + "k";
  return (n / 1e6).toFixed(1) + "M";
}
// Compact, click-free token summary for the model core's sub line (the full per-field
// breakdown is in the inspector on click). "total" is input + output only, matching the
// rest of the UI; handles missing usage / absent per-field counts gracefully.
function tokenSummary(usage) {
  if (!usage) return "token usage unavailable";
  const fmt = (n) => (n == null ? "—" : n.toLocaleString());
  const i = usage.input_tokens, o = usage.output_tokens;
  return `${fmt(i)} in · ${fmt(o)} out · ${fmt((i || 0) + (o || 0))} total`;
}

// Monotone cubic Hermite interpolation (Fritsch–Carlson) → cubic-bézier. The token series is
// step-like (each interaction is a flat plateau), and a plain Catmull-Rom spline overshoots
// on steps — it throws "devil-horn" spikes up at each plateau's edges and sags in between.
// A monotone fit is overshoot-free by construction: flat plateaus stay perfectly flat and
// the rises/falls between interaction levels bow as smooth, professional S-curves. Uniform
// x spacing (1 per column) keeps the tangent math simple.
// Pre-smooth the step series before the monotone fit: each pass blends every point with its
// neighbours (a [0.25, 0.5, 0.25] kernel), turning the blocky plateau edges into gentle ramps
// so the curve reads as rolling hills rather than tight steps. More passes → rounder. Endpoints
// are pinned. Wide plateaus keep most of their height (only the few columns nearest an edge
// soften), so relative interaction heights stay legible.
function softenSteps(points, passes) {
  let ys = points.map(p => p.y);
  for (let k = 0; k < passes; k++) {
    const next = ys.slice();
    for (let i = 1; i < ys.length - 1; i++) next[i] = ys[i - 1] * 0.25 + ys[i] * 0.5 + ys[i + 1] * 0.25;
    ys = next;
  }
  return points.map((p, i) => ({ x: p.x, y: ys[i] }));
}

function smoothTop(points) {
  const m = points.length;
  if (m === 0) return "";
  if (m === 1) return `M ${points[0].x} ${points[0].y.toFixed(2)}`;

  // Secant slopes between consecutive points.
  const delta = [];
  for (let i = 0; i < m - 1; i++) {
    delta.push((points[i + 1].y - points[i].y) / (points[i + 1].x - points[i].x));
  }
  // Initial tangents: average of neighbouring secants, endpoints take the one-sided secant.
  const tan = new Array(m);
  tan[0] = delta[0];
  tan[m - 1] = delta[m - 2];
  for (let i = 1; i < m - 1; i++) {
    // A sign change (or a flat on either side) is a local extremum → zero tangent keeps it flat.
    tan[i] = (delta[i - 1] * delta[i] <= 0) ? 0 : (delta[i - 1] + delta[i]) / 2;
  }
  // Fritsch–Carlson limiter: clamp tangents into the circle of radius 3 so no segment can
  // overshoot its endpoints. Flat secants force both tangents to 0 (a true plateau).
  for (let i = 0; i < m - 1; i++) {
    if (delta[i] === 0) { tan[i] = 0; tan[i + 1] = 0; continue; }
    const a = tan[i] / delta[i], b = tan[i + 1] / delta[i];
    const s = a * a + b * b;
    if (s > 9) {
      const t = 3 / Math.sqrt(s);
      tan[i] = t * a * delta[i];
      tan[i + 1] = t * b * delta[i];
    }
  }
  // Emit each Hermite segment as a cubic bézier (control points at ±1/3 of the tangent).
  let d = `M ${points[0].x} ${points[0].y.toFixed(2)}`;
  for (let i = 0; i < m - 1; i++) {
    const h = points[i + 1].x - points[i].x;
    const c1x = points[i].x + h / 3,     c1y = points[i].y + tan[i] * h / 3;
    const c2x = points[i + 1].x - h / 3, c2y = points[i + 1].y - tan[i + 1] * h / 3;
    d += ` C ${c1x.toFixed(2)} ${c1y.toFixed(2)} ${c2x.toFixed(2)} ${c2y.toFixed(2)} ${points[i + 1].x} ${points[i + 1].y.toFixed(2)}`;
  }
  return d;
}

// --- The tool bay: cards appear on request; an ended card stays (done/failed, clickable to
// read its OUTPUT) for its OWN tick and only retires on the NEXT tick — so you can always
// pause on the terminal event and inspect it. One bay per agent view (built with its bayEl). ---
function createToolBay(bayEl) {
  const cards = new Map();                         // tool_id -> live inst
  const retiring = new Map();                      // ended last tick, awaiting removal
  const sync = () => bayEl.classList.toggle("active", bayEl.children.length > 0);

  function make(id, data, animate) {
    const short = String(id).slice(-5);
    const inst = { id, short, name: data.tool_name || "tool", input: data.tool_input || {},
                   output: null, error: null, resolution: null, state: "requested" };
    const built = buildCard({
      tone: toneOf("requested"), name: inst.name, id: short, state: "requested",
      preview: Object.keys(inst.input).length ? previewOf(inst.input) : null, animate,
      snapshot: () => ({ title: inst.name, state: inst.state, tone: toneOf(inst.state), id: inst.id,
        sections: [{ label: "Input", value: inst.input },
                   { label: "Approval", value: inst.resolution },
                   { label: "Output", value: inst.output },
                   { label: "Error", value: inst.error }] }),
    });
    inst.card = built.card; inst.stateEl = built.stateEl;
    bayEl.appendChild(inst.card);
    cards.set(id, inst); sync();
    return inst;
  }
  function paint(inst, state) {
    inst.card.className = `act-card tone-${toneOf(state)}${state === "running" ? " running" : ""}`;
    inst.stateEl.textContent = state;
    inst.state = state;
  }

  return {
    get size() { return cards.size; },
    spawn(id, data, animate) { paint(cards.get(id) || make(id, data, animate), "requested"); },
    set(id, state, data, animate) { paint(cards.get(id) || make(id, data || {}, animate), state); },
    // Record an approval decision on the card: stash exactly the event's fields
    // ({approved, reason, remember}) for the inspector and replace the bare state text
    // with a reason-bearing label (e.g. "approved · auto-approved by updated policy ·
    // remembered"). An ended (denied) card has moved to `retiring` but is still in the
    // DOM — find it there too.
    resolve(id, approved, reason, remember, label) {
      const inst = cards.get(id) || retiring.get(id);
      if (!inst) return;
      inst.resolution = { approved, reason: reason ?? null, remember: !!remember };
      if (label) inst.stateEl.textContent = label;
    },
    progress(id, animate) { const i = cards.get(id); if (i && animate) flash(i.card, "ping", 500); },
    end(id, state, data, animate) {                // terminal state shown NOW; retires next tick
      const inst = cards.get(id) || make(id, data || {}, animate);
      if (data && data.tool_output != null) inst.output = data.tool_output;
      if (data && data.message != null) inst.error = data.message;
      paint(inst, state);
      cards.delete(id); retiring.set(id, inst);    // still in the DOM, still clickable
    },
    flushRetiring(animate) {                        // called at the top of the NEXT event
      for (const [, inst] of retiring) {
        const card = inst.card;
        if (animate) { card.classList.add("returning"); scheduleExit(card, 920, { phases: [{ class: "leaving", at: 420 }], onDone: sync }); }
        else card.remove();
      }
      retiring.clear(); sync();
    },
    clear() {
      for (const [, i] of cards) i.card.remove();
      for (const [, i] of retiring) i.card.remove();
      cards.clear(); retiring.clear(); sync();
    },
  };
}

// --- A momentary card: shows the agent's MOST RECENT activity for one tick. ---
// Cleared at the top of every event, so it never accumulates. One per zone, per agent view.
function createMomentary(zoneEl) {
  let card = null;
  return {
    has() { return !!card; },
    show({ tone, name, state, preview, snapshot, animate }) {
      this.clear();
      card = buildCard({ tone, name, id: null, state, preview, animate, snapshot }).card;
      zoneEl.appendChild(card);
    },
    clear() { if (card) { card.remove(); card = null; } },
  };
}

/* ===========================================================================
 * 4b. LIVE HITL APPROVALS — a developer override surface (SESSION-WIDE, one panel).
 *
 * Deliberately SEPARATE from the per-agent replay boxes. Each box is a pure function of
 * its scrubbed event prefix; this panel tracks what is awaiting approval at the LIVE head
 * across ALL agents (a tool_id is unique session-wide, and /api/approve only needs
 * session_id + tool_id), so it is fed from onStreamEvent (the real-time ingest, for any
 * agent) — NOT applyEvent (which also runs during scrub/replay and would corrupt the live
 * set). It lets a developer resolve a pending call straight through /api/approve —
 * including "approve & don't ask again" (remember) — without building their own interface.
 * Actions stay enabled regardless of where any box is scrubbed; the pending call is live.
 * =========================================================================== */

const liveApprovals = new Map();   // tool_id -> { tool_name, tool_input, turn_number, agent_id }
const liveApprovalsEl = document.getElementById("live-approvals");

// Update the live set from a freshly-arrived stream event (from ANY agent). Called once per
// real event in onStreamEvent — never from the replay/scrub path.
function trackLiveApproval(event, data) {
  if (event === "tool_approval_requested") {
    liveApprovals.set(data.tool_id, {
      tool_name: data.tool_name, tool_input: data.tool_input || {},
      turn_number: data.turn_number, agent_id: data.agent_id,
    });
    renderLiveApprovals();
  } else if (event === "tool_approval_resolved") {
    if (liveApprovals.delete(data.tool_id)) renderLiveApprovals();
  }
}

function renderLiveApprovals() {
  liveApprovalsEl.innerHTML = "";
  if (liveApprovals.size === 0) { liveApprovalsEl.hidden = true; return; }
  liveApprovalsEl.hidden = false;
  liveApprovalsEl.appendChild(el("div", { class: "la-head" }, [
    el("span", { class: "la-dot" }),
    "Awaiting approval",
    el("span", { class: "la-count" }, `${liveApprovals.size} live`),
  ]));
  for (const [toolId, info] of liveApprovals) {
    const reason = el("input", { class: "la-reason", type: "text", placeholder: "reason (optional)" });
    const err = el("div", { class: "la-error" }); err.style.display = "none";
    const approveBtn  = el("button", { class: "la-approve" }, "Approve");
    const rememberBtn = el("button", { class: "la-remember",
      title: "Approve and auto-approve this tool for the rest of the session" }, "Approve & don't ask again");
    const denyBtn     = el("button", { class: "la-deny" }, "Deny");
    // Name the agent the call belongs to (its full tree-unique id, e.g. "<parent>-<child>") so a
    // developer can tell whose tool is gated when several agents are running concurrently. Show it
    // whole — it is already a short id, and truncating would hide the parent prefix that makes it
    // tree-unique (and could collide in display across two same-suffixed cousins).
    const owner = info.agent_id ? `agent ${String(info.agent_id)}` : null;
    const row = el("div", { class: "la-item" }, [
      el("div", {}, [
        el("span", { class: "la-name" }, info.tool_name || "tool"),
        el("span", { class: "la-id" }, "#" + String(toolId).slice(-5)),
        owner ? el("span", { class: "la-id" }, " · " + owner) : null,
      ]),
      Object.keys(info.tool_input || {}).length ? el("div", { class: "la-input" }, previewOf(info.tool_input, 160)) : null,
      reason,
      el("div", { class: "la-actions" }, [approveBtn, rememberBtn, denyBtn]),
      err,
    ]);
    const submit = (approved, remember) =>
      devApprove(toolId, approved, remember, reason.value.trim() || null, row, err);
    approveBtn.addEventListener("click", () => submit(true, false));
    rememberBtn.addEventListener("click", () => submit(true, true));
    denyBtn.addEventListener("click", () => submit(false, false));
    liveApprovalsEl.appendChild(row);
  }
}

// POST the decision. The workflow then streams tool_approval_resolved (and, on
// approval, tool_start/tool_end) back over the attached stream, which is what removes
// the row (via trackLiveApproval) and updates the box. So on success we leave the row
// disabled and let the event clean it up.
async function devApprove(toolId, approved, remember, reason, row, err) {
  if (!activeSessionId) return;
  const buttons = row.querySelectorAll("button");
  buttons.forEach((b) => (b.disabled = true));
  err.style.display = "none"; err.textContent = "";
  try {
    const res = await fetch("/api/approve", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: activeSessionId, tool_id: toolId, approved, remember, reason }),
    });
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      // Already resolved (another client, or a policy update / remember cascade) or
      // unknown — the resolved event already (or will) drop the row; drop it locally too.
      if (e.error === "ToolApprovalAlreadyResolved" || e.error === "UnknownToolApproval") {
        if (liveApprovals.delete(toolId)) renderLiveApprovals();
        return;
      }
      err.textContent = e.message || `approval failed (${res.status})`;
      err.style.display = "block";
      buttons.forEach((b) => (b.disabled = false));
    }
  } catch (e) {
    err.textContent = "request failed — check your connection";
    err.style.display = "block";
    buttons.forEach((b) => (b.disabled = false));
  }
}

function createAgentView(agentId, { label, isRoot } = {}) {
  // Clone the per-agent panel and resolve its parts within this subtree (the markup uses
  // classes, not ids, so N panels coexist). `q` scopes every lookup to THIS view.
  const root = document.getElementById("agent-view-tpl").content.firstElementChild.cloneNode(true);
  const q  = (sel) => root.querySelector(sel);
  // The full tree-unique agent id ("<parent>-<child>…") — shown whole, not truncated: it is already
  // a short id, and dropping the parent prefix would hide the tree path and could collide in display.
  const shortId = String(agentId);
  root.classList.toggle("subagent", !isRoot);
  q(".av-title").textContent = label || (isRoot ? "Agent runtime" : "Subagent");
  q(".av-id").textContent = isRoot ? `session · ${shortId}` : `#${shortId}`;
  q(".av-name").textContent = isRoot ? "Agent" : shortId;   // the box's own header label
  agentsContainer.appendChild(root);

  const agentEl     = q(".agent-enclosure");
  const agentStatus = q(".agent-status");
  const portIn      = q(".port-in");
  const portOut     = q(".port-out");
  const ingressLane = q(".lane.ingress");
  const egressLane  = q(".lane.egress");
  const queueStack  = q(".queue-stack");
  const queueReadout= q(".queue-readout");
  const egressTerm  = q(".egress-terminal");
  const egressSub   = q(".egress-readout");
  const stageEl     = q(".stage");
  const turnMetaEl  = q(".turn-meta");
  const endedTag    = q(".av-ended");
  const degradedTag = q(".av-degraded");

  // --- The model core inside the box: a binary highlight (dormant / bright) held ON for
  // the whole model_interaction_started → ended bracket. While active, its label shows the
  // MODEL NAME (so you can read which model is generating from the start of the interaction,
  // for its whole duration); the sub line carries the momentary activity note
  // (active / thinking / citing / streaming), which the label is deliberately kept clear of. ---
  const model = {
    el: q(".model-core"),
    label: q(".model-label"),
    sub: q(".model-sub"),
    _detail: null,
    activate(modelName) {
      this.el.classList.add("active");
      this.el.classList.remove("clickable");
      this._detail = null;
      this.label.textContent = modelName || "Model";
      this.label.classList.toggle("mc-model", !!modelName);
      this.sub.textContent = "active";
    },
    deactivate() {
      this.el.classList.remove("active", "clickable");
      this._detail = null;
      this.label.textContent = "Model";
      this.label.classList.remove("mc-model");
      this.sub.textContent = "dormant";
    },
    // The interaction ended: the core itself drops out of "active" but KEEPS the model name
    // and now shows this interaction's token totals on its sub line — no extra card. The
    // core becomes clickable to open the full per-field usage in the inspector.
    end(modelName, usage) {
      this.el.classList.remove("active");
      this.label.textContent = modelName || "Model";
      this.label.classList.toggle("mc-model", !!modelName);
      this.sub.textContent = usage ? tokenSummary(usage) : "done";
      this._detail = { title: "Model interaction", state: "ended", tone: "model",
        sections: [{ label: "Model", value: modelName }, { label: "Token usage", value: usage }] };
      this.el.classList.toggle("clickable", !!usage);
    },
    note(text) { if (this.el.classList.contains("active")) this.sub.textContent = text; },
  };
  model.el.addEventListener("click", () => { if (model._detail) openInspector(model._detail); });

  /* =========================================================================
   * 4c. TOKEN-USAGE ANALYTICS (per agent) — per-model aggregates (this agent's usage bar)
   * + an area chart laid behind its scrub track (1:1 with the timeline, hover for a
   * per-interaction card). Both derived from THIS view's eventLog (model_interaction_started
   * /ended pairs); rebuilt as interactions complete. Pure helpers (ioTotal/fmtTokens/
   * softenSteps/smoothTop/tokenSummary) are module-level (below the factory).
   * ========================================================================= */
  const usageBar      = q(".usage-bar");
  const usageReadout  = q(".usage-readout");
  const modelUsageEl  = q(".model-usage");
  const usageChart    = q(".usage-chart");
  const scrubWrap     = q(".scrub-wrap");
  const usageTip      = q(".usage-tip");
  const ucArea = document.createElementNS(SVGNS, "path"); ucArea.setAttribute("class", "uc-area");
  const ucLine = document.createElementNS(SVGNS, "path");
  ucLine.setAttribute("class", "uc-line"); ucLine.setAttribute("vector-effect", "non-scaling-stroke");
  usageChart.append(ucArea, ucLine);
  let lastInteractions = [];   // completed interactions from the last rebuild (for the hover card)

  // Pair THIS view's started/ended events into completed interactions, each tagged with the
  // event-index span it occupied (used to spread its tokens across the timeline). One still in
  // flight (no ended yet) is omitted until its usage is known.
  function computeInteractions() {
    const out = [];
    let start = null, startModel = null;
    eventLog.forEach((e, i) => {
      if (e.event === "model_interaction_started") {
        start = i; startModel = e.data.model || null;
      } else if (e.event === "model_interaction_ended" && start != null) {
        out.push({ model: e.data.model || startModel, usage: e.data.usage || null,
                   total: ioTotal(e.data.usage), start, end: i });
        start = null; startModel = null;
      }
    });
    return out;
  }

  // Rebuild THIS agent's usage bar + area chart from its own event log.
  function rebuildAnalytics() {
    const interactions = computeInteractions();
    lastInteractions = interactions;
    if (interactions.length === 0) {
      usageBar.hidden = true;
      ucArea.removeAttribute("d"); ucLine.removeAttribute("d");
      usageTip.hidden = true;
      return;
    }
    usageBar.hidden = false;

    // Per-model aggregate — the agent may switch models mid-session or use several. "total"
    // is input + output only (see ioTotal).
    const agg = new Map();
    let sessionTotal = 0, maxTotal = 0, minTotal = Infinity;
    for (const it of interactions) {
      const key = it.model || "(unknown model)";
      const a = agg.get(key) || { input: 0, output: 0, total: 0, count: 0 };
      const u = it.usage || {};
      a.input += u.input_tokens || 0;
      a.output += u.output_tokens || 0;
      a.total += it.total;
      a.count += 1;
      agg.set(key, a);
      sessionTotal += it.total;
      if (it.total > maxTotal) maxTotal = it.total;
      if (it.total < minTotal) minTotal = it.total;
    }
    const plural = (n, w) => `${n} ${w}${n === 1 ? "" : "s"}`;
    usageReadout.textContent =
      `${fmtTokens(sessionTotal)} tokens · ${plural(interactions.length, "model interaction")} · ${plural(agg.size, "model")}`;
    modelUsageEl.innerHTML = "";
    for (const [m, a] of agg) {
      modelUsageEl.appendChild(el("div", { class: "mu-chip" }, [
        el("div", { class: "mu-model" }, m),
        el("div", { class: "mu-stats" }, `${fmtTokens(a.input)} in · ${fmtTokens(a.output)} out · ${fmtTokens(a.total)} total`),
        el("div", { class: "mu-stats mu-calls" }, plural(a.count, "model interaction")),
      ]));
    }

    // Area chart over the event timeline: each interaction holds its FULL token total as a
    // flat plateau across every column from its start to its end — height reads as the
    // interaction's actual token usage, independent of how many events/clicks it spanned.
    // (Spreading the total across the span would shrink a long interaction below a short
    // one that used fewer tokens, inverting the visual.) Interactions don't overlap, so each
    // column belongs to at most one; gaps between them rest at the baseline. Y normalizes to
    // the largest interaction total so the heaviest one reaches the top. The viewBox width =
    // column count, stretched to the track's exact width, so x lines up 1:1 with the scrubber.
    const n = eventLog.length;
    const series = new Array(n).fill(0);
    const active = new Array(n).fill(false);   // columns that belong to an interaction (vs. baseline gaps)
    for (const it of interactions) {
      for (let i = it.start; i <= it.end; i++) { series[i] = it.total; active[i] = true; }
    }
    const cols = Math.max(n - 1, 1);
    usageChart.setAttribute("viewBox", `0 0 ${cols} ${UC_H}`);
    // Rescale across the interactions' OWN min→max range (not 0→max) so differences between
    // turns are visually exaggerated: the lightest interaction sits just above the baseline
    // (FLOOR) and the heaviest reaches the top, everything else proportionally between. Gaps
    // with no interaction rest flat on the baseline. (When all totals are equal, range is 0 →
    // every interaction shows at full height.)
    const FLOOR = 0.16;                         // lowest interaction's height fraction above baseline
    const range = maxTotal - minTotal;
    const points = series.map((v, i) => {
      if (!active[i]) return { x: i, y: UC_H };                       // baseline gap
      const norm = range > 0 ? (v - minTotal) / range : 1;           // 0 (lightest) → 1 (heaviest)
      const frac = FLOOR + norm * (1 - FLOOR);                        // FLOOR → 1
      return { x: i, y: UC_H - frac * UC_H };
    });
    // Soften the plateau edges, then re-pin baseline gaps back to the floor: the blur would
    // otherwise lift the gaps off zero, blurring away the distinction between separate model
    // interactions. Pinning keeps each gap dropping cleanly to the baseline.
    const soft = softenSteps(points, 2);
    for (let i = 0; i < soft.length; i++) if (!active[i]) soft[i].y = UC_H;
    const top = smoothTop(soft);
    ucLine.setAttribute("d", top);
    ucArea.setAttribute("d", `${top} L ${cols} ${UC_H} L 0 ${UC_H} Z`);
  }

  // Hover the timeline for a per-interaction summary card. The chart shares the scrub track's
  // exact width, so the cursor's x maps 1:1 to an event index; we surface the interaction (if
  // any) covering it. Bound to the wrap (not the pointer-transparent svg) so dragging the
  // slider still works.
  function onScrubHover(e) {
    const n = eventLog.length;
    const rect = scrubWrap.getBoundingClientRect();
    if (n < 1 || lastInteractions.length === 0 || rect.width === 0) { usageTip.hidden = true; return; }
    const frac = Math.min(Math.max((e.clientX - rect.left) / rect.width, 0), 1);
    const idx = Math.round(frac * Math.max(n - 1, 0));
    const it = lastInteractions.find(t => idx >= t.start && idx <= t.end);
    usageTip.innerHTML = "";
    if (!it) {
      usageTip.appendChild(el("div", { class: "ut-empty" }, "no model interaction here"));
    } else {
      const u = it.usage || {};
      usageTip.append(
        el("div", { class: "ut-model" }, it.model || "(unknown model)"),
        el("div", { class: "ut-stats" },
          `${fmtTokens(u.input_tokens || 0)} in · ${fmtTokens(u.output_tokens || 0)} out · ${fmtTokens(it.total)} total`),
      );
    }
    usageTip.style.left = `${frac * 100}%`;
    usageTip.hidden = false;
  }
  scrubWrap.addEventListener("mousemove", onScrubHover);
  scrubWrap.addEventListener("mouseleave", () => { usageTip.hidden = true; });

  // --- The status badge + box colour (idle / running / replied / error) ---
  function setAgentStatus(status, turnNumber) {
    agentEl.classList.toggle("running", status === "running");
    agentEl.classList.toggle("replied", status === "replied");
    agentEl.classList.toggle("error",   status === "error");
    agentStatus.className = "status-badge " + (status === "idle" ? "" : status);
    if (status === "running")      agentStatus.textContent = `running · turn ${turnNumber ?? "?"}`;
    else if (status === "replied") agentStatus.textContent = `replied ✓ · turn ${turnNumber ?? "?"}`;
    else if (status === "error")   agentStatus.textContent = `error · turn ${turnNumber ?? "?"}`;
    else agentStatus.textContent = turnNumber != null ? `idle · awaiting turn ${turnNumber + 1}` : "idle · awaiting first turn";
  }

  // --- Ingress: clickable queued-message chips + a docking signal packet ---
  const ingress = {
    renderQueue(messages, animate) {
      const prev = queueStack.children.length;
      queueReadout.textContent = messages.length ? `${messages.length} queued` : "idle";
      queueStack.innerHTML = "";
      messages.forEach((msg, i) => {
        const chip = el("div", { class: "q-chip", title: "click to read queued message",
          onclick: () => openInspector({ title: "Queued message", state: "queued", tone: "queue",
            sections: [{ label: "Message", value: msg }] }) }, "msg");
        if (animate && i === messages.length - 1 && messages.length > prev) chip.classList.add("enter");
        queueStack.appendChild(chip);
      });
    },
    dock() {                                       // a message strikes the box's left port
      const p = el("div", { class: "packet" });
      ingressLane.appendChild(p);
      scheduleExit(p, 700);
      flash(portIn, "flash", 700);
    },
  };

  // --- Egress: reply text streaming out as packets + the terminal it lands on ---
  const egress = {
    _last: 0, _detail: null,
    reset() {
      egressTerm.textContent = "reply"; egressTerm.className = "terminal";
      egressSub.textContent = "—"; this._detail = null;
    },
    stream(animate) {                              // a chunk of reply text flowing out
      if (!animate) return;
      const now = performance.now();
      if (now - this._last < 110) return;
      this._last = now;
      const p = el("div", { class: "packet stream ok" });
      egressLane.appendChild(p);
