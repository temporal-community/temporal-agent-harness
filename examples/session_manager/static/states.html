      scheduleExit(p, 650);
    },
    emit(kind, turnNumber, detail, animate) {
      const ok = kind === "reply";
      egressTerm.textContent = ok ? "reply ✓" : "error";
      egressTerm.className = "terminal lit " + (ok ? "tone-done" : "tone-error");
      egressSub.textContent = ok ? `turn ${turnNumber ?? "?"} replied` : `turn ${turnNumber ?? "?"} errored`;
      this._detail = { title: ok ? "Reply" : "Error", state: ok ? "replied" : "error",
        tone: ok ? "done" : "error", sections: [{ label: ok ? "Output" : "Error message", value: detail }] };
      if (!animate) return;
      const p = el("div", { class: "packet " + (ok ? "ok" : "err") });
      egressLane.appendChild(p);
      scheduleExit(p, 700);
      flash(portOut, "flash", 700, [ok ? "ok" : "err"]);
    },
  };
  egressTerm.addEventListener("click", () => openInspector(egress._detail));

  // This view's tool bay + momentary cards (the factories themselves are module-level).
  const tools       = createToolBay(q(".tool-bay"));
  const modelCard   = createMomentary(q(".think-bay")); // thinking / citation
  const ingressCard = createMomentary(q(".msg-slot"));  // incoming message
  const outCard     = createMomentary(q(".out-slot"));  // reply delta streaming out (egress lane)

  /* =========================================================================
   * 5. DRIVER (per agent) — applies THIS view's events to its derived state + render
   * layer. `animate` gates packets / flashes / enter-exit so the SAME function drives
   * both live updates and instant scrub rebuilds. (Live HITL approvals are tracked
   * SESSION-wide, not here — see the module-level live-approvals block.)
   * ========================================================================= */

  let turnNumber = null;     // last turn we've seen begin on THIS agent (null before any turn)
  let turnActive = false;    // a turn is mid-flight (for the top transport chip)
  let queued = [];           // queued user messages, cleared when a turn starts
  let streamingOut = false;  // reply text is currently flowing out the egress port

  function updateMeta() {
    const bits = [];
    if (turnNumber != null) bits.push(`turn #${turnNumber}`);
    const n = tools.size; if (n) bits.push(`${n} tool${n > 1 ? "s" : ""} active`);
    turnMetaEl.textContent = bits.join("   ·   ");
  }
  function setStreamingOut(on) { streamingOut = on; stageEl.classList.toggle("streaming-out", on); }
  function clearMomentary() { modelCard.clear(); ingressCard.clear(); outCard.clear(); }
  // "Detail unavailable" mark, driven by a synthetic subagent_stream_unavailable for THIS subagent. It is
  // a sticky panel flag, NOT turn/box state: the panel + history stay visible and scrubbable, we
  // just badge that the merge couldn't load this subagent's own events (refresh to retry). Cleared
  // by resetView so a scrub rebuild to a prefix BEFORE the event drops the mark. The reason (if
  // any) rides the badge tooltip.
  function setDegraded(on, reason) {
    root.classList.toggle("degraded", on);
    degradedTag.hidden = !on;
    if (on && reason) degradedTag.title = reason;
  }

  function applyEvent(event, data, animate) {
    finalizeExits();                                // force-finish any exit anims from prior ticks
    tools.flushRetiring(animate);                   // retire tools that ended on the PREVIOUS tick
    clearMomentary();                               // momentary cards last exactly one tick
    switch (event) {
      case "message_queued":
        queued.push(data.user_message);
        ingress.renderQueue(queued, animate);
        break;

      case "turn_started":
        turnNumber = data.turn_number ?? turnNumber;
        turnActive = true;
        queued = []; ingress.renderQueue(queued, false);
        tools.clear(); egress.reset(); setStreamingOut(false);
        setAgentStatus("running", turnNumber);
        model.deactivate();  // agent's turn began, but the MODEL isn't working yet
        // The incoming message docks at the box edge — shown momentarily + clickable.
        ingressCard.show({ tone: "queue", name: "Message in", state: "received",
          preview: previewOf(data.user_message), animate,
          snapshot: () => ({ title: "Incoming message", state: "received", tone: "queue",
            sections: [{ label: "Message", value: data.user_message }] }) });
        if (animate) ingress.dock();
        updateMeta();
        break;

      // The MODEL itself is working only between these two events — distinct from
      // the AGENT, which is "running" across the whole turn (tools, waiting, etc.).
      case "model_interaction_started":
        // Light the core and name the model for the whole interaction.
        model.activate(data.model);
        break;
      case "model_interaction_ended":
        // No separate card: the totals land on the model core itself, which keeps the model
        // name and now shows input/output/total on its sub line (clickable for the full
        // breakdown). Pausing on this tick is where the just-finished usage is visible.
        model.end(data.model, data.usage);
        break;

      case "thought_summary":
        model.note("thinking");
        modelCard.show({ tone: "model", name: "Thinking", state: "reasoning",
          preview: previewOf(data.delta), animate,
          snapshot: () => ({ title: "Thinking", state: "reasoning", tone: "model",
            sections: [{ label: "Thought delta (raw)", value: data.delta }] }) });
        break;

      case "text_annotation":
        model.note("citing");
        modelCard.show({ tone: "model", name: "Citation", state: "annotation",
          preview: previewOf(data.delta), animate,
          snapshot: () => ({ title: "Citation", state: "annotation", tone: "model",
            sections: [{ label: "Annotation delta (raw)", value: data.delta }] }) });
        break;

      case "reply_delta":
        model.note("streaming"); setStreamingOut(true);
        outCard.show({ tone: "done", name: "Reply Δ", state: "streaming out",
          preview: previewOf(data.text), animate,
          snapshot: () => ({ title: "Reply chunk", state: "streaming", tone: "done",
            sections: [{ label: "Delta text", value: data.text }] }) });
        egress.stream(animate);
        break;

      case "tool_requested":
        tools.spawn(data.tool_id, data, animate); updateMeta(); break;
      case "tool_approval_requested":
        // Gated tool parked for a human decision (between requested and start).
        tools.set(data.tool_id, "awaiting", data, animate); updateMeta(); break;
      case "tool_approval_resolved":
        // Approved → distinct "approved" state (tool_start then drives it to "running");
        // denied → terminal here (carry the reason into the card's Error section, since no
        // tool_error will arrive). Never regress to "requested". Either way, stamp the card
        // with the event's reason (+ "remembered" when the decision allow-listed the tool).
        if (data.approved) tools.set(data.tool_id, "approved", data, animate);
        else tools.end(data.tool_id, "denied",
          { ...data, message: data.reason ? `Denied: ${data.reason}` : "Denied" }, animate);
        tools.resolve(data.tool_id, data.approved, data.reason, data.remember,
          resolutionText(data.approved, data.reason, data.remember));
        updateMeta(); break;
      case "tool_start":
        tools.set(data.tool_id, "running", data, animate); updateMeta(); break;
      case "tool_progress_delta":
        tools.progress(data.tool_id, animate); break;
      case "tool_end":
        tools.end(data.tool_id, "done", data, animate);
        updateMeta(); break;
      case "tool_error":
        tools.end(data.tool_id, "failed", data, animate);
        updateMeta(); break;

      // Subagent lifecycle — published BY THIS (parent) agent, so they live on the PARENT's
      // timeline. Each names a CHILD (subagent_id / agent_key / workflow_id); the child's own
      // events arrive under data.agent_id == subagent_id and are routed to the child's OWN panel
      // (which the router mounts off subagent_started). Here we just surface the parent-side
      // marker as a momentary card so the parent's box reflects that it drove a child.
      case "subagent_started":
        modelCard.show({ tone: "model", name: "Subagent +", state: data.agent_key || "subagent",
          preview: `#${String(data.subagent_id)}`, animate,
          snapshot: () => ({ title: "Subagent started", state: "started", tone: "model",
            sections: [{ label: "Agent key", value: data.agent_key },
                       { label: "Subagent id", value: data.subagent_id },
                       { label: "Workflow id", value: data.workflow_id }] }) });
        break;
      case "subagent_message_sent":
        modelCard.show({ tone: "model", name: "Subagent →", state: data.function || "message",
          preview: `#${String(data.subagent_id)} · t${data.subagent_turn}`, animate,
          snapshot: () => ({ title: "Message to subagent", state: "dispatched", tone: "model",
            sections: [{ label: "Agent key", value: data.agent_key },
                       { label: "Subagent id", value: data.subagent_id },
                       { label: "Function", value: data.function },
                       { label: "Subagent turn", value: data.subagent_turn }] }) });
        break;
      case "subagent_reply_received":
        modelCard.show({ tone: data.outcome === "ok" ? "done" : "error", name: "Subagent ←",
          state: data.outcome === "ok" ? "reply" : "error",
          preview: `#${String(data.subagent_id)} · t${data.subagent_turn}`, animate,
          snapshot: () => ({ title: "Subagent reply", state: data.outcome, tone: data.outcome === "ok" ? "done" : "error",
            sections: [{ label: "Agent key", value: data.agent_key },
                       { label: "Subagent id", value: data.subagent_id },
                       { label: "Function", value: data.function },
                       { label: "Subagent turn", value: data.subagent_turn },
                       { label: "Outcome", value: data.outcome }] }) });
        break;
      case "subagent_stopped":
        modelCard.show({ tone: "neutral", name: "Subagent ×", state: data.agent_key || "stopped",
          preview: `#${String(data.subagent_id)}`, animate,
          snapshot: () => ({ title: "Subagent stopped", state: "stopped", tone: "neutral",
            sections: [{ label: "Agent key", value: data.agent_key },
                       { label: "Subagent id", value: data.subagent_id },
                       { label: "Workflow id", value: data.workflow_id }] }) });
        break;

      // SYNTHESIZED CLIENT-SIDE by the stream merge (agent_id == subagent_id, so the router
      // delivered this to the AFFECTED subagent's OWN view): the merge gave up reading this
      // subagent's events. It is non-fatal and NOT a turn event (turn_number 0, turn_id "") —
      // do NOT advance turnNumber / turnActive / the status badge here. Only flip the panel's
      // sticky "detail unavailable — refresh to retry" mark; the panel + history stay intact.
      case "subagent_stream_unavailable":
        setDegraded(true, data.reason || "Subagent detail couldn't be loaded — refresh to retry.");
        break;

      case "reply": {
        turnActive = false; setStreamingOut(false);
        setAgentStatus("replied", turnNumber);
        model.deactivate();
        // Agent-agnostic: AgentReply.output is the handler's return model as a dict. This UI
        // knows nothing about any agent's output shape, so it just renders the raw JSON —
        // there is always an output object to show.
        egress.emit("reply", turnNumber, JSON.stringify(data.output ?? {}, null, 2), animate);
        updateMeta(); break;
      }

      case "error":
        turnActive = false; setStreamingOut(false);
        setAgentStatus("error", turnNumber);
        model.deactivate();
        egress.emit("error", turnNumber, data.message, animate);
        updateMeta(); break;

      case "turn_end":
        turnActive = false; setStreamingOut(false);
        tools.clear();
        setAgentStatus("idle", turnNumber);          // → "awaiting turn N+1"
        model.deactivate();
        egress.reset();
        updateMeta(); break;
    }
  }

  function resetView() {
    finalizeExits(); clearMomentary(); tools.clear();
    turnNumber = null; turnActive = false; queued = []; setStreamingOut(false);
    ingress.renderQueue(queued, false);
    egress.reset();
    model.deactivate();
    setAgentStatus("idle", null);
    setDegraded(false);                            // re-applied by replaying subagent_stream_unavailable
    turnMetaEl.textContent = "";
  }

  /* =========================================================================
   * 6. HISTORY (per agent): this view's own event log, scrubber + transport
   * (step / play / live / turn-jump). Each agent scrubs INDEPENDENTLY.
   * ========================================================================= */

  const scrubEl     = q(".scrub");
  const liveBtn     = q(".live-btn");
  const playBtn     = q(".play-btn");
  const prevTurnBtn = q(".prev-turn");
  const nextTurnBtn = q(".next-turn");
  const readoutEl   = q(".scrub-readout");
  const ticksEl     = q(".turn-ticks");

  const eventLog = [];
  let viewIndex = 0;        // events currently applied to the view
  let following = true;     // cursor pinned to the live tail
  let playing = false;
  let playTimer = null;
  const PLAY_MS = 650;

  let replaying = true;     // settle history instantly until the stream quiets
  let liveFlipTimer = null;
  function scheduleLiveFlip() {
    if (!replaying) return;
    clearTimeout(liveFlipTimer);
    liveFlipTimer = setTimeout(() => { replaying = false; }, 150);
  }

  function rebuildTo(index) {
    resetView();
    for (let i = 0; i < index; i++) applyEvent(eventLog[i].event, eventLog[i].data, false);
    viewIndex = index;
    updateScrub();
  }

  // Slider values that land on the IDLE tick just BEFORE each turn starts — i.e.
  // the index of each turn_started event itself (events [0,i) applied, turn_started
  // not yet), so stepping forward from there shows the message come in.
  function turnStartTargets() {
    const out = [];
    for (let i = 0; i < eventLog.length; i++) if (eventLog[i].event === "turn_started") out.push(i);
    return out;
  }
  let lastTickN = -1;
  function renderTurnTicks() {
    if (eventLog.length === lastTickN) return;     // positions only shift when n changes
    lastTickN = eventLog.length;
    ticksEl.innerHTML = "";
    const n = eventLog.length; if (!n) return;
    for (const target of turnStartTargets()) {
      const frac = target / n;
      const tick = el("div", {
        class: "turn-tick", title: `turn ${eventLog[target].data.turn_number ?? "?"} — click, then step ▶ to see it arrive`,
        onclick: () => gotoIndex(target),
      });
      tick.style.left = `calc(${frac} * (100% - 14px) + 7px)`;
      ticksEl.appendChild(tick);
    }
  }

  function updateScrub() {
    const n = eventLog.length;
    scrubEl.max = n; scrubEl.disabled = n === 0;
    if (following) { viewIndex = n; scrubEl.value = n; }
    renderTurnTicks();
    // No event TYPE here on purpose: a variable-length name would resize the
    // slider as you scrub. The type is legible in the animation above.
    const ev = viewIndex > 0 ? eventLog[viewIndex - 1] : null;
    readoutEl.textContent = !n ? "no events"
      : `${viewIndex} / ${n}` + (ev && ev.data.turn_number != null ? ` · t${ev.data.turn_number}` : "");
    liveBtn.classList.toggle("following", following);
    liveBtn.textContent = following ? "● LIVE" : "○ JUMP TO LIVE";
    playBtn.textContent = playing ? "⏸" : "▶";
    playBtn.classList.toggle("active", playing);
    playBtn.disabled = n === 0 || (following && !playing);
    playBtn.title = playing ? "Pause" : "Play from here";
    prevTurnBtn.disabled = n === 0;
    nextTurnBtn.disabled = n === 0;
  }

  // Ingest one live event for THIS agent: record it, and if following the tail, render it.
  // The SESSION-wide concerns (live-approvals set, header status chip) are handled by the
  // router/global layer, not here — this view only owns its own log + box.
  function onStreamEvent(event, data) {
    eventLog.push({ event, data });
    rebuildAnalytics();        // this agent's usage bar/chart, derived from its own log
    if (following) {
      scheduleLiveFlip();
      applyEvent(event, data, !replaying);
    }
    updateScrub();
    if (following) refreshStatus();
  }

  // Move the cursor to `target`. A single forward step animates that one
  // transition (so arrow-key scrubbing shows the signals); any other jump rebuilds
  // instantly (drag / click / back-step / turn-jump).
  function gotoIndex(target, { fromTransport = false } = {}) {
    if (!fromTransport) stopPlay();
    target = Math.max(0, Math.min(eventLog.length, target));
    following = target >= eventLog.length;          // set BEFORE rebuild (cursor pinning)
    if (target === viewIndex + 1) {
      applyEvent(eventLog[viewIndex].event, eventLog[viewIndex].data, true); // animate the one step
      viewIndex = target;
    } else if (target !== viewIndex) {
      rebuildTo(target);
    }
    scrubEl.value = viewIndex;
    updateScrub();
    refreshStatus();
  }

  function stopPlay() {
    if (!playing) return;
    playing = false; clearInterval(playTimer); playTimer = null;
    updateScrub(); refreshStatus();
  }
  function startPlay() {
    if (playing || eventLog.length === 0) return;
    if (following) return;                 // already at the live tail
    playing = true; updateScrub(); refreshStatus();
    playTimer = setInterval(() => {
      if (viewIndex >= eventLog.length) {  // caught up to the tail → resume live
        following = true; stopPlay(); return;
      }
      gotoIndex(viewIndex + 1, { fromTransport: true });
      if (viewIndex >= eventLog.length) { following = true; stopPlay(); }
    }, PLAY_MS);
  }

  // Any interaction with this view's transport makes it the target of global arrow-key
  // scrubbing (so the keys drive whichever agent the user last touched).
  const focusThisView = () => { lastActiveView = api; };
  scrubEl.addEventListener("input", () => { focusThisView(); gotoIndex(+scrubEl.value); });
  scrubEl.addEventListener("focus", focusThisView);
  playBtn.addEventListener("click", () => { focusThisView(); playing ? stopPlay() : startPlay(); });
  liveBtn.addEventListener("click", () => { focusThisView(); stopPlay(); following = true; rebuildTo(eventLog.length); refreshStatus(); });
  nextTurnBtn.addEventListener("click", () => {
    focusThisView();
    const next = turnStartTargets().find((t) => t > viewIndex);
    gotoIndex(next ?? eventLog.length);
  });
  prevTurnBtn.addEventListener("click", () => {
    focusThisView();
    const prior = turnStartTargets().filter((t) => t < viewIndex);
    gotoIndex(prior.length ? prior[prior.length - 1] : 0);
  });

  // Initial empty render of this fresh view.
  resetView();
  updateScrub();

  // The view's public API — what the router/global layer drives it through.
  const api = {
    agentId,
    onStreamEvent,                                    // route a live event here (by agent_id)
    isActive: () => turnActive,                       // does this agent have a turn mid-flight?
    stepScrub: (delta) => gotoIndex(viewIndex + delta),  // global arrow keys
    isScrubFocus: () => document.activeElement === scrubEl,
    // Mark a (sub)agent's panel ended when its parent stops it — dim it + tag it, but keep its
    // history. The box itself stays scrubbable.
    markEnded() { root.classList.add("ended"); endedTag.hidden = false; },
    destroy() { stopPlay(); clearTimeout(liveFlipTimer); root.remove(); },
  };
  return api;
}

/* ===========================================================================
 * 6b. SESSION-WIDE STATUS CHIP — one header chip for the whole merged stream. Per-agent
 * follow/scrub state is local to each panel's own readout; this chip reflects only the
 * session: catching up while attaching, "streaming" if ANY agent has a live turn, else
 * "watching". `lastActiveView` is the panel global arrow-keys drive (the last one touched).
 * =========================================================================== */

const statusEl = document.getElementById("status");
function setStatus(text, cls) { statusEl.textContent = text; statusEl.className = "chip " + (cls || ""); }
let catchingUp = false;          // true while the SSE attach is replaying history
let lastActiveView = null;       // the agent view global arrow-keys scrub

function refreshStatus() {
  if (!activeSessionId) return setStatus("no session", "");
  if (catchingUp) return setStatus("catching up", "streaming");
  const anyActive = [...agentViews.values()].some((v) => v.isActive());
  setStatus(anyActive ? "streaming" : "watching", anyActive ? "streaming" : "connected");
}

// Arrow keys step the last-touched view's scrubber (when no slider is already handling them).
document.addEventListener("keydown", (e) => {
  if (e.key !== "ArrowLeft" && e.key !== "ArrowRight") return;
  const view = lastActiveView;
  if (!view || view.isScrubFocus()) return;                 // let the range handle it
  const tag = (document.activeElement || {}).tagName;
  if (tag === "SELECT" || tag === "INPUT" || tag === "TEXTAREA") return;
  e.preventDefault();
  view.stepScrub(e.key === "ArrowRight" ? 1 : -1);
});

/* ===========================================================================
 * 7. STREAM CONSUMPTION + ROUTING + SESSION PICKER (observe-only).
 *
 * One SSE attach carries the MERGED multi-agent stream. Each event names its publisher via
 * agent_id; we route it to that agent's view, lazily creating a panel the first time a new
 * agent_id appears. subagent_started also pre-creates the child's panel (with its agent_key
 * label) so it reads nicely even before the child's own first event arrives.
 * =========================================================================== */

const agentViews = new Map();     // agent_id -> view (created lazily; root added on switch)
let rootAgentId = null;           // the root session agent's id (from /api/status)
let activeSessionId = null;
// The resume cursor handed back on every SSE event's `data.resume_offset`: the merge's ROOT-stream
// resume position. It advances past EVERY root event emitted (not just turn boundaries), and does
// NOT move on a subagent's own events — so the events within one subagent turn all carry the cursor
// as of their triggering `subagent_message_sent`. It is NOT a per-event counter. Any root offset is
// a SAFE resume point (the merge resumes with no skip; a subagent whose turn began before it is just
// omitted) — we feed it back as `from_offset` on a re-attach so the merge resumes incrementally
// instead of replaying from 0 (see watchSession).
let lastResumeOffset = 0;
let abortController = null;
// Turn-level dedup. `seenTurns` holds the `agent_id turn_id` of every turn whose events we've
// already routed into the per-agent logs, across ALL attaches of the current session (it is reset
// only on a session switch, never per attach — so accumulated per-agent state survives a resume).
// Resume (from_offset=lastResumeOffset) does NOT re-send turns we've fully seen, but resuming inside
// an in-flight root turn re-sends it from its turn_started (its turn_end hadn't advanced the cursor
// past it yet). `resumeSuppress` (cleared at the start of each attach) collects the keys of such
// re-sent turns the moment their duplicate turn_started arrives, so the rest of that turn's
// re-delivery is dropped and never double-applied. Genuinely new turns (unseen turn_id) flow through
// and append to existing state. (This replaces the old offset-comparison guard, which assumed a
// per-event monotonic offset — wrong: the resume cursor is per-root-event, and repeats across a
// subagent turn's events, so it can't identify individual events.)
const seenTurns = new Set();
let resumeSuppress = new Set();
// Highest ROOT turn number we've seen on the merged stream — the watch loop uses it to decide
// (via the cheap status query) whether a re-attach is even warranted, so an idle session doesn't
// get re-attached (and re-subscribed onto its live subagents) on a fixed tick.
let lastReplayedTurn = 0;

// Get (or lazily create) the view for an agent_id. `meta` seeds a nicer label/role when we
// learn it from subagent_started before the agent's own first event.
function ensureAgentView(agentId, meta = {}) {
  if (agentId == null) return null;
  let view = agentViews.get(agentId);
  if (!view) {
    // If /api/status didn't resolve the root id, adopt the FIRST agent we see as the root —
    // the attach always begins with the root agent's own turn events, so the first publisher
    // (and the first non-subagent_started agent_id) is the root.
    if (rootAgentId == null && !meta.agentKey) rootAgentId = agentId;
    const isRoot = agentId === rootAgentId;
    // The full tree-unique agent id ("<parent>-<child>…") — shown whole, not truncated: it is already
  // a short id, and dropping the parent prefix would hide the tree path and could collide in display.
  const shortId = String(agentId);
    const label = meta.label
      || (isRoot ? "Agent runtime" : (meta.agentKey ? `Subagent · ${meta.agentKey}` : "Subagent"));
    view = createAgentView(agentId, { label, isRoot });
    agentViews.set(agentId, view);
    if (isRoot) lastActiveView = view;   // default arrow-key target is the root
  }
  return view;
}

// Route one merged-stream event to the right agent's view (by the publisher's agent_id),
// and run the SESSION-wide side-effects (live approvals, subagent panel mounting).
function routeEvent(event, data) {
  if (!PROTOCOL_EVENTS.includes(event)) {
    console.warn(`[protocol drift] unmodeled event: ${event} — update states.html + harness/agent_protocol/events.py`);
    return;
  }
  // Turn-level dedup. A re-attach RESUMES (from_offset=lastResumeOffset) rather than replaying from
  // 0, so already-seen turns aren't re-sent — but resuming inside a turn that was in-flight when we
  // detached re-sends it from its turn_started (its turn_end hadn't advanced the cursor past it yet).
  // Drop a turn we've already begun routing so its events can't be appended twice; let genuinely new
  // turns (new turn_id) through. (The resume cursor is per-root-event and repeats across a subagent
  // turn's events, so it can't be used as a per-event skip key.)
  // Only real turns are deduped: the synthetic subagent_stream_unavailable marker carries an EMPTY
  // turn_id (a non-turn signal) and is skipped here — its effect (marking a panel degraded) is
  // idempotent, so it's safe to let through every attach without turn-keyed dedup.
  if (data.agent_id != null && data.turn_id) {
    const turnKey = data.agent_id + " " + data.turn_id;
    if (event === "turn_started") {
      // A turn_started whose turn we already began routing in a prior attach is the resume
      // re-sending a turn that was in-flight when we detached (its turn_end hadn't advanced
      // lastResumeOffset). Flag the whole re-sent turn for suppression and drop this duplicate start.
      if (seenTurns.has(turnKey)) { resumeSuppress.add(turnKey); return; }
      seenTurns.add(turnKey);
    } else if (resumeSuppress.has(turnKey)) {
      return;   // mid-turn event of a turn this resume re-sent; already applied in a prior attach
    } else {
      seenTurns.add(turnKey);   // a turn whose start we never saw but is genuinely new to us
    }
  }
  // Track the highest ROOT turn we've applied (the watch loop's "have I already replayed this?"
  // gate). Root events are those published by the root agent; subagent turn numbers are the
  // child's own and must not gate the root's re-attach decision.
  if (data.turn_number != null && (rootAgentId == null || data.agent_id === rootAgentId)) {
    lastReplayedTurn = Math.max(lastReplayedTurn, data.turn_number);
  }
  // Live approvals are session-wide (a tool_id is unique across agents) — fed from the raw
  // ingest regardless of which agent published, and never from the replay/scrub path.
  trackLiveApproval(event, data);

  // subagent_started/_stopped are published BY THE PARENT and name a CHILD (subagent_id). Mount
  // the child's panel on start (seeding its label from agent_key) and mark it ended on stop —
  // independent of whether the child has emitted any of its own events yet.
  if (event === "subagent_started" && data.subagent_id != null) {
    ensureAgentView(data.subagent_id, { agentKey: data.agent_key });
  } else if (event === "subagent_stopped" && data.subagent_id != null) {
    agentViews.get(data.subagent_id)?.markEnded();
  }

  // Deliver the event to its PUBLISHER's view (parent for parent-side events incl. the subagent
  // markers; the child itself for its own events). A never-before-seen agent_id grows a panel.
  const view = ensureAgentView(data.agent_id);
  if (view) view.onStreamEvent(event, data);
}

async function consumeSSE(res) {
  const reader = res.body.pipeThrough(new TextDecoderStream()).getReader();
  let buf = "";
  try {
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += value;
      let idx;
      while ((idx = buf.indexOf("\n\n")) !== -1) {
        const frame = buf.slice(0, idx);
        buf = buf.slice(idx + 2);
        const ev = frame.match(/^event: (.+)$/m);
        const da = frame.match(/^data: (.+)$/m);
        if (!ev || !da) continue;
        const data = JSON.parse(da[1]);
        if (data.resume_offset != null) lastResumeOffset = data.resume_offset;
        routeEvent(ev[1], data);
      }
    }
  } finally {
    // Release the body so the server-side merge generator is aclose()d (cancelling its cursors'
    // in-flight poll updates) promptly on a normal end, an abort, or a parse throw — never left
    // dangling to hold updates against a subagent workflow.
    try { await reader.cancel(); } catch { /* already closed/aborted */ }
  }
}

const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

// Exactly ONE attach in flight at a time, always for the currently-viewed session. The first
// attach replays history then streams live and returns when idle; every later attach RESUMES from
// the last resume cursor we saw (from_offset=lastResumeOffset) and streams only what follows it.
//
// IDLE WAIT — load-bearing, not cosmetic. Every /api/attach re-subscribes the root AND every
// (recursive) subagent stream. A subscribe to an IDLE child (one between turns, not stopped) leaves
// a server-side long-poll *update* parked in wait_condition, holding one of that workflow's 10
// concurrent-in-flight-update slots — and the client can't reclaim it on disconnect (the
// server-side update keeps blocking). So re-attaching on a fixed tick steadily LEAKS poll-updates
// onto a live subagent until that cap is hit, which then also starves the parent's own
// run_subagent_turn dispatch (the agent goes unusable). The fix: while the session is idle, DON'T
// re-attach at all — poll the cheap agent_status QUERY (queries don't consume update slots) and
// only open a fresh attach once status shows genuinely new work (turn_active, or current_turn
// advanced past what we've replayed). One attach per burst of activity, not one per idle tick —
// and that attach now RESUMES (only the new turns) rather than re-replaying the whole history.
const STATUS_POLL_MS = 2000;
async function fetchSessionStatus(sessionId) {
  try {
    const res = await fetch(`/api/status/${encodeURIComponent(sessionId)}`);
    if (res.ok) return await res.json();
  } catch { /* transient — treat as unknown */ }
  return null;
}
// Block (cheaply, via the status query) until the session has work we haven't replayed yet, or the
// view switches away. Returns true if there's new work to attach for, false if we should stop.
async function waitForNewWork(sessionId, replayedThroughTurn) {
  while (sessionId === activeSessionId) {
    const st = await fetchSessionStatus(sessionId);
    if (sessionId !== activeSessionId) return false;
    if (st && (st.turn_active || (st.current_turn || 0) > replayedThroughTurn)) return true;
    catchingUp = false; refreshStatus();
    await sleep(STATUS_POLL_MS);
  }
  return false;
}
async function watchSession(sessionId) {
  let replayedThroughTurn = 0;  // highest root turn we've fully replayed; gates idle re-attach
  // The FIRST attach of a session builds initial state from scratch and so must do a FULL replay
  // (from_offset=0). Every later re-attach RESUMES from the last resume cursor we saw — passing
  // from_offset=lastResumeOffset so the merge streams only what follows it instead of re-replaying
  // everything, and the per-agent views (built on the first attach) are appended to, not rebuilt.
  let firstAttach = true;
  while (sessionId === activeSessionId) {
    // Make sure no prior attach (and its server-side merge + cursors) is still open before we
    // open another — overlapping merges double up in-flight poll updates on shared subagents.
    if (abortController) { abortController.abort(); }
    abortController = new AbortController();
    // Each attach gets a fresh resume-overlap suppression set: it only matters within the lifetime
    // of one re-sent stream (the in-flight turn it rounds forward to), and `seenTurns` carries the
    // real "already applied" memory across attaches.
    resumeSuppress = new Set();
    try {
      // First attach → from_offset=0 (full replay to build initial state); a re-attach → resume at
      // the last resume cursor we saw (lastResumeOffset), so already-seen root events are not re-sent.
      const fromOffset = firstAttach ? 0 : lastResumeOffset;
      const res = await fetch(
        `/api/attach?session_id=${encodeURIComponent(sessionId)}&from_offset=${fromOffset}`,
        { signal: abortController.signal });
      if (sessionId !== activeSessionId) return;
      // Only the FIRST attach of a session has the full history to settle; a resume delivers only
      // new turns and shouldn't flash "catching up", so the chip doesn't flicker every re-attach.
      catchingUp = firstAttach; firstAttach = false; refreshStatus();
      await consumeSSE(res);
    } catch (err) {
      if (err.name === "AbortError") return;
      console.warn("attach failed:", err);
      setStatus("reconnecting", "");
    }
    if (sessionId !== activeSessionId) return;
    catchingUp = false; refreshStatus();
    // The attach returned, so the agent is idle through everything we just replayed. Record how
    // far we got (the highest root turn we've applied, tracked as lastReplayedTurn), then
    // — crucially — WAIT (via cheap status queries, not a re-attach) until there's genuinely new
    // work. This is what stops the per-tick attach leak on a long-idle session.
    replayedThroughTurn = Math.max(replayedThroughTurn, lastReplayedTurn);
    const hasNewWork = await waitForNewWork(sessionId, replayedThroughTurn);
    if (!hasNewWork) return;  // switched away
  }
}

async function switchSession(sessionId) {
  if (sessionId === activeSessionId) return;
  activeSessionId = sessionId || null;
  if (abortController) { abortController.abort(); abortController = null; }
  closeInspector();
  // Tear down every per-agent panel (and its timers) and the session-wide live-approvals set.
  for (const view of agentViews.values()) view.destroy();
  agentViews.clear();
  // A real session switch (not a re-attach) starts from a blank slate: drop the resume offset and
  // the cross-attach turn-dedup memory so the new session does a full from-0 replay and rebuilds.
  lastActiveView = null; rootAgentId = null; lastResumeOffset = 0; lastReplayedTurn = 0; catchingUp = false;
  seenTurns.clear(); resumeSuppress = new Set();
  liveApprovals.clear(); renderLiveApprovals();
  if (!activeSessionId) { setStatus("no session", ""); return; }
  setStatus("catching up", "streaming");
  // Resolve the root agent's id so the router knows which agent_id is the root (vs. a subagent),
  // then mount the root's panel immediately so the common no-subagent case shows a view up front.
  try {
    const res = await fetch(`/api/status/${encodeURIComponent(sessionId)}`);
    if (res.ok) rootAgentId = (await res.json()).agent_id ?? null;
  } catch (err) {
    console.warn("Failed to resolve root agent id:", err);
  }
  if (sessionId !== activeSessionId) return;   // switched again while awaiting status
  if (rootAgentId) ensureAgentView(rootAgentId);
  watchSession(activeSessionId);
}

async function loadSessions() {
  const res = await fetch("/api/sessions");
  const sessions = await res.json();
  const sel = document.getElementById("session");
  sel.innerHTML = "";
  if (!sessions.length) { sel.appendChild(new Option("— no sessions —", "")); return sessions; }
  for (const s of [...sessions].reverse()) {
    sel.appendChild(new Option(`${s.label}  ·  ${new Date(s.created_at * 1000).toLocaleString()}`, s.workflow_id));
  }
  return sessions;
}
document.getElementById("session").addEventListener("change", (e) => switchSession(e.target.value));

/* ===========================================================================
 * 8. LEGEND + BOOTSTRAP
 * =========================================================================== */

(function renderLegend() {
  const items = [
    ["model", "Model / thinking"], ["tools", "Tool running"],
    ["done", "Done / reply"], ["error", "Error"],
    ["queue", "Message in"], ["neutral", "Requested"],
  ];
  const elx = document.getElementById("legend");
  for (const [tone, label] of items) {
    const item = document.createElement("span");
    item.className = `legend-item tone-${tone}`;
    item.innerHTML = `<span class="legend-swatch"></span>${label}`;
    elx.appendChild(item);
  }
})();

(async function init() {
  try {
    const sessions = await loadSessions();
    if (sessions.length) {
      const mostRecent = sessions[sessions.length - 1];
      document.getElementById("session").value = mostRecent.workflow_id;
      switchSession(mostRecent.workflow_id);
    } else {
      setStatus("no sessions", "");
    }
  } catch (err) {
    console.error("init failed:", err);
    setStatus("error", "");
  }
})();
</script>
