      tools.resolve(data.tool_id, data.approved, data.reason, data.remember,
        resolutionText(data.approved, data.reason, data.remember));
      updateMeta(); break;
    case "tool_start":
      tools.set(data.tool_id, "running", data, animate); updateMeta(); break;
    case "tool_progress_delta":
      tools.progress(data.tool_id, animate); break;
    case "tool_end":
      tools.end(data.tool_id, "done", data, animate);
      updateMeta(); break;
    case "tool_error":
      tools.end(data.tool_id, "failed", data, animate);
      updateMeta(); break;

    case "reply": {
      turnActive = false; setStreamingOut(false);
      setAgentStatus("replied", turnNumber);
      model.deactivate();
      // Agent-agnostic: AgentReply.output is the handler's return model as a dict. This UI
      // knows nothing about any agent's output shape, so it just renders the raw JSON —
      // there is always an output object to show.
      egress.emit("reply", turnNumber, JSON.stringify(data.output ?? {}, null, 2), animate);
      updateMeta(); break;
    }

    case "error":
      turnActive = false; setStreamingOut(false);
      setAgentStatus("error", turnNumber);
      model.deactivate();
      egress.emit("error", turnNumber, data.message, animate);
      updateMeta(); break;

    case "turn_end":
      turnActive = false; setStreamingOut(false);
      tools.clear();
      setAgentStatus("idle", turnNumber);          // → "awaiting turn N+1"
      model.deactivate();
      egress.reset();
      updateMeta(); break;
  }
}

function resetView() {
  finalizeExits(); clearMomentary(); tools.clear();
  turnNumber = null; turnActive = false; queued = []; setStreamingOut(false);
  ingress.renderQueue(queued, false);
  egress.reset();
  model.deactivate();
  setAgentStatus("idle", null);
  turnMetaEl.textContent = "";
}

/* ===========================================================================
 * 6. HISTORY: event log, scrubber, transport (step / play / live / turn-jump).
 * =========================================================================== */

const scrubEl   = document.getElementById("scrub");
const liveBtn   = document.getElementById("live-btn");
const playBtn   = document.getElementById("play-btn");
const prevTurnBtn = document.getElementById("prev-turn");
const nextTurnBtn = document.getElementById("next-turn");
const readoutEl = document.getElementById("scrub-readout");
const statusEl  = document.getElementById("status");
const ticksEl   = document.getElementById("turn-ticks");

const eventLog = [];
let viewIndex = 0;        // events currently applied to the view
let following = true;     // cursor pinned to the live tail
let playing = false;
let playTimer = null;
const PLAY_MS = 650;

let replaying = true;     // settle history instantly until the stream quiets
let liveFlipTimer = null;
function scheduleLiveFlip() {
  if (!replaying) return;
  clearTimeout(liveFlipTimer);
  liveFlipTimer = setTimeout(() => { replaying = false; }, 150);
}

function rebuildTo(index) {
  resetView();
  for (let i = 0; i < index; i++) applyEvent(eventLog[i].event, eventLog[i].data, false);
  viewIndex = index;
  updateScrub();
}

// Slider values that land on the IDLE tick just BEFORE each turn starts — i.e.
// the index of each turn_started event itself (events [0,i) applied, turn_started
// not yet), so stepping forward from there shows the message come in.
function turnStartTargets() {
  const out = [];
  for (let i = 0; i < eventLog.length; i++) if (eventLog[i].event === "turn_started") out.push(i);
  return out;
}
let lastTickN = -1;
function renderTurnTicks() {
  if (eventLog.length === lastTickN) return;     // positions only shift when n changes
  lastTickN = eventLog.length;
  ticksEl.innerHTML = "";
  const n = eventLog.length; if (!n) return;
  for (const target of turnStartTargets()) {
    const frac = target / n;
    const tick = el("div", {
      class: "turn-tick", title: `turn ${eventLog[target].data.turn_number ?? "?"} — click, then step ▶ to see it arrive`,
      onclick: () => gotoIndex(target),
    });
    tick.style.left = `calc(${frac} * (100% - 14px) + 7px)`;
    ticksEl.appendChild(tick);
  }
}

function updateScrub() {
  const n = eventLog.length;
  scrubEl.max = n; scrubEl.disabled = n === 0;
  if (following) { viewIndex = n; scrubEl.value = n; }
  renderTurnTicks();
  // No event TYPE here on purpose: a variable-length name would resize the
  // slider as you scrub. The type is legible in the animation above.
  const ev = viewIndex > 0 ? eventLog[viewIndex - 1] : null;
  readoutEl.textContent = !n ? "no events"
    : `${viewIndex} / ${n}` + (ev && ev.data.turn_number != null ? ` · t${ev.data.turn_number}` : "");
  liveBtn.classList.toggle("following", following);
  liveBtn.textContent = following ? "● LIVE" : "○ JUMP TO LIVE";
  playBtn.textContent = playing ? "⏸" : "▶";
  playBtn.classList.toggle("active", playing);
  playBtn.disabled = n === 0 || (following && !playing);
  playBtn.title = playing ? "Pause" : "Play from here";
  prevTurnBtn.disabled = n === 0;
  nextTurnBtn.disabled = n === 0;
}

function refreshStatus() {
  if (!activeSessionId) return setStatus("no session", "");
  if (playing) return setStatus("playing", "playing");
  if (!following) return setStatus("paused · scrubbing", "paused");
  setStatus(turnActive ? "streaming" : "watching", turnActive ? "streaming" : "connected");
}
function setStatus(text, cls) { statusEl.textContent = text; statusEl.className = "chip " + (cls || ""); }

// Apply one live event: record it, and if following the tail, render it.
function onStreamEvent(event, data) {
  if (!PROTOCOL_EVENTS.includes(event)) {
    console.warn(`[protocol drift] unmodeled event: ${event} — update states.html + harness/agent_protocol/events.py`);
    return;
  }
  eventLog.push({ event, data });
  // Maintain the LIVE approvals set here (real-time ingest), independent of the scrub
  // position — so the dev override panel reflects what's actually pending now even while
  // the box is paused/scrubbing back through history.
  trackLiveApproval(event, data);
  // Per-model usage aggregates + chart are session-level (derived from the whole log),
  // so refresh them on each new event regardless of follow/scrub state.
  rebuildAnalytics();
  if (following) {
    scheduleLiveFlip();
    applyEvent(event, data, !replaying);
  }
  updateScrub();
  if (following) refreshStatus();
}

// Move the cursor to `target`. A single forward step animates that one
// transition (so arrow-key scrubbing shows the signals); any other jump rebuilds
// instantly (drag / click / back-step / turn-jump).
function gotoIndex(target, { fromTransport = false } = {}) {
  if (!fromTransport) stopPlay();
  target = Math.max(0, Math.min(eventLog.length, target));
  following = target >= eventLog.length;          // set BEFORE rebuild (cursor pinning)
  if (target === viewIndex + 1) {
    applyEvent(eventLog[viewIndex].event, eventLog[viewIndex].data, true); // animate the one step
    viewIndex = target;
  } else if (target !== viewIndex) {
    rebuildTo(target);
  }
  scrubEl.value = viewIndex;
  updateScrub();
  refreshStatus();
}

function stopPlay() {
  if (!playing) return;
  playing = false; clearInterval(playTimer); playTimer = null;
  updateScrub(); refreshStatus();
}
function startPlay() {
  if (playing || eventLog.length === 0) return;
  if (following) return;                 // already at the live tail
  playing = true; updateScrub(); refreshStatus();
  playTimer = setInterval(() => {
    if (viewIndex >= eventLog.length) {  // caught up to the tail → resume live
      following = true; stopPlay(); return;
    }
    gotoIndex(viewIndex + 1, { fromTransport: true });
    if (viewIndex >= eventLog.length) { following = true; stopPlay(); }
  }, PLAY_MS);
}

scrubEl.addEventListener("input", () => gotoIndex(+scrubEl.value));
playBtn.addEventListener("click", () => (playing ? stopPlay() : startPlay()));
liveBtn.addEventListener("click", () => { stopPlay(); following = true; rebuildTo(eventLog.length); refreshStatus(); });
nextTurnBtn.addEventListener("click", () => {
  const next = turnStartTargets().find((t) => t > viewIndex);
  gotoIndex(next ?? eventLog.length);
});
prevTurnBtn.addEventListener("click", () => {
  const prior = turnStartTargets().filter((t) => t < viewIndex);
  gotoIndex(prior.length ? prior[prior.length - 1] : 0);
});

// Arrow keys step the scrubber (when the slider isn't already handling them).
document.addEventListener("keydown", (e) => {
  if (e.key !== "ArrowLeft" && e.key !== "ArrowRight") return;
  if (document.activeElement === scrubEl) return;            // let the range handle it
  const tag = (document.activeElement || {}).tagName;
  if (tag === "SELECT" || tag === "INPUT" || tag === "TEXTAREA") return;
  e.preventDefault();
  gotoIndex(viewIndex + (e.key === "ArrowRight" ? 1 : -1));
});

/* ===========================================================================
 * 7. STREAM CONSUMPTION + SESSION PICKER (observe-only).
 * =========================================================================== */

let activeSessionId = null;
let lastOffset = 0;
let abortController = null;

async function consumeSSE(res) {
  const reader = res.body.pipeThrough(new TextDecoderStream()).getReader();
  let buf = "";
  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    buf += value;
    let idx;
    while ((idx = buf.indexOf("\n\n")) !== -1) {
      const frame = buf.slice(0, idx);
      buf = buf.slice(idx + 2);
      const ev = frame.match(/^event: (.+)$/m);
      const da = frame.match(/^data: (.+)$/m);
      if (!ev || !da) continue;
      const data = JSON.parse(da[1]);
      if (data.offset != null) lastOffset = data.offset;
      onStreamEvent(ev[1], data);
    }
  }
}

const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

// Exactly ONE attach, always for the currently-viewed session. attach replays
// history then streams live and returns when idle; we re-poll for the next turn.
// The sessionId guard + abort tear the old watch down on switch — we never hold
// streams open for any other session.
async function watchSession(sessionId) {
  while (sessionId === activeSessionId) {
    abortController = new AbortController();
    try {
      const res = await fetch(
        `/api/attach?session_id=${encodeURIComponent(sessionId)}&from_offset=${lastOffset}`,
        { signal: abortController.signal });
      if (sessionId !== activeSessionId) return;
      refreshStatus();
      await consumeSSE(res);
    } catch (err) {
      if (err.name === "AbortError") return;
      console.warn("attach failed:", err);
      setStatus("reconnecting", "");
    }
    if (sessionId !== activeSessionId) return;
    refreshStatus();
    await sleep(1000); // idle poll for the next turn (current session only)
  }
}

async function switchSession(sessionId) {
  if (sessionId === activeSessionId) return;
  activeSessionId = sessionId || null;
  if (abortController) { abortController.abort(); abortController = null; }
  stopPlay();
  closeInspector();
  eventLog.length = 0; viewIndex = 0; following = true; lastOffset = 0; replaying = true; lastTickN = -1;
  liveApprovals.clear(); renderLiveApprovals();
  rebuildAnalytics();   // empty log → hides the usage panel until this session has interactions
  resetView(); updateScrub();
  if (!activeSessionId) { setStatus("no session", ""); return; }
  setStatus("catching up", "streaming");
  watchSession(activeSessionId);
}

async function loadSessions() {
  const res = await fetch("/api/sessions");
  const sessions = await res.json();
  const sel = document.getElementById("session");
  sel.innerHTML = "";
  if (!sessions.length) { sel.appendChild(new Option("— no sessions —", "")); return sessions; }
  for (const s of [...sessions].reverse()) {
    sel.appendChild(new Option(`${s.label}  ·  ${new Date(s.created_at * 1000).toLocaleString()}`, s.workflow_id));
  }
  return sessions;
}
document.getElementById("session").addEventListener("change", (e) => switchSession(e.target.value));

/* ===========================================================================
 * 8. LEGEND + BOOTSTRAP
 * =========================================================================== */

(function renderLegend() {
  const items = [
    ["model", "Model / thinking"], ["tools", "Tool running"],
    ["done", "Done / reply"], ["error", "Error"],
    ["queue", "Message in"], ["neutral", "Requested"],
  ];
  const elx = document.getElementById("legend");
  for (const [tone, label] of items) {
    const item = document.createElement("span");
    item.className = `legend-item tone-${tone}`;
    item.innerHTML = `<span class="legend-swatch"></span>${label}`;
    elx.appendChild(item);
  }
})();

(async function init() {
  resetView();
  updateScrub();
  try {
    const sessions = await loadSessions();
    if (sessions.length) {
      const mostRecent = sessions[sessions.length - 1];
      document.getElementById("session").value = mostRecent.workflow_id;
      switchSession(mostRecent.workflow_id);
    } else {
      setStatus("no sessions", "");
    }
  } catch (err) {
    console.error("init failed:", err);
    setStatus("error", "");
  }
})();
</script>
</body>
