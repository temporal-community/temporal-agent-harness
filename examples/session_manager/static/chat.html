<body>

<header>
  <button id="sidebar-toggle" title="Toggle sidebar" aria-label="Toggle sidebar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <h1>Agent Chat</h1>
  <a href="/states" style="font-size:11px;letter-spacing:0.5px;color:var(--text-tertiary);text-decoration:none;border:1px solid var(--border);padding:4px 10px;border-radius:6px;" title="Live state-machine view">State machine ↗</a>
  <span id="status">loading</span>
</header>

<div id="main">
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>Sessions</h2>
      <div id="new-session-controls">
        <button id="new-session-btn" aria-haspopup="listbox" aria-expanded="false">+ New<span class="new-chevron">&#9662;</span></button>
        <label class="toggle-label">
          <input type="checkbox" id="queue-toggle">
          Queue
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="focus-poll-toggle">
          Focus poll
        </label>
        <div id="new-session-menu" role="listbox" aria-label="Choose an agent to start" hidden></div>
      </div>
    </div>
    <div id="session-list"></div>
  </div>

  <div id="chat-area">
    <div id="messages">
      <div id="empty-state">Create or select a session to start chatting</div>
    </div>
    <div id="pending-queue"></div>
    <div id="model-activity" hidden>
      <span class="tlogo-pulse"><span class="tlogo-spin"><img class="tlogo-img" src="/static/temporal-logo.svg" alt="" width="30" height="30"></span></span>
      <span class="model-activity-label">model is working</span>
      <span id="model-timer">0.0s</span>
    </div>
    <div id="input-area">
      <div id="input-wrap">
        <input id="message-input" type="text" placeholder="Type a message…  ( / for commands )" autofocus disabled>
        <div id="arg-ghost" aria-hidden="true"></div>
        <div id="slash-popup" role="listbox" aria-label="Slash commands" hidden></div>
      </div>
      <button id="send-btn" disabled>Send</button>
    </div>
  </div>

  <aside id="citations-panel" hidden>
    <div id="citations-header">
      <h2>Sources</h2>
      <span id="citations-count">0</span>
    </div>
    <div id="citations-list"></div>
  </aside>
</div>

<script>
const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("message-input");
const sendBtn = document.getElementById("send-btn");
const statusEl = document.getElementById("status");
const sessionListEl = document.getElementById("session-list");
const newSessionBtn = document.getElementById("new-session-btn");
const newSessionMenuEl = document.getElementById("new-session-menu");
const queueToggle = document.getElementById("queue-toggle");
const focusPollToggle = document.getElementById("focus-poll-toggle");
const pendingQueueEl = document.getElementById("pending-queue");
const emptyState = document.getElementById("empty-state");
const citationsPanelEl = document.getElementById("citations-panel");
const citationsListEl = document.getElementById("citations-list");
const citationsCountEl = document.getElementById("citations-count");
const sidebarToggleBtn = document.getElementById("sidebar-toggle");
const mainEl = document.getElementById("main");

let activeSessionId = null;
let nextTurn = 1; // the turn number the next message will claim
let lastOffset = 0; // last pubsub offset received — sent as from_offset on next chat
let isMessageQueuingEnabled = false;
let isAgentBusy = false;
let sending = false;
let toolCards = {};
let toolIndex = 0;
let toolStartTimes = {};
let focusPollInterval = null;
let focusPolling = false; // true while a poll is in-flight
let isAttaching = false;
let activeAbortController = null;

// ---------------------------------------------------------------------------
// Sidebar collapse — persisted across reloads via localStorage
// ---------------------------------------------------------------------------

const SIDEBAR_STATE_KEY = "agent-chat:sidebar-collapsed";

function applySidebarState(collapsed) {
  mainEl.classList.toggle("sidebar-collapsed", collapsed);
  sidebarToggleBtn.setAttribute("aria-expanded", String(!collapsed));
  sidebarToggleBtn.title = collapsed ? "Show sidebar" : "Hide sidebar";
}

// Restore on load.
applySidebarState(localStorage.getItem(SIDEBAR_STATE_KEY) === "1");

sidebarToggleBtn.addEventListener("click", () => {
  const collapsed = !mainEl.classList.contains("sidebar-collapsed");
  applySidebarState(collapsed);
  localStorage.setItem(SIDEBAR_STATE_KEY, collapsed ? "1" : "0");
});

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------

function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = cls || "";
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function formatTime(epochSecs) {
  if (!epochSecs) return "";
  return new Date(epochSecs * 1000).toLocaleTimeString();
}

function formatDuration(startEpoch, endEpoch) {
  const ms = Math.round((endEpoch - startEpoch) * 1000);
  if (ms < 1000) return `${ms}ms`;
  return `${(ms / 1000).toFixed(1)}s`;
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

// Render markdown to sanitized HTML. Single newlines become <br> (GFM-style)
// so plain-text typing still wraps at line breaks. DOMPurify strips any
// script/event-handler attributes that snuck through.
//
// Code fences with a language tag (```python, ```ts, ...) are syntax-
// highlighted via highlight.js. We parse into a detached <div>, run hljs
// on each <pre><code>, then sanitize the resulting HTML — hljs only adds
// <span class="hljs-*"> tokens, which DOMPurify preserves by default.
marked.setOptions({ breaks: true, gfm: true });
function renderMarkdown(text) {
  const tmp = document.createElement("div");
  tmp.innerHTML = marked.parse(text || "");
  if (typeof hljs !== "undefined") {
    for (const codeEl of tmp.querySelectorAll("pre code")) {
      try { hljs.highlightElement(codeEl); } catch (_) { /* unknown lang */ }
    }
  }
  return DOMPurify.sanitize(tmp.innerHTML);
}

// Append a small toggle to ``messageEl`` that flips ``contentEl`` between the
// markdown-rendered HTML (already on it at call time) and a <pre> of the
// raw source. ``rawText`` is the original markdown before rendering.
function attachRawToggle(messageEl, contentEl, rawText) {
  const renderedHtml = contentEl.innerHTML;
  const btn = document.createElement("button");
  btn.type = "button";
  btn.className = "raw-toggle";
  btn.textContent = "raw";
  btn.title = "Show raw markdown";
  let showingRaw = false;
  btn.addEventListener("click", (ev) => {
    ev.stopPropagation();
    showingRaw = !showingRaw;
    if (showingRaw) {
      contentEl.innerHTML = `<pre class="raw-md">${escapeHtml(rawText)}</pre>`;
      btn.textContent = "rendered";
      btn.title = "Show rendered markdown";
      btn.classList.add("active");
    } else {
      contentEl.innerHTML = renderedHtml;
      btn.textContent = "raw";
      btn.title = "Show raw markdown";
      btn.classList.remove("active");
    }
  });
  messageEl.appendChild(btn);
}

function clearMessages() {
  messagesEl.innerHTML = "";
  pendingQueueEl.innerHTML = "";
  toolCards = {};
  toolIndex = 0;
  toolStartTimes = {};
  activeReplyEl = null;
  globalCitations.clear();
  globalCitationCounter = 0;
  citationsListEl.innerHTML = "";
  citationsPanelEl.hidden = true;
  citationsCountEl.textContent = "0";
  // The hover preview clones cards from this list — kill it so we don't
  // leave a stale popover pointing at content that's about to be wiped.
  if (typeof hideCitePreview === "function") hideCitePreview();
}

function updatePendingHeader() {
  const items = pendingQueueEl.querySelectorAll(".pending-item");
  let header = pendingQueueEl.querySelector("#pending-queue-header");
  if (items.length === 0) {
    if (header) header.remove();
    return;
  }
  if (!header) {
    header = document.createElement("div");
    header.id = "pending-queue-header";
    pendingQueueEl.prepend(header);
  }
  header.textContent = `Queued (${items.length})`;
}

function addPendingItem(turnId, turnNumber, message) {
  const el = document.createElement("div");
  el.className = "pending-item";
  el.dataset.turnId = turnId;
  el.innerHTML = `<span class="pending-badge">turn ${turnNumber}</span>${escapeHtml(message)}`;
  pendingQueueEl.appendChild(el);
  updatePendingHeader();
  scrollToBottom();
}

function removePendingItem(turnId) {
  const el = pendingQueueEl.querySelector(`.pending-item[data-turn-id="${turnId}"]`);
  if (el) {
    el.remove();
    updatePendingHeader();
  }
}

function updateInputState() {
  if (!activeSessionId || isAttaching) {
    inputEl.disabled = true;
    inputEl.placeholder = isAttaching ? "Catching up..." : "Type a message...";
    sendBtn.disabled = true;
    sendBtn.textContent = isAttaching ? "Catching up..." : "Send";
    sendBtn.className = "";
    return;
  }

  inputEl.placeholder = "Type a message...";

  if (isAgentBusy && isMessageQueuingEnabled) {
    // Queuing enabled and agent busy — allow sending in queue mode
    inputEl.disabled = false;
    sendBtn.disabled = false;
    sendBtn.textContent = "Queue";
    sendBtn.className = "queue-mode";
  } else if (isAgentBusy) {
    // Agent busy, no queuing — disable input
    inputEl.disabled = true;
    sendBtn.disabled = true;
    sendBtn.textContent = "Send";
    sendBtn.className = "";
  } else {
    // Agent idle — normal send
    inputEl.disabled = false;
    sendBtn.disabled = false;
    sendBtn.textContent = "Send";
    sendBtn.className = "";
  }
}

// ---------------------------------------------------------------------------
// Message rendering
// ---------------------------------------------------------------------------

function addUserMessage(text, timestamp) {
  document.getElementById("empty-state")?.remove();
  const el = document.createElement("div");
  el.className = "msg user md";
  const time = timestamp ? `<span class="msg-time">${formatTime(timestamp)}</span>` : "";
  el.innerHTML = `${time}<div class="md-body">${renderMarkdown(text)}</div>`;
  messagesEl.appendChild(el);
  attachRawToggle(el, el.querySelector(".md-body"), text);
  scrollToBottom();
  return el;
}

let activeReplyEl = null;
// Whether the in-flight turn was started by a slash command (set on turn_started).
// Its reply is a mechanical acknowledgement, rendered as a system response.
let currentTurnIsSlashCommand = false;
// Citations for the in-progress turn, accumulated from text_annotation events
// and consumed in buildCitedReply to position inline markers. Reset on each
// turn_started. Distinct from globalCitations: this is per-turn byte-offset
// data; globalCitations is the session-wide deduped registry.
let pendingCitations = [];
// Session-wide citation registry. Keyed by deep_url (falling back to
// document_uri|file_name) so the same source gets the same number across
// every reply in the session. Cleared on session switch via clearMessages.
const globalCitations = new Map();
let globalCitationCounter = 0;

function citationKey(ann) {
  return ann.custom_metadata?.deep_url
    || `${ann.document_uri || ""}|${ann.file_name || ""}`;
}

// Register an annotation in the session-wide registry. Returns the number
// (newly assigned or previously seen). Renders a card in the side panel on
// first sight so the panel fills in live as text_annotation events stream.
function registerCitation(ann) {
  const key = citationKey(ann);
  const existing = globalCitations.get(key);
  if (existing) return existing.num;
  const num = ++globalCitationCounter;
  globalCitations.set(key, { num, ann });
  renderCitationCard(num, ann);
  return num;
}

function renderCitationCard(num, ann) {
  const cm = ann.custom_metadata || {};
  const url = cm.deep_url || ann.document_uri || "";
  const heading = cm.heading || ann.file_name || "Source";
  const path = Array.isArray(cm.section_path) ? cm.section_path.join(" › ") : "";
  const subtitle = cm.title || path || "";
  const card = document.createElement(url ? "a" : "div");
  card.className = "citation-card";
  card.id = `cite-${num}`;
  if (url) {
    card.href = url;
    card.target = "_blank";
    card.rel = "noopener";
  }
  const sub = subtitle ? `<div class="cite-sub">${escapeHtml(subtitle)}</div>` : "";
  card.innerHTML = `
    <div class="cite-num">${num}</div>
    <div class="cite-content">
      <div class="cite-heading">${escapeHtml(heading)}</div>
      ${sub}
    </div>
  `;
  citationsListEl.appendChild(card);
  citationsPanelEl.hidden = false;
  citationsCountEl.textContent = String(globalCitations.size);
}

// Insert inline citation markers at the byte offsets carried on each
// file_citation annotation, using session-wide numbers from globalCitations.
// FileCitation.start_index / end_index are UTF-8 BYTE offsets into the
// model's reply text (per the Gemini SDK), not JS string indices, so we
// encode → splice → decode rather than indexing the string directly.
function buildCitedReply(text, citations) {
  if (!citations || citations.length === 0) return text;

  // Group citation numbers by byte end_index so markers at the same
  // position stack as e.g. <sup>[1][2]</sup>.
  const markersByByte = new Map();
  for (const ann of citations) {
    const byteOff = ann.end_index;
    if (byteOff == null) continue;
    const entry = globalCitations.get(citationKey(ann));
    if (!entry) continue;
    let bucket = markersByByte.get(byteOff);
    if (!bucket) markersByByte.set(byteOff, (bucket = new Set()));
    bucket.add(entry.num);
  }

  const encoder = new TextEncoder();
  const decoder = new TextDecoder();
  const bytes = encoder.encode(text);
  let out = "";
  let cursor = 0;
  const sortedOffsets = [...markersByByte.keys()].sort((a, b) => a - b);
  for (const byteOff of sortedOffsets) {
    const clamped = Math.min(Math.max(byteOff, cursor), bytes.length);
    out += decoder.decode(bytes.slice(cursor, clamped));
    // Inline HTML passes through marked + DOMPurify; renders as a
    // superscript anchor that jumps to the matching card in the side
    // panel. The click handler scrolls within the panel only.
    const nums = [...markersByByte.get(byteOff)].sort((a, b) => a - b);
    out += '<sup class="cite-ref">';
    for (const n of nums) {
      out += `<a href="#cite-${n}" data-cite-num="${n}">[${n}]</a>`;
    }
    out += "</sup>";
    cursor = clamped;
  }
  out += decoder.decode(bytes.slice(cursor));
  return out;
}

function getOrCreateReplyEl(timestamp) {
  if (activeReplyEl) return activeReplyEl;
  document.getElementById("empty-state")?.remove();
  const el = document.createElement("div");
  el.className = "msg agent";
  const time = timestamp ? `<span class="msg-time">${formatTime(timestamp)}</span>` : "";
  el.innerHTML = `${time}<div class="reply-status"><span class="reply-dot"></span><span class="reply-label">replying...</span></div><span class="agent-text"></span>`;
  messagesEl.appendChild(el);
  activeReplyEl = el;
  scrollToBottom();
  return el;
}

function appendReplyDelta(text, timestamp) {
  const el = getOrCreateReplyEl(timestamp);
  const span = el.querySelector(".agent-text");
  span.textContent += text;
  scrollToBottom();
}

function finalizeReply(text, timestamp) {
  const markdown = buildCitedReply(text, pendingCitations);
  pendingCitations = [];
  const renderedHtml = renderMarkdown(markdown);
  if (activeReplyEl) {
    // Remove the pulsing status indicator
    const status = activeReplyEl.querySelector(".reply-status");
    if (status) status.remove();
    // Replace streamed plain-text with markdown-rendered authoritative final.
    activeReplyEl.classList.add("md");
    const span = activeReplyEl.querySelector(".agent-text");
    span.classList.add("md");
    span.innerHTML = renderedHtml;
    const timeSpan = activeReplyEl.querySelector(".msg-time");
    if (!timeSpan && timestamp) {
      activeReplyEl.insertAdjacentHTML("afterbegin", `<span class="msg-time">${formatTime(timestamp)}</span>`);
    }
    attachRawToggle(activeReplyEl, span, text);
    activeReplyEl = null;
  } else {
    // No deltas preceded this — render the full reply directly.
    document.getElementById("empty-state")?.remove();
    const el = document.createElement("div");
    el.className = "msg agent md";
    const time = timestamp ? `<span class="msg-time">${formatTime(timestamp)}</span>` : "";
    el.innerHTML = `${time}<span class="agent-text md">${renderedHtml}</span>`;
    messagesEl.appendChild(el);
    attachRawToggle(el, el.querySelector(".agent-text"), text);
  }
  scrollToBottom();
}

function addErrorMessage(text) {
  const el = document.createElement("div");
  el.className = "msg error";
  el.textContent = text;
  messagesEl.appendChild(el);
  scrollToBottom();
}

function addThoughtSummary(text, timestamp) {
  if (!text) return;
  document.getElementById("empty-state")?.remove();
  // Pull a one-line title from the first **bold** heading or the first
  // non-empty line; the body renders the full markdown.
  const boldMatch = text.match(/\*\*(.+?)\*\*/);
  const firstLine = text.split("\n").find((l) => l.trim());
  const title = boldMatch ? boldMatch[1] : (firstLine || "thought").replace(/^[#*\s]+/, "").trim();
  const card = document.createElement("div");
  card.className = "thought-card collapsed";
  const timeStr = timestamp ? formatTime(timestamp) : "";
  card.innerHTML = `
    <div class="thought-header" onclick="this.parentElement.classList.toggle('collapsed')">
      <span class="thought-icon">&#128173;</span>
      <span class="thought-title"></span>
      <span class="thought-time">${timeStr}</span>
      <span class="thought-chevron">&#9654;</span>
    </div>
    <div class="thought-body md"></div>
  `;
  card.querySelector(".thought-title").textContent = title;
  card.querySelector(".thought-body").innerHTML = renderMarkdown(text);
  messagesEl.appendChild(card);
  scrollToBottom();
}

// Build a tool card's DOM in the given lifecycle state ("requested" | "running")
// and return its generated element id. Cards are correlated to a tool invocation
// by tool_id (see toolCards), NOT by name — the same tool can be called twice in
// parallel, so name alone can't tell two live invocations apart.
function createToolCard(toolName, toolInput, timestamp, state) {
  const id = "tool-" + (toolIndex++);
  const card = document.createElement("div");
  // Built-in server tools (e.g. file_search) arrive with no input dict;
  // render those minimally — just an indicator that the call happened.
  const isMinimal = !toolInput || Object.keys(toolInput).length === 0;
  card.className = isMinimal ? "tool-card minimal" : "tool-card";
  card.id = id;
  const timeStr = timestamp ? formatTime(timestamp) : "";
  const label = state === "requested" ? "requested..." : "running...";
  const headerAttrs = isMinimal
    ? ""
    : 'onclick="this.parentElement.classList.toggle(\'collapsed\')"';
  card.innerHTML = `
    <div class="tool-header" ${headerAttrs}>
      <span class="tool-icon ${state}"></span>
      <span class="tool-name">${escapeHtml(toolName)}</span>
      <span class="tool-status">${timeStr} &middot; ${label}</span>
      <span class="tool-chevron">&#9654;</span>
    </div>
    <div class="tool-body">
      <label>Input</label>
      <pre>${escapeHtml(JSON.stringify(toolInput, null, 2))}</pre>
      <div class="tool-output-section" style="display:none">
        <label>Output</label>
        <pre class="tool-output-pre"></pre>
      </div>
    </div>
  `;
  messagesEl.appendChild(card);
  scrollToBottom();
  return id;
}

// tool_requested: the model has asked for this tool but it isn't executing yet.
// Render the card in a muted "requested" state; tool_start transitions it.
function addToolRequested(toolId, toolName, toolInput, timestamp) {
  toolCards[toolId] = createToolCard(toolName, toolInput, timestamp, "requested");
}

// tool_start: the invocation is now executing. Transition the existing requested
// card to "running" if we have one; otherwise (built-in server tools emit no
// tool_requested) create the running card fresh. The execution clock starts here.
function startTool(toolId, toolName, toolInput, timestamp) {
  let id = toolCards[toolId];
  const card = id ? document.getElementById(id) : null;
  if (card) {
    card.querySelector(".tool-icon").className = "tool-icon running";
    const timeStr = timestamp ? formatTime(timestamp) : "";
    card.querySelector(".tool-status").textContent = `${timeStr} · running...`;
  } else {
    id = createToolCard(toolName, toolInput, timestamp, "running");
    toolCards[toolId] = id;
  }
  if (timestamp) toolStartTimes[id] = timestamp;
}

function updateToolEnd(toolId, toolOutput, timestamp) {
  const id = toolCards[toolId];
  if (!id) return;
  const card = document.getElementById(id);
  if (!card) return;

  card.querySelector(".tool-icon").className = "tool-icon done";

  const status = card.querySelector(".tool-status");
  const startTime = toolStartTimes[id];
  status.textContent = (startTime && timestamp) ? formatDuration(startTime, timestamp) : "done";

  // Minimal cards (built-in tools with empty input/output) never reveal a
  // body, so skip the output-section hydration entirely.
  if (!card.classList.contains("minimal") || toolOutput) {
    const outputSection = card.querySelector(".tool-output-section");
    outputSection.style.display = "block";

    const outputPre = card.querySelector(".tool-output-pre");
    try {
      outputPre.textContent = JSON.stringify(JSON.parse(toolOutput), null, 2);
    } catch {
      outputPre.textContent = toolOutput;
    }
  }

  delete toolCards[toolId];
  delete toolStartTimes[id];
  scrollToBottom();
}

// Append an intermediate progress chunk to an open tool card, mid-run. These
// are streamed by tools doing genuine multi-step work (e.g. "connecting…",
// "fetched 3 records…") BEFORE their terminal tool_end payload — so we append
// rather than replace, and we leave the card in its "running" state.
function appendToolOutput(toolId, chunk, timestamp) {
  const id = toolCards[toolId];
  if (!id) return;
  const card = document.getElementById(id);
  if (!card || !chunk) return;

  // Reveal the output area (hidden by default, and otherwise only shown at
  // tool_end) so progress is visible while the tool is still running.
  const outputSection = card.querySelector(".tool-output-section");
  outputSection.style.display = "block";

  const outputPre = card.querySelector(".tool-output-pre");
  outputPre.textContent += chunk + "\n";
  scrollToBottom();
}

function updateToolError(toolId, message, timestamp) {
  const id = toolCards[toolId];
  if (!id) return;
  const card = document.getElementById(id);
  if (!card) return;

  card.classList.add("failed");
  card.querySelector(".tool-icon").className = "tool-icon failed";

  const status = card.querySelector(".tool-status");
  const startTime = toolStartTimes[id];
  const duration = (startTime && timestamp) ? formatDuration(startTime, timestamp) : "";
  status.textContent = duration ? `${duration} · failed` : "failed";

  const outputSection = card.querySelector(".tool-output-section");
  outputSection.style.display = "block";
  const outputLabel = outputSection.querySelector("label");
  if (outputLabel) outputLabel.textContent = "Error";

  const outputPre = card.querySelector(".tool-output-pre");
  outputPre.classList.add("tool-error-message");
  outputPre.textContent = message || "(no error message)";

  delete toolCards[toolId];
  delete toolStartTimes[id];
  scrollToBottom();
}

// ---------------------------------------------------------------------------
// Human-in-the-loop tool approvals
// ---------------------------------------------------------------------------

// tool_approval_requested: a gated tool is paused awaiting a human decision. It sits
// between tool_requested and tool_start, so the card usually already exists (created by
// tool_requested) — transition it to "awaiting" and attach Approve/Deny controls. If we
// somehow don't have a card yet, create one.
function markToolAwaitingApproval(toolId, toolName, toolInput, timestamp) {
  let id = toolCards[toolId];
  let card = id ? document.getElementById(id) : null;
  if (!card) {
    id = createToolCard(toolName, toolInput, timestamp, "requested");
    toolCards[toolId] = id;
    card = document.getElementById(id);
  }
  card.classList.add("awaiting");
  card.querySelector(".tool-icon").className = "tool-icon awaiting";
  const timeStr = timestamp ? formatTime(timestamp) : "";
  card.querySelector(".tool-status").textContent = `${timeStr} · awaiting approval`;

  if (!card.querySelector(".tool-approval")) {
    const row = document.createElement("div");
    row.className = "tool-approval";
    row.innerHTML = `
      <span class="tool-approval-prompt">This tool needs your approval to run.</span>
      <button type="button" class="approve-btn">Approve</button>
      <button type="button" class="approve-always-btn" title="Approve and add this tool to the session's auto-approve list so you won't be asked about it again.">Approve &amp; don't ask again</button>
      <button type="button" class="deny-btn">Deny</button>`;
    row.querySelector(".approve-btn").addEventListener("click", () => submitApproval(toolId, true, row));
    row.querySelector(".approve-always-btn").addEventListener("click", () => submitApproval(toolId, true, row, true));
    row.querySelector(".deny-btn").addEventListener("click", () => submitApproval(toolId, false, row));
    // Place it on the card itself (after the header), NOT inside the collapsible body,
    // so the controls stay visible even when the card is collapsed or minimal.
    const header = card.querySelector(".tool-header");
    header.insertAdjacentElement("afterend", row);
  }
  scrollToBottom();
}

// tool_approval_resolved: the decision is in (from this client, another client, or an
// auto-deny on agent close). Remove the controls; on approval the card will transition
// to "running" via tool_start, on denial it ends here (no tool_start/tool_end follows).
function resolveToolApproval(toolId, approved, reason, timestamp) {
  const id = toolCards[toolId];
  const card = id ? document.getElementById(id) : null;
  if (!card) return;
  const row = card.querySelector(".tool-approval");
  if (row) row.remove();
  card.classList.remove("awaiting");
  const timeStr = timestamp ? formatTime(timestamp) : "";
  if (approved) {
    card.querySelector(".tool-icon").className = "tool-icon requested";
    card.querySelector(".tool-status").textContent = `${timeStr} · approved`;
  } else {
    card.classList.add("denied");
    card.querySelector(".tool-icon").className = "tool-icon denied";
    card.querySelector(".tool-status").textContent = reason ? `denied · ${reason}` : "denied";
    // No further lifecycle events arrive for a denied call; stop tracking it.
    delete toolCards[toolId];
    delete toolStartTimes[id];
  }
  scrollToBottom();
}

// POST the decision. The workflow then streams tool_approval_resolved (+ tool_start /
// tool_end on approval) back over the in-flight /api/chat connection, which is what
// actually updates the card — so on success we just leave the buttons disabled and let
// the resolved event remove them.
async function submitApproval(toolId, approved, row, remember = false) {
  const buttons = row.querySelectorAll("button");
  buttons.forEach((b) => (b.disabled = true));
  const oldErr = row.querySelector(".tool-approval-error");
  if (oldErr) oldErr.remove();
  try {
    const res = await fetch("/api/approve", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: activeSessionId, tool_id: toolId, approved, remember }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      // Already-resolved means another client decided first; the resolved event will
      // (or already did) clean up the row, so leave the buttons disabled. Any other
      // failure: surface it and re-enable so the user can retry.
      if (err.error !== "ToolApprovalAlreadyResolved") {
        const msg = document.createElement("span");
        msg.className = "tool-approval-error";
        msg.textContent = err.message || `approval failed (${res.status})`;
        row.appendChild(msg);
        buttons.forEach((b) => (b.disabled = false));
      }
    }
  } catch (e) {
    const msg = document.createElement("span");
    msg.className = "tool-approval-error";
    msg.textContent = "approval request failed — check your connection";
    row.appendChild(msg);
    buttons.forEach((b) => (b.disabled = false));
  }
}

// ---------------------------------------------------------------------------
// SSE consumption
// ---------------------------------------------------------------------------

async function consumeSSE(res) {
  const reader = res.body.pipeThrough(new TextDecoderStream()).getReader();
  let buf = "";
  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    buf += value;
    let idx;
    while ((idx = buf.indexOf("\n\n")) !== -1) {
      const frame = buf.slice(0, idx);
      buf = buf.slice(idx + 2);
      const eventMatch = frame.match(/^event: (.+)$/m);
      const dataMatch = frame.match(/^data: (.+)$/m);
      if (!eventMatch || !dataMatch) continue;
      handleEvent(eventMatch[1], JSON.parse(dataMatch[1]));
    }
  }
}

function handleEvent(event, data) {
  // Track pubsub offset for from_offset on next send_message
  if (data.offset != null) lastOffset = data.offset;

  // Track highest turn number seen — used to derive nextTurn from the stream
  if (data.turn_number != null && data.turn_number >= nextTurn) {
    nextTurn = data.turn_number + 1;
  }

  switch (event) {
    case "message_queued":
      // Add to the pending queue section
      addPendingItem(data.turn_id, data.turn_number, formatUserMessage(data.user_message));
      break;
    case "turn_started": {
      // Remove matching queued message if there was one
      removePendingItem(data.turn_id);
      // A slash command renders as the blue command affordance and its reply as a
      // system response; ordinary text renders as a normal user message.
      const sc = parseSlashCommand(data.user_message);
      currentTurnIsSlashCommand = sc !== null;
      if (sc) addSlashCommandMessage(sc);
      else addUserMessage(formatUserMessage(data.user_message), data.timestamp);
      toolCards = {};
      pendingCitations = [];
      break;
    }
    case "model_interaction_started":
      startModelActivity();
      break;
    case "model_interaction_ended":
      endModelActivity();
      break;
    case "tool_requested":
      addToolRequested(data.tool_id, data.tool_name, data.tool_input, data.timestamp);
      break;
    case "tool_approval_requested":
      markToolAwaitingApproval(data.tool_id, data.tool_name, data.tool_input, data.timestamp);
      break;
    case "tool_approval_resolved":
      resolveToolApproval(data.tool_id, data.approved, data.reason, data.timestamp);
      break;
    case "tool_start":
      startTool(data.tool_id, data.tool_name, data.tool_input, data.timestamp);
      break;
    case "tool_end":
      updateToolEnd(data.tool_id, data.tool_output, data.timestamp);
      break;
    case "tool_progress_delta":
      appendToolOutput(data.tool_id, data.progress_delta, data.timestamp);
      break;
    case "tool_error":
      updateToolError(data.tool_id, data.message, data.timestamp);
      break;
    case "reply_delta":
      appendReplyDelta(data.text, data.timestamp);
      break;
    case "thought_summary":
      addThoughtSummary(data.delta?.content?.text, data.timestamp);
      break;
    case "text_annotation":
      for (const ann of data.delta?.annotations || []) {
        if (ann.type !== "file_citation") continue;
        // Register globally so the side panel updates live, and keep the
        // per-turn entry for byte-offset positioning in buildCitedReply.
        registerCitation(ann);
        pendingCitations.push(ann);
      }
      break;
    case "reply": {
      // The reply's `output` is the handler's return model as an object; render its
      // `text` field (the common TextReply case) or the JSON for a structured output.
      const replyText = data.output?.text ?? JSON.stringify(data.output ?? {});
      // A slash command's reply is a mechanical acknowledgement, not a model reply.
      if (currentTurnIsSlashCommand) addSystemReply(replyText, data.timestamp);
      else finalizeReply(replyText, data.timestamp);
      break;
    }
    case "error":
      // `kind` is present on client-side error frames (timeout/agent) but not
      // on a turn-level AgentError event, which carries only `message`.
      addErrorMessage(data.kind ? `${data.kind}: ${data.message}` : data.message);
      break;
  }
}

// ---------------------------------------------------------------------------
// Session management
// ---------------------------------------------------------------------------

let sessions = [];

async function loadSessions() {
  const res = await fetch("/api/sessions");
  sessions = await res.json();
  return sessions;
}

// ---- Agent roster -----------------------------------------------------------
// The set of launchable agents (GET /api/agents) drives both the create picker and
// the per-session badges. Fetched once on init. Each agent is assigned a stable hue
// (by roster order) so the same color identifies it in the picker AND in the list.

let agents = [];                       // [{key, workflow_type, label, description}]
const agentMetaByType = new Map();     // workflow_type -> {label, color, bg}

// Hues drawn from the existing theme tokens plus a few complementary accents, tuned
// for the dark surface. Assigned round-robin by the agent's position in the roster.
const AGENT_PALETTE = [
  { color: "#8ab4f8", bg: "rgba(138, 180, 248, 0.14)" }, // blue   (theme accent)
  { color: "#81c995", bg: "rgba(129, 201, 149, 0.14)" }, // green  (theme success)
  { color: "#c58af9", bg: "rgba(197, 138, 249, 0.14)" }, // violet
  { color: "#fdd663", bg: "rgba(253, 214, 99, 0.14)" },  // amber  (theme warning)
  { color: "#78d9ec", bg: "rgba(120, 217, 236, 0.14)" }, // cyan
  { color: "#f6a0c0", bg: "rgba(246, 160, 192, 0.14)" }, // pink
];
const paletteFor = (i) => AGENT_PALETTE[i % AGENT_PALETTE.length];

async function loadAgents() {
  try {
    const res = await fetch("/api/agents");
    if (!res.ok) return;
    const data = await res.json();
    agents = data.agents || [];
    agentMetaByType.clear();
    agents.forEach((a, i) => {
      const p = paletteFor(i);
      agentMetaByType.set(a.workflow_type, { label: a.label, color: p.color, bg: p.bg });
    });
  } catch (err) {
    console.warn("Failed to load agents:", err);
  }
}

// Display metadata for a session's agent type. Falls back to the raw workflow-type
// name in neutral tones if the roster hasn't loaded or the type is unknown.
function agentMeta(workflowType) {
  return (
    agentMetaByType.get(workflowType) || {
      label: workflowType || "agent",
      color: "var(--text-secondary)",
      bg: "var(--bg-surface-3)",
    }
  );
}

// ---- New-session agent picker ----------------------------------------------

function renderAgentMenu() {
  if (!agents.length) {
    newSessionMenuEl.innerHTML =
      '<div class="agent-menu-header">Start a session</div>' +
      '<div class="agent-menu-empty">No agents available.</div>';
    return;
  }
  newSessionMenuEl.innerHTML =
    '<div class="agent-menu-header">Start a session with…</div>' +
    agents
      .map((a, i) => {
        const p = paletteFor(i);
        return (
          `<div class="agent-menu-item" role="option" data-type="${escapeHtml(a.workflow_type)}">` +
          `<span class="agent-menu-dot" style="color:${p.color}"></span>` +
          `<span class="agent-menu-label">${escapeHtml(a.label)}</span>` +
          `<span class="agent-menu-desc">${escapeHtml(a.description || "")}</span>` +
          `</div>`
        );
      })
      .join("");
}

function openAgentMenu() {
  if (newSessionBtn.disabled) return;
  renderAgentMenu();
  newSessionMenuEl.hidden = false;
  newSessionBtn.setAttribute("aria-expanded", "true");
}

function closeAgentMenu() {
  newSessionMenuEl.hidden = true;
  newSessionBtn.setAttribute("aria-expanded", "false");
}

function toggleAgentMenu() {
  newSessionMenuEl.hidden ? openAgentMenu() : closeAgentMenu();
}

function renderSessionList(sessions) {
  sessionListEl.innerHTML = "";
  for (const s of [...sessions].reverse()) {
    const el = document.createElement("div");
    el.className = "session-item" + (s.workflow_id === activeSessionId ? " active" : "");
    const queueBadge = s.is_message_queuing_enabled
      ? `<span class="session-badge queue-on">queue</span>`
      : "";
    const am = agentMeta(s.agent_workflow_type);
    const agentBadge =
      `<span class="session-badge agent" style="color:${am.color};background:${am.bg}">` +
      `<span class="agent-dot"></span>${escapeHtml(am.label)}</span>`;
    el.innerHTML = `
      ${escapeHtml(s.label)}
      <div class="session-meta">
        <span class="session-time">${new Date(s.created_at * 1000).toLocaleString()}</span>
        ${agentBadge}
        ${queueBadge}
      </div>
    `;
    el.addEventListener("click", () => switchSession(s.workflow_id));
    sessionListEl.appendChild(el);
  }
}

async function switchSession(sessionId) {
  if (sessionId === activeSessionId) return;

  stopFocusPolling();

  if (activeAbortController) {
    activeAbortController.abort();
    activeAbortController = null;
  }

  activeSessionId = sessionId;
  nextTurn = 1;
  lastOffset = 0;
  isAgentBusy = false;
  // Derive the slash-command set from this agent's accepted-message schema (once
  // per page). Fire-and-forget — it's independent of attaching to the stream.
  loadSlashCommands(sessionId);
  const session = sessions.find(s => s.workflow_id === sessionId);
  isMessageQueuingEnabled = session ? session.is_message_queuing_enabled : false;
  clearMessages();
  resetModelActivity();
  updateInputState();
  setStatus("catching up...", "streaming");

  isAttaching = true;
  updateInputState();

  try {
    activeAbortController = new AbortController();
    const url = `/api/attach?session_id=${encodeURIComponent(sessionId)}`;
    const res = await fetch(url, { signal: activeAbortController.signal });
    await consumeSSE(res);

    // nextTurn is derived from the stream (handleEvent tracks the
    // highest turn_number seen). Attach only terminates when the
    // workflow is idle, so isAgentBusy is false.
    isAgentBusy = false;
  } catch (err) {
    if (err.name !== "AbortError") console.warn("Attach failed:", err);
  }

  isAttaching = false;
  updateInputState();
  setStatus("ready", "connected");

  // Start focus polling if enabled
  if (focusPollToggle.checked && document.visibilityState === "visible") {
    startFocusPolling();
  }

  await loadSessions();
  renderSessionList(sessions);
}

// Create a session for the chosen agent. The agent type is REQUIRED by the server —
// it's always the explicit pick from the picker (the server defaults nothing).
async function createSession(agentWorkflowType) {
  newSessionBtn.disabled = true;
  try {
    const enableQueuing = queueToggle.checked;
    const res = await fetch("/api/sessions", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        agent_workflow_type: agentWorkflowType,
        is_message_queuing_enabled: enableQueuing,
      }),
    });
    if (!res.ok) throw new Error(`create failed (${res.status})`);
    const session = await res.json();

    await loadSessions();
    renderSessionList(sessions);

    await switchSession(session.workflow_id);
  } catch (err) {
    addErrorMessage("Failed to create session: " + err.message);
  } finally {
    newSessionBtn.disabled = false;
  }
}

// ---------------------------------------------------------------------------
// Chat
// ---------------------------------------------------------------------------

// ---------------------------------------------------------------------------
// Slash commands — "/" opens a command picker; selecting one fills the input
// and shows an inline arg hint that clears once you type the arg. Known
// commands are sent as typed AgentMessages ({type:"slash_command", payload:{name, arg}});
// anything else is sent as plain text.
// ---------------------------------------------------------------------------

// The agent's slash commands are NOT hardcoded — they're derived at runtime from
// the accepted-message JSON schema the workflow reports (see loadSlashCommands),
// so commands can be added/changed agent-side without touching this UI. Each
// derived command declares its arg in ONE of two ways:
//   - argOptions: a fixed enum of accepted values (from the payload arg's `enum`).
//     These are Tab-completable — see tryCompleteArg.
//   - argHint:    an opaque free-text arg (the payload arg is a plain string).
//     Shown as a hint only; Tab does NOT complete it, nothing to enumerate.
// A command may also declare neither (no arg). Use argDisplay(cmd) to render the
// hint uniformly across all three.
let SLASH_COMMANDS = [];

// The arg hint shown in the picker and inline ghost: enum options joined with
// " | ", an opaque arg's own hint, or "" when the command takes no arg.
function argDisplay(cmd) {
  if (cmd.argOptions) return cmd.argOptions.join(" | ");
  return cmd.argHint || "";
}

// ---- Deriving slash commands from the agent's interface -----
// The /api/agent-interface query returns a list of functions, each
// { name, description, parameters, output } — `parameters` is the function's input
// model's pydantic JSON schema. This UI is application-specific: it knows the agent
// exposes a slash-command function whose input model carries a `payload` that is a
// discriminated union (one variant per command, keyed on `name`). We find that
// function by that shape, send to it by its `name`, and introspect its variants.

let slashFnName = null;        // the agent-interface function name for slash commands
let slashSchemaLoaded = false; // fetched once per page; the contract never changes

// Resolve a local "#/$defs/Name" $ref against a schema's own $defs.
function resolveRef(schema, ref) {
  if (!ref || !ref.startsWith("#/$defs/")) return null;
  return (schema.$defs || {})[ref.slice("#/$defs/".length)] || null;
}

// The full <prose> description from a payload model's docstring. The docstrings
// read "`/cmd <hint>` — <prose>"; we drop the leading synopsis and keep ALL of the
// prose (no truncation). Wrapped source lines within a paragraph are joined, but
// blank-line paragraph breaks are preserved as newlines — the popup renders the
// result with `white-space: pre-line`, so it cleanly spans multiple lines when the
// prose is long or deliberately multi-paragraph. RST ``code`` markup is stripped.
function commandDescription(def) {
  const raw = def.description || "";
  const prose = raw.includes(" — ") ? raw.split(" — ").slice(1).join(" — ") : raw;
  const text = prose
    .split(/\n\s*\n/) // paragraphs
    .map((p) => p.replace(/\s+/g, " ").trim()) // join wrapped lines within one
    .filter(Boolean)
    .join("\n")
    .replace(/``([^`]+)``/g, "$1");
  return text ? text[0].toUpperCase() + text.slice(1) : "";
}

// Turn one payload-variant def into a command descriptor, or null if it doesn't
// look like a command (no `name` const to key on).
function commandFromPayloadDef(def) {
  const name = def?.properties?.name?.const;
  if (typeof name !== "string") return null;
  const cmd = { name, description: commandDescription(def) };
  const arg = def.properties.arg;
  if (arg && Array.isArray(arg.enum)) {
    cmd.argOptions = arg.enum.map(String); // fixed set → Tab-completable
  } else if (arg && arg.const !== undefined) {
    // A single-value Literal serializes as `const` (not `enum`) — still a fixed,
    // one-option set, so treat it as a (Tab-completable) enum of one.
    cmd.argOptions = [String(arg.const)];
  } else if (arg) {
    cmd.argHint = "<arg>"; // opaque free-text → hint only, no completion
  }
  // else: command takes no arg.
  return cmd;
}

// Given the slash-command message's own schema, return its commands. `payload` is a
// discriminated union: its `oneOf` lists the per-command variants, each a $ref into
// the schema's own $defs.
function slashCommandsFromMessageSchema(schema) {
  const variants = schema?.properties?.payload?.oneOf;
  if (!Array.isArray(variants)) return [];
  return variants
    .map((v) => commandFromPayloadDef(resolveRef(schema, v.$ref)))
    .filter(Boolean);
}

// Fetch the agent interface once and populate SLASH_COMMANDS from the slash-command
// function (the one whose input model has a discriminated `payload` union). Needs a
// live session to query; safe to call repeatedly (no-ops after the first success).
// Failures are non-fatal — the UI just falls back to sending plain text.
async function loadSlashCommands(sessionId) {
  if (slashSchemaLoaded || !sessionId) return;
  try {
    const res = await fetch(
      `/api/agent-interface/${encodeURIComponent(sessionId)}`
    );
    if (!res.ok) return;
    const functions = await res.json();
    const slashFn = (functions || []).find(
      (f) => Array.isArray(f.parameters?.properties?.payload?.oneOf)
    );
    slashFnName = slashFn ? slashFn.name : null;
    SLASH_COMMANDS = slashFn
      ? slashCommandsFromMessageSchema(slashFn.parameters)
      : [];
    slashSchemaLoaded = true;
  } catch (err) {
    console.warn("Failed to load slash commands:", err);
  }
}

const argGhostEl = document.getElementById("arg-ghost");
const slashPopupEl = document.getElementById("slash-popup");

let slashItems = [];   // commands currently shown in the popup
let slashIndex = 0;    // highlighted row

// Tab-completion cycle over an enum arg's options. Holds the candidate list and
// the position within it for consecutive Tab presses; reset on any manual edit
// (the input event), command selection, or send, so the next Tab starts fresh.
let argCycle = null;   // { matches: string[], index: number } | null
const resetArgCycle = () => { argCycle = null; };

const slashIsOpen = () => !slashPopupEl.hidden;

// Build the wire payload from a raw input string: a known slash command becomes the
// send_agent_message envelope { type: <slash fn>, payload: <SlashCommand model> } where
// the SlashCommand model nests the discriminated { name, arg }; anything else stays plain
// text (the server wraps it into the agent's free-text handler).
function buildMessagePayload(raw) {
  if (raw.startsWith("/") && slashFnName) {
    const sp = raw.indexOf(" ");
    const name = (sp === -1 ? raw.slice(1) : raw.slice(1, sp)).toLowerCase();
    const cmd = SLASH_COMMANDS.find((c) => c.name === name);
    if (cmd) {
      let arg = sp === -1 ? "" : raw.slice(sp + 1).trim();
      // Enum args are matched case-insensitively against their Literal options;
      // opaque (free-text) args are sent verbatim (case preserved).
      if (cmd.argOptions) arg = arg.toLowerCase();
      // Omit an empty arg so the payload's Literal default applies (e.g. /scope
      // alone → "all"); sending "" would fail validation at the boundary.
      const command = arg ? { name, arg } : { name };
      // Envelope: type names the slash handler; payload is the SlashCommand model
      // ({payload: <command>}); inner `payload` is the command's discriminated union.
      return { type: slashFnName, payload: { payload: command } };
    }
  }
  return raw;
}

// A slash command arrives back on turn_started as the envelope JSON (stringified by the
// harness): { type: <slash fn>, payload: { payload: { name, arg } } }. Parse either the
// dict or that JSON string into {name, arg}, or null.
function parseSlashCommand(raw) {
  let obj = raw;
  if (typeof raw === "string" && raw.startsWith("{")) {
    try { obj = JSON.parse(raw); } catch { return null; }
  }
  const command = obj?.payload?.payload;
  if (obj && typeof obj === "object" && obj.type === slashFnName && command) {
    return { name: String(command.name || ""), arg: String(command.arg || "") };
  }
  return null;
}

// Plain-text rendering of an outbound message (used for the pending queue).
function formatUserMessage(raw) {
  const sc = parseSlashCommand(raw);
  if (sc) return "/" + sc.name + (sc.arg ? " " + sc.arg : "");
  // turn_started carries the send_agent_message envelope JSON ({type, payload}); for a
  // free-text turn the payload is the TextMessage model — render just its text, not the
  // whole envelope blob. Falls back to the raw string for anything unrecognized.
  let obj = raw;
  if (typeof raw === "string" && raw.startsWith("{")) {
    try { obj = JSON.parse(raw); } catch { return raw; }
  }
  if (obj && typeof obj === "object" && obj.payload && typeof obj.payload.text === "string") {
    return obj.payload.text;
  }
  return typeof raw === "string" ? raw : String(raw);
}

// Echo a recognized slash command into the transcript as the blue affordance.
function addSlashCommandMessage(cmd) {
  document.getElementById("empty-state")?.remove();
  const el = document.createElement("div");
  el.className = "slash-msg";
  const arg = cmd.arg ? ` <span class="slash-msg-arg">${escapeHtml(cmd.arg)}</span>` : "";
  el.innerHTML = `<span class="slash-msg-cmd">/${escapeHtml(cmd.name)}</span>${arg}`;
  messagesEl.appendChild(el);
  scrollToBottom();
}

// Render a mechanical system response (e.g. a slash-command result) — muted,
// italic, no card — so it's never mistaken for a model reply.
function addSystemReply(text, timestamp) {
  document.getElementById("empty-state")?.remove();
  const el = document.createElement("div");
  el.className = "system-reply";
  el.innerHTML = renderMarkdown(text);
  messagesEl.appendChild(el);
  scrollToBottom();
}

function renderSlashPopup() {
  slashPopupEl.innerHTML =
    '<div class="slash-popup-header">Commands</div>' +
    slashItems
      .map(
        (c, i) =>
          `<div class="slash-cmd${i === slashIndex ? " active" : ""}" data-i="${i}" role="option"` +
          ` aria-selected="${i === slashIndex}">` +
          `<span class="slash-cmd-name">/${escapeHtml(c.name)}</span>` +
          `<span class="slash-cmd-arg">${escapeHtml(argDisplay(c))}</span>` +
          `<span class="slash-cmd-desc">${escapeHtml(c.description)}</span>` +
          `</div>`
      )
      .join("");
}

function openSlash(items) {
  slashItems = items;
  if (slashIndex >= items.length) slashIndex = 0;
  renderSlashPopup();
  slashPopupEl.hidden = false;
}

function closeSlash() {
  slashPopupEl.hidden = true;
  slashItems = [];
  slashIndex = 0;
}

function moveSlash(delta) {
  if (!slashItems.length) return;
  slashIndex = (slashIndex + delta + slashItems.length) % slashItems.length;
  renderSlashPopup();
}

// Fill the input with the highlighted command + a trailing space, then surface
// its arg hint. Never sends.
function selectSlash() {
  const cmd = slashItems[slashIndex];
  if (!cmd) return;
  inputEl.value = "/" + cmd.name + " ";
  closeSlash();
  resetArgCycle();
  refreshSlashUI();
  inputEl.focus();
}

// Recognize the input as a command: returns {cmd, name, hasSpace, arg} only when
// the first token exactly matches a known command name; otherwise null.
function classifyInput(v) {
  if (!v.startsWith("/")) return null;
  const sp = v.indexOf(" ");
  const name = sp === -1 ? v.slice(1) : v.slice(1, sp);
  const cmd = SLASH_COMMANDS.find((c) => c.name === name.toLowerCase());
  if (!cmd) return null;
  return { cmd, name, hasSpace: sp !== -1, arg: sp === -1 ? "" : v.slice(sp + 1) };
}

// Command mode: hide the input's own text and re-render it in the overlay with the
// command in blue and the arg in normal text — live confirmation you typed a real
// command. When the arg isn't typed yet, append the muted arg hint. The caret stays
// visible and aligned (overlay shares the input's font metrics).
function paintCommandInput(v, info) {
  inputEl.classList.add("cmd-mode");
  const cmd = "/" + info.name;
  const rest = v.slice(cmd.length); // exact remaining chars (spaces + arg)
  let html = `<span class="ov-cmd">${escapeHtml(cmd)}</span>`;
  if (rest.length && rest.trim() === "") {
    // Trailing space(s), no arg yet: keep the spaces, then show the arg hint.
    html += `<span class="ov-arg">${escapeHtml(rest)}</span>` +
            `<span class="ov-hint">${escapeHtml(argDisplay(info.cmd))}</span>`;
  } else if (rest.length) {
    html += `<span class="ov-arg">${escapeHtml(rest)}</span>`;
  }
  argGhostEl.innerHTML = html;
  argGhostEl.classList.add("visible");
}

function clearCommandInput() {
  inputEl.classList.remove("cmd-mode");
  argGhostEl.classList.remove("visible");
  argGhostEl.innerHTML = "";
}

// Recompute the picker + input highlighting from the current input value.
function refreshSlashUI() {
  const v = inputEl.value;

  // Command picker while typing the "/token" (no space yet).
  const typing = v.match(/^\/(\S*)$/);
  if (typing) {
    const q = typing[1].toLowerCase();
    const matches = SLASH_COMMANDS.filter((c) => c.name.startsWith(q));
    matches.length ? openSlash(matches) : closeSlash();
  } else {
    closeSlash();
  }

  // Blue highlighting once the first token is a recognized command.
  const info = classifyInput(v);
  info ? paintCommandInput(v, info) : clearCommandInput();
}

// Tab-completion for enum args: when the input is a recognized command whose
// first token is followed by a space (caret in arg position) and that command
// declares argOptions, fill in / cycle through the options whose prefix matches
// what's typed so far. Returns true if it handled the key (caller preventDefaults).
// Opaque (argHint / no-arg) commands have nothing to enumerate, so this no-ops.
function tryCompleteArg(backward) {
  const info = classifyInput(inputEl.value);
  if (!info || !info.hasSpace || !info.cmd.argOptions) return false;

  if (!argCycle) {
    // Start a fresh cycle from the stem the user typed (empty = all options).
    const stem = info.arg.trim().toLowerCase();
    const matches = info.cmd.argOptions.filter((o) => o.startsWith(stem));
    if (!matches.length) return false;
    argCycle = { matches, index: backward ? matches.length - 1 : 0 };
  } else {
    // Advance within the already-established candidate list.
    const n = argCycle.matches.length;
    argCycle.index = (argCycle.index + (backward ? -1 : 1) + n) % n;
  }

  // Set the value programmatically (does NOT fire "input", so the cycle stands),
  // then repaint the overlay. refreshSlashUI doesn't touch argCycle.
  inputEl.value = "/" + info.name + " " + argCycle.matches[argCycle.index];
  refreshSlashUI();
  return true;
}

// ---------------------------------------------------------------------------
// Model-activity indicator — pulsing/spinning Temporal logo + elapsed timer,
// shown only while the model itself is running (between model_interaction_started
// and model_interaction_ended). A turn can have several model spans interleaved
// with tool calls, so a counter tracks how many are open; the timer measures the
// current span (resets each time the model picks back up).
// ---------------------------------------------------------------------------

const modelActivityEl = document.getElementById("model-activity");
const modelTimerEl = document.getElementById("model-timer");
const tlogoPulseEl = modelActivityEl.querySelector(".tlogo-pulse");
const tlogoSpinEl = modelActivityEl.querySelector(".tlogo-spin");

let modelActiveCount = 0;
let modelTimerStart = 0;
let modelTimerHandle = null;
let logoSpinHandle = null;
let logoPulseHandle = null;

const rand = (min, max) => min + Math.random() * (max - min);

// Occasional spin, random direction and (rarely) a double turn, at random gaps.
function scheduleSpin() {
  logoSpinHandle = setTimeout(() => {
    const turns = Math.random() < 0.22 ? 2 : 1;
    const dir = Math.random() < 0.5 ? 1 : -1;
    tlogoSpinEl.style.setProperty("--spin-turns", String(dir * turns));
    tlogoSpinEl.style.setProperty("--spin-dur", rand(0.6, 1.5).toFixed(2) + "s");
    tlogoSpinEl.classList.remove("spin");
    void tlogoSpinEl.offsetWidth; // reflow so the animation restarts
    tlogoSpinEl.classList.add("spin");
    scheduleSpin();
  }, rand(900, 4200));
}

// Re-randomize the pulse cadence periodically so it breathes irregularly.
function schedulePulse() {
  logoPulseHandle = setTimeout(() => {
    tlogoPulseEl.style.setProperty("--pulse-dur", rand(0.7, 1.6).toFixed(2) + "s");
    schedulePulse();
  }, rand(1200, 3000));
}

function startModelActivity() {
  modelActiveCount++;
  if (modelActiveCount > 1) return; // already visible
  modelActivityEl.hidden = false;
  modelTimerStart = performance.now();
  modelTimerEl.textContent = "0.0s";
  modelTimerHandle = setInterval(() => {
    modelTimerEl.textContent = ((performance.now() - modelTimerStart) / 1000).toFixed(1) + "s";
  }, 100);
  tlogoPulseEl.style.setProperty("--pulse-dur", rand(0.7, 1.6).toFixed(2) + "s");
  scheduleSpin();
  schedulePulse();
}

function endModelActivity() {
  if (modelActiveCount === 0) return;
  modelActiveCount--;
  if (modelActiveCount === 0) resetModelActivity();
}

// Hard reset — used on lifecycle boundaries (new send, session switch, stream end)
// so a dropped stream can't leave the indicator stuck on.
function resetModelActivity() {
  modelActiveCount = 0;
  modelActivityEl.hidden = true;
  if (modelTimerHandle) { clearInterval(modelTimerHandle); modelTimerHandle = null; }
  if (logoSpinHandle) { clearTimeout(logoSpinHandle); logoSpinHandle = null; }
  if (logoPulseHandle) { clearTimeout(logoPulseHandle); logoPulseHandle = null; }
  tlogoSpinEl.classList.remove("spin");
}

async function sendMessage() {
  const raw = inputEl.value.trim();
  if (!raw || !activeSessionId) return;

  // Known slash commands go out as typed AgentMessages; everything else as text.
  const message = buildMessagePayload(raw);

  inputEl.value = "";
  closeSlash();
  clearCommandInput();
  resetArgCycle();

  const expectedTurn = nextTurn;
  nextTurn++; // optimistic — if accepted, this is correct

  // Drop any prior SSE stream — the new stream picks up from lastOffset.
  if (activeAbortController) activeAbortController.abort();
  const controller = new AbortController();
  activeAbortController = controller;
  // The aborted stream won't deliver its model_interaction_ended; clear the
  // indicator so it can't get stuck on across the stream swap.
  resetModelActivity();

  sending = true;
  try {
    setStatus("streaming...", "streaming");

    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        session_id: activeSessionId,
        message,
        expected_turn: expectedTurn,
        from_offset: lastOffset,
      }),
      signal: controller.signal,
    });

    if (!res.ok) {
      nextTurn--; // roll back — message was not accepted
      // Any rejection means our state is stale. Reattach to catch up.
      const sid = activeSessionId;
      activeSessionId = null;
      switchSession(sid);
      return;
    }

    // Stream ALL events from lastOffset through this turn's reply.
    // message_queued events in the stream will populate the pending section.
    isAgentBusy = true;
    updateInputState();
    await consumeSSE(res);
  } catch (err) {
    if (err.name !== "AbortError") {
      addErrorMessage("Connection error: " + err.message);
    }
  } finally {
    sending = false;
    isAgentBusy = pendingQueueEl.querySelectorAll(".pending-item").length > 0;
    // Stream is done (or dropped) — the model can't still be running for it.
    resetModelActivity();
    updateInputState();
    setStatus("ready", "connected");
    inputEl.focus();
  }
}

// ---------------------------------------------------------------------------
// Inline citation interactions — click jumps to the side-panel card; hover
// shows a popover preview that mirrors the same card and positions itself
// above or below the trigger based on available viewport space.
// ---------------------------------------------------------------------------

let citePreviewEl = null;
let citeCurrentNum = null;
let citeShowTimer = null;
let citeHideTimer = null;

function ensureCitePreview() {
  if (citePreviewEl) return citePreviewEl;
  citePreviewEl = document.createElement("div");
  citePreviewEl.id = "cite-preview";
  // Keep the popover open while the cursor is on it (lets the user click
  // through to the source URL without it vanishing).
  citePreviewEl.addEventListener("mouseenter", () => {
    clearTimeout(citeHideTimer);
    citeHideTimer = null;
  });
  citePreviewEl.addEventListener("mouseleave", scheduleHideCitePreview);
  document.body.appendChild(citePreviewEl);
  return citePreviewEl;
}

function showCitePreview(trigger, num) {
  const sourceCard = document.getElementById(`cite-${num}`);
  if (!sourceCard) return;
  const preview = ensureCitePreview();
  preview.innerHTML = "";
  const clone = sourceCard.cloneNode(true);
  clone.removeAttribute("id");
  preview.appendChild(clone);

  // Measure offscreen, then position. Decide above/below based on which
  // side has more room; prefer below when there's enough headroom.
  preview.style.left = "-9999px";
  preview.style.top = "0";
  preview.classList.add("visible");
  const pr = preview.getBoundingClientRect();
  const tr = trigger.getBoundingClientRect();
  const vh = window.innerHeight;
  const vw = window.innerWidth;
  const gap = 8;

  const spaceBelow = vh - tr.bottom;
  const showBelow = spaceBelow >= pr.height + gap || spaceBelow >= tr.top;
  const top = showBelow
    ? tr.bottom + gap
    : Math.max(8, tr.top - pr.height - gap);

  let left = tr.left + tr.width / 2 - pr.width / 2;
  left = Math.max(8, Math.min(left, vw - pr.width - 8));

  preview.style.left = `${left}px`;
  preview.style.top = `${top}px`;
}

function hideCitePreview() {
  citeCurrentNum = null;
  clearTimeout(citeShowTimer);
  clearTimeout(citeHideTimer);
  citeShowTimer = null;
  citeHideTimer = null;
  if (citePreviewEl) citePreviewEl.classList.remove("visible");
}

function scheduleHideCitePreview() {
  clearTimeout(citeHideTimer);
  citeHideTimer = setTimeout(hideCitePreview, 140);
}

function onCiteHoverEnter(a) {
  const num = a.dataset.citeNum;
  if (!num) return;
  clearTimeout(citeHideTimer);
  citeHideTimer = null;
  if (citeCurrentNum) {
    // Already visible — switch contents instantly when moving between
    // adjacent citation markers, no fade-out/in churn.
    citeCurrentNum = num;
    showCitePreview(a, num);
  } else {
    clearTimeout(citeShowTimer);
    citeShowTimer = setTimeout(() => {
      citeCurrentNum = num;
      showCitePreview(a, num);
    }, 120);
  }
}

function onCiteHoverLeave() {
  clearTimeout(citeShowTimer);
  citeShowTimer = null;
  if (citeCurrentNum) scheduleHideCitePreview();
}

messagesEl.addEventListener("mouseover", (e) => {
  const a = e.target.closest(".cite-ref a");
  if (!a) return;
  onCiteHoverEnter(a);
});
messagesEl.addEventListener("mouseout", (e) => {
  const a = e.target.closest(".cite-ref a");
  if (!a) return;
  // Moving within the same anchor (e.g., onto a child node) — ignore.
  if (e.relatedTarget && a.contains(e.relatedTarget)) return;
  onCiteHoverLeave();
});
// Scrolling makes a fixed-position popover slide off its trigger; just
// dismiss it rather than chasing the trigger on every scroll event.
messagesEl.addEventListener("scroll", hideCitePreview, { passive: true });

// Click: jump to the side-panel card and flash a highlight. Avoid the
// default anchor behavior so the chat view stays put and the URL hash
// doesn't change; also dismiss the hover preview.
messagesEl.addEventListener("click", (e) => {
  const a = e.target.closest(".cite-ref a");
  if (!a) return;
  e.preventDefault();
  hideCitePreview();
  const num = a.dataset.citeNum;
  if (!num) return;
  const card = document.getElementById(`cite-${num}`);
  if (!card) return;
  card.scrollIntoView({ block: "nearest", behavior: "smooth" });
  card.classList.add("highlight");
  setTimeout(() => card.classList.remove("highlight"), 1200);
});

sendBtn.addEventListener("click", sendMessage);
// A manual edit invalidates any in-progress arg-completion cycle.
inputEl.addEventListener("input", () => { resetArgCycle(); refreshSlashUI(); });
inputEl.addEventListener("keydown", (e) => {
  // When the command picker is open, the arrow/enter/tab keys drive it.
  if (slashIsOpen()) {
    if (e.key === "ArrowDown") { e.preventDefault(); moveSlash(1); return; }
    if (e.key === "ArrowUp") { e.preventDefault(); moveSlash(-1); return; }
    if (e.key === "Enter" || e.key === "Tab") { e.preventDefault(); selectSlash(); return; }
    if (e.key === "Escape") { e.preventDefault(); closeSlash(); return; }
  }
  // Picker closed: Tab cycles through an enum arg's options (no-op for opaque
  // args, where the default Tab behavior is left intact).
  if (e.key === "Tab" && tryCompleteArg(e.shiftKey)) { e.preventDefault(); return; }
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
// Close the picker when focus leaves the input (deferred so a row click lands).
inputEl.addEventListener("blur", () => setTimeout(closeSlash, 120));
// Keep input focus when clicking a row (mousedown would otherwise blur it).
slashPopupEl.addEventListener("mousedown", (e) => e.preventDefault());
slashPopupEl.addEventListener("click", (e) => {
  const row = e.target.closest(".slash-cmd");
  if (!row) return;
  slashIndex = Number(row.dataset.i);
  selectSlash();
});
// + New opens the agent picker; choosing an agent creates the session.
newSessionBtn.addEventListener("click", (e) => {
  e.stopPropagation(); // don't let the document handler immediately re-close it
  toggleAgentMenu();
});
newSessionMenuEl.addEventListener("click", (e) => {
  const row = e.target.closest(".agent-menu-item");
  if (!row) return;
  closeAgentMenu();
  createSession(row.dataset.type);
});
// Dismiss the picker on outside click or Escape.
document.addEventListener("click", (e) => {
  if (newSessionMenuEl.hidden) return;
  if (e.target.closest("#new-session-menu") || e.target.closest("#new-session-btn")) return;
  closeAgentMenu();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && !newSessionMenuEl.hidden) closeAgentMenu();
});

// ---------------------------------------------------------------------------
// Focus polling — catch up on missed events when tab regains focus
// ---------------------------------------------------------------------------

async function focusPoll() {
  if (!activeSessionId || focusPolling || isAttaching || sending) return;
  focusPolling = true;
  try {
    const controller = new AbortController();
    activeAbortController = controller;
    const offsetBefore = lastOffset;
    const url = `/api/attach?session_id=${encodeURIComponent(activeSessionId)}&from_offset=${lastOffset}`;
    const res = await fetch(url, { signal: controller.signal });
    if (res.ok) {
      await consumeSSE(res);
      // Attach only terminates when the workflow is idle, so if we
      // received new events we can derive state from the stream alone.
      if (lastOffset !== offsetBefore) {
        isAgentBusy = false;
        // Derive nextTurn from the highest turn_number seen in events.
        // handleEvent doesn't track this yet, so we use the pending
        // queue as a proxy — if attach ended, no turns are pending.
        // The stream guarantees we've seen all turns through current_turn.
        updateInputState();
      }
    }
  } catch (err) {
    if (err.name !== "AbortError") console.warn("Focus poll failed:", err);
  } finally {
    focusPolling = false;
    // Attach terminates when the workflow is idle, so no model span is open now.
    resetModelActivity();
  }
}

function startFocusPolling() {
  stopFocusPolling();
  if (!focusPollToggle.checked || !activeSessionId) return;
  // Poll immediately on start, then every 1s
  focusPoll();
  focusPollInterval = setInterval(focusPoll, 1000);
}

function stopFocusPolling() {
  if (focusPollInterval) {
    clearInterval(focusPollInterval);
    focusPollInterval = null;
  }
}

focusPollToggle.addEventListener("change", () => {
  if (focusPollToggle.checked && document.visibilityState === "visible") {
    startFocusPolling();
  } else {
    stopFocusPolling();
  }
});

document.addEventListener("visibilitychange", () => {
  if (!focusPollToggle.checked) return;
  if (document.visibilityState === "visible") {
    startFocusPolling();
  } else {
    stopFocusPolling();
  }
});

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------

(async function init() {
  try {
    // Load the agent roster and the session list together; the roster supplies the
    // labels/colors the session badges render with, so it must be ready before we paint.
    await Promise.all([loadAgents(), loadSessions()]);
    renderSessionList(sessions);

    if (sessions.length > 0) {
      const mostRecent = sessions[sessions.length - 1];
      await switchSession(mostRecent.workflow_id);
    } else {
      setStatus("ready", "connected");
    }
  } catch (err) {
    setStatus("error", "");
    console.error("Init failed:", err);
  }
})();
</script>
</body>
