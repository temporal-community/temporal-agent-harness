<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Chat</title>
<script src="https://cdn.jsdelivr.net/npm/marked@14.1.4/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/styles/github-dark.min.css">
<style>
  /* Google-style dark theme. Layered grayscale: body is the deepest,
     surface-1 holds chrome (header, sidebar, sources panel), surface-2/3
     are progressively more elevated cards inside the chat canvas. */
  :root {
    --bg-base:       #131314;
    --bg-surface-1:  #1b1b1d;
    --bg-surface-2:  #1e1f20;
    --bg-surface-3:  #28292c;
    --bg-elevated:   #2d2e30;
    --bg-hover:      #3c4043;
    --code-bg:       #0d0e0f;
    --border:        rgba(255, 255, 255, 0.08);
    --border-strong: rgba(255, 255, 255, 0.16);
    --text-primary:   #e3e3e3;
    --text-secondary: #9aa0a6;
    --text-tertiary:  #80868b;
    --accent:        #8ab4f8;
    --accent-hover:  #aecbfa;
    --accent-bg:     rgba(138, 180, 248, 0.16);
    --accent-bg-hover: rgba(138, 180, 248, 0.28);
    --success:       #81c995;
    --success-bg:    rgba(129, 201, 149, 0.16);
    --warning:       #fdd663;
    --warning-bg:    rgba(253, 214, 99, 0.16);
    --error:         #f28b82;
    --error-bg:      rgba(242, 139, 130, 0.14);
    --user-msg-bg:   #1c2733;
    --user-border:   #8ab4f8;
    --agent-border:  #81c995;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--bg-surface-1);
    color: var(--text-primary);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.2px; }

  #sidebar-toggle {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    cursor: pointer;
    padding: 0;
    transition: background 0.15s, color 0.15s;
  }
  #sidebar-toggle:hover {
    background: var(--bg-surface-3);
    color: var(--text-primary);
  }
  #sidebar-toggle svg { display: block; }

  #status {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 10px;
    background: var(--bg-surface-3);
    color: var(--text-tertiary);
    margin-left: auto;
  }
  #status.connected { background: var(--success-bg); color: var(--success); }
  #status.streaming { background: var(--warning-bg); color: var(--warning); }

  #main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* --- Side panel (collapsible sessions list) --- */

  #sidebar {
    width: 260px;
    background: var(--bg-surface-1);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
    transition: width 0.22s ease, border-right-color 0.22s ease;
  }
  #main.sidebar-collapsed #sidebar {
    width: 0;
    border-right-color: transparent;
  }
  /* Keep inner content at full width so it slides out cleanly without
     reflowing as the container shrinks. */
  #sidebar-header { min-width: 260px; }
  #session-list { min-width: 260px; }

  #sidebar-header {
    padding: 12px;
    border-bottom: 1px solid var(--border);
  }
  #sidebar-header h2 {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 10px;
  }

  #new-session-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  #new-session-btn {
    padding: 5px 12px;
    font-size: 12px;
    background: var(--accent-bg);
    color: var(--accent);
    border: 1px solid transparent;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  #new-session-btn:hover {
    background: var(--accent-bg-hover);
    border-color: rgba(138, 180, 248, 0.35);
  }
  #new-session-btn:disabled {
    background: var(--bg-surface-3);
    color: var(--text-tertiary);
    cursor: not-allowed;
    border-color: transparent;
  }

  .toggle-label {
    font-size: 11px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    user-select: none;
  }
  .toggle-label input { margin: 0; accent-color: var(--accent); }

  #session-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 6px 12px;
  }

  .session-item {
    padding: 8px 10px;
    cursor: pointer;
    border-radius: 6px;
    font-size: 13px;
    color: var(--text-primary);
    transition: background 0.15s, color 0.15s;
    margin-bottom: 2px;
    border-left: 3px solid transparent;
  }
  .session-item:hover { background: var(--bg-surface-3); }
  .session-item.active {
    background: var(--accent-bg);
    border-left-color: var(--accent);
    color: var(--accent-hover);
    font-weight: 500;
  }
  .session-item .session-meta {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-top: 5px;
    /* Agent + queue badges wrap under the timestamp when the sidebar is tight. */
    flex-wrap: wrap;
  }
  .session-item .session-time {
    font-size: 11px;
    color: var(--text-tertiary);
    font-weight: 400;
    flex-basis: 100%;
  }
  .session-item .session-badge {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    font-weight: 500;
  }
  .session-badge.queue-on  { background: var(--success-bg); color: var(--success); }
  .session-badge.queue-off { background: var(--bg-surface-3); color: var(--text-tertiary); }

  /* Agent-type badge: a dot + label tinted to the agent's assigned hue (set inline
     from the roster), so each session's agent reads at a glance. The same hue keys the
     picker dot below, tying creation to the list. */
  .session-badge.agent {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    border: 1px solid transparent;
    /* color + background come inline; tint the border to match the agent's text color. */
    border-color: color-mix(in srgb, currentColor 28%, transparent);
  }
  .session-badge.agent .agent-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
    box-shadow: 0 0 5px -1px currentColor;
  }

  /* ----- New-session agent picker ---------------------------------------- */
  /* A dropdown of available agents, opened from + New. Reuses the slash-popup
     surface (elevated bg, strong border, deep shadow) so it feels native. */
  #new-session-controls { position: relative; }

  #new-session-btn .new-chevron {
    display: inline-block;
    margin-left: 5px;
    font-size: 9px;
    transform: translateY(-1px);
    transition: transform 0.18s ease;
  }
  #new-session-btn[aria-expanded="true"] .new-chevron { transform: translateY(-1px) rotate(180deg); }

  #new-session-menu {
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    min-width: 244px;
    max-width: 280px;
    padding: 4px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    box-shadow: 0 14px 36px rgba(0, 0, 0, 0.55);
    z-index: 70;
    transform-origin: top left;
    animation: agentMenuIn 0.15s cubic-bezier(0.2, 0.8, 0.3, 1);
  }
  #new-session-menu[hidden] { display: none; }
  @keyframes agentMenuIn {
    from { opacity: 0; transform: translateY(-6px) scale(0.97); }
    to   { opacity: 1; transform: none; }
  }

  .agent-menu-header {
    padding: 6px 10px 5px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-tertiary);
  }

  .agent-menu-item {
    display: grid;
    grid-template-columns: auto 1fr;
    column-gap: 9px;
    row-gap: 2px;
    align-items: start;
    padding: 8px 10px;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.12s;
  }
  .agent-menu-item:hover,
  .agent-menu-item.active { background: var(--bg-hover); }

  .agent-menu-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    margin-top: 4px;
    flex-shrink: 0;
    background: currentColor; /* color set inline per agent */
    box-shadow: 0 0 7px -1px currentColor;
  }
  .agent-menu-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.3;
  }
  .agent-menu-desc {
    grid-column: 2;
    font-size: 11.5px;
    color: var(--text-tertiary);
    line-height: 1.42;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .agent-menu-empty {
    padding: 8px 10px 10px;
    font-size: 12px;
    color: var(--text-tertiary);
    font-style: italic;
  }

  /* --- Chat area --- */

  #chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--bg-base);
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  #empty-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-tertiary);
    font-size: 14px;
  }

  .msg {
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    padding: 12px 16px;
    border-radius: 10px;
    line-height: 1.55;
    word-wrap: break-word;
    flex-shrink: 0;
    position: relative;
    border: 1px solid var(--border);
  }

  /* Toggle that swaps rendered markdown for the raw source on a card. */
  .raw-toggle {
    position: absolute;
    top: 8px;
    right: 8px;
    background: transparent;
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 10px;
    line-height: 1.4;
    color: var(--text-tertiary);
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s, color 0.15s;
    font-family: inherit;
  }
  .msg:hover .raw-toggle,
  .raw-toggle.active { opacity: 1; }
  .raw-toggle:hover {
    background: var(--bg-elevated);
    color: var(--text-primary);
  }
  .raw-md {
    margin: 0;
    white-space: pre-wrap;
    word-break: break-word;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 0.9em;
    color: var(--text-secondary);
  }

  /* Streaming deltas land in a textContent-only span — preserve their
     intentional whitespace until finalizeReply re-renders as markdown. */
  .msg.agent .agent-text:not(.md) { white-space: pre-wrap; }

  /* Markdown-rendered content: tight vertical rhythm inside a chat bubble. */
  .msg.md p { margin: 0; }
  .msg.md p + p,
  .msg.md p + ul, .msg.md p + ol, .msg.md p + pre, .msg.md p + blockquote,
  .msg.md ul + p, .msg.md ol + p, .msg.md pre + p, .msg.md blockquote + p,
  .msg.md h1 + *, .msg.md h2 + *, .msg.md h3 + *,
  .msg.md * + h1, .msg.md * + h2, .msg.md * + h3 { margin-top: 8px; }
  .msg.md h1, .msg.md h2, .msg.md h3 {
    font-size: 1em;
    font-weight: 600;
    color: var(--text-primary);
  }
  .msg.md ul, .msg.md ol { padding-left: 1.4em; }
  .msg.md li { margin: 2px 0; }
  .msg.md a { color: var(--accent); text-decoration: underline; }
  .msg.md a:hover { color: var(--accent-hover); }
  .msg.md code {
    background: rgba(255, 255, 255, 0.08);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 0.9em;
    color: #f8c5a0;
  }
  .msg.md pre {
    background: var(--code-bg);
    color: var(--text-primary);
    padding: 12px 14px;
    border-radius: 6px;
    overflow-x: auto;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 0.85em;
    border: 1px solid var(--border);
  }
  .msg.md pre code {
    background: transparent;
    padding: 0;
    color: inherit;
  }
  .msg.md blockquote {
    border-left: 3px solid var(--border-strong);
    padding-left: 10px;
    color: var(--text-secondary);
  }

  .msg-time {
    display: block;
    font-size: 11px;
    color: var(--text-tertiary);
    margin-bottom: 4px;
  }

  .msg.user {
    background: var(--user-msg-bg);
    border-color: rgba(138, 180, 248, 0.22);
    border-left: 3px solid var(--user-border);
  }

  .msg.agent {
    background: var(--bg-surface-2);
    border-left: 3px solid var(--agent-border);
  }

  .msg.agent .reply-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .msg.agent .reply-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--warning);
    animation: pulse 1.2s infinite;
    flex-shrink: 0;
  }
  .msg.agent .reply-label {
    font-size: 11px;
    color: var(--text-tertiary);
  }

  .msg.error {
    background: var(--error-bg);
    border-color: rgba(242, 139, 130, 0.3);
    border-left: 3px solid var(--error);
    color: var(--error);
  }

  .tool-card {
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    background: var(--bg-surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .tool-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--bg-surface-3);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }

  .tool-header:hover { background: var(--bg-elevated); }

  .tool-icon {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .tool-icon.requested { background: var(--text-tertiary); animation: pulse 1.8s infinite; }
  .tool-icon.awaiting { background: var(--warning); animation: pulse 1.6s infinite; }
  .tool-icon.running { background: var(--warning); animation: pulse 1.2s infinite; }
  .tool-icon.done    { background: var(--success); }
  .tool-icon.failed,
  .tool-icon.denied  { background: var(--error); }
  .tool-card.failed,
  .tool-card.denied  { border-left: 3px solid var(--error); }
  .tool-card.awaiting { border-left: 3px solid var(--warning); }

  /* Human-in-the-loop approval prompt. Lives directly on the card (not in the
     collapsible body) so it stays visible regardless of collapse/minimal state. */
  .tool-approval {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--warning-bg);
    border-top: 1px solid var(--border);
    font-size: 12px;
  }
  .tool-approval-prompt { color: var(--warning); flex: 1; }
  .tool-approval button {
    font: inherit;
    font-size: 12px;
    padding: 3px 12px;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--text-primary);
  }
  .tool-approval button.approve-btn { border-color: var(--accent); color: var(--accent); }
  .tool-approval button.approve-btn:hover { background: var(--accent-bg); }
  /* "Approve & don't ask again" — same accent family as Approve, but quieter (it's the
     less-common, stickier choice), so it reads as a secondary variant of approving. */
  .tool-approval button.approve-always-btn { border-color: var(--accent); color: var(--accent); opacity: 0.85; }
  .tool-approval button.approve-always-btn:hover { background: var(--accent-bg); opacity: 1; }
  .tool-approval button.deny-btn:hover { background: var(--error-bg, rgba(242,139,130,0.16)); color: var(--error); }
  .tool-approval button:disabled { opacity: 0.5; cursor: default; }
  .tool-approval-error { color: var(--error); flex-basis: 100%; font-size: 11px; }
  .tool-error-message {
    color: var(--error);
    white-space: pre-wrap;
    word-break: break-word;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .cite-ref {
    font-size: 0.7em;
    line-height: 1;
    margin: 0 1px 0 2px;
    vertical-align: super;
  }
  .cite-ref a {
    color: var(--accent);
    text-decoration: none;
    background: var(--accent-bg);
    padding: 1px 5px;
    border-radius: 3px;
  }
  .cite-ref a:hover { background: var(--accent-bg-hover); }

  /* --- Citations side panel (session-wide, deduped) --- */

  #citations-panel {
    width: 300px;
    background: var(--bg-surface-1);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }
  #citations-panel[hidden] { display: none; }

  #citations-header {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  #citations-header h2 {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }
  #citations-count {
    font-size: 11px;
    color: var(--text-secondary);
    background: var(--bg-surface-3);
    padding: 2px 8px;
    border-radius: 10px;
    min-width: 22px;
    text-align: center;
  }

  #citations-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .citation-card {
    display: flex;
    gap: 10px;
    padding: 10px;
    background: var(--bg-surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    text-decoration: none;
    color: inherit;
    animation: slideInCite 0.28s ease-out;
    transition: background 0.15s, border-color 0.15s, transform 0.15s;
    scroll-margin: 8px;
  }
  .citation-card:hover {
    background: var(--bg-surface-3);
    border-color: var(--border-strong);
  }
  .citation-card.highlight {
    background: var(--warning-bg);
    border-color: rgba(253, 214, 99, 0.4);
  }
  .citation-card .cite-num {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--accent-bg);
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .citation-card .cite-content {
    flex: 1;
    min-width: 0;
  }
  .citation-card .cite-heading {
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    line-height: 1.3;
    overflow-wrap: anywhere;
  }
  .citation-card .cite-sub {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 3px;
    line-height: 1.3;
    overflow-wrap: anywhere;
  }

  @keyframes slideInCite {
    from { opacity: 0; transform: translateX(28px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* Hover preview popover for inline citation markers. Lives at the body
     level so it can escape overflow:hidden containers; positioned in JS
     based on viewport space (above or below the trigger). */
  #cite-preview {
    position: fixed;
    z-index: 1000;
    width: 280px;
    max-width: calc(100vw - 16px);
    left: -9999px;
    top: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.14s ease;
  }
  #cite-preview.visible {
    opacity: 1;
    pointer-events: auto;
  }
  #cite-preview .citation-card {
    background: var(--bg-surface-3);
    border-color: var(--border-strong);
    box-shadow: 0 10px 28px rgba(0, 0, 0, 0.5);
    animation: none;
  }

  /* hljs theme adds its own background and padding to `code.hljs`; we
     want our outer <pre>'s background + padding to win so the highlighted
     spans sit inside the same gutter we already style. */
  .msg.md pre code.hljs,
  .thought-body.md pre code.hljs {
    background: transparent;
    padding: 0;
  }

  .thought-card {
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    background: var(--bg-surface-2);
    border: 1px dashed var(--border-strong);
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
    opacity: 0.9;
  }

  .thought-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: transparent;
    cursor: pointer;
    user-select: none;
    font-size: 12px;
    color: var(--text-secondary);
    font-style: italic;
  }
  .thought-header:hover { background: var(--bg-surface-3); }

  .thought-icon { flex-shrink: 0; font-size: 13px; }
  .thought-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 500;
  }
  .thought-time {
    font-size: 11px;
    color: var(--text-tertiary);
    flex-shrink: 0;
  }
  .thought-chevron {
    font-size: 10px;
    color: var(--text-tertiary);
    transition: transform 0.2s;
    flex-shrink: 0;
    transform: rotate(90deg);
  }
  .thought-card.collapsed .thought-chevron { transform: rotate(0deg); }

  .thought-body {
    padding: 8px 14px 10px;
    font-size: 13px;
    color: var(--text-secondary);
    border-top: 1px dashed var(--border);
    line-height: 1.55;
  }
  .thought-body p { margin: 0 0 6px; }
  .thought-body p:last-child { margin-bottom: 0; }
  .thought-body strong { color: var(--text-primary); }
  .thought-card.collapsed .thought-body { display: none; }

  .tool-name {
    font-size: 13px;
    font-weight: 600;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--text-primary);
  }

  .tool-status {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-left: auto;
    flex-shrink: 0;
  }

  .tool-chevron {
    font-size: 10px;
    color: var(--text-tertiary);
    transition: transform 0.2s;
    flex-shrink: 0;
    transform: rotate(90deg);
  }
  .tool-card.collapsed .tool-chevron { transform: rotate(0deg); }

  .tool-body {
    padding: 10px 12px;
    font-size: 12px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    border-top: 1px solid var(--border);
  }
  .tool-card.collapsed .tool-body { display: none; }

  /* Built-in tools (e.g. file_search) have no usable input/output —
     render compact, non-expandable: no chevron, no body, no hover. */
  .tool-card.minimal { border: none; background: transparent; }
  .tool-card.minimal .tool-header {
    cursor: default;
    padding: 4px 12px;
    background: transparent;
    border-bottom: none;
  }
  .tool-card.minimal .tool-header:hover { background: transparent; }
  .tool-card.minimal .tool-chevron { display: none; }
  .tool-card.minimal .tool-body { display: none; }
  .tool-card.minimal .tool-name { font-weight: 500; color: var(--text-secondary); }
  .tool-card.minimal .tool-status { font-size: 10px; }

  .tool-body label {
    display: block;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 4px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .tool-body pre {
    background: var(--code-bg);
    color: var(--text-primary);
    padding: 8px;
    border-radius: 4px;
    overflow-x: auto;
    margin-bottom: 8px;
    white-space: pre-wrap;
    word-wrap: break-word;
    line-height: 1.5;
    border: 1px solid var(--border);
  }

  #pending-queue {
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
    flex-shrink: 0;
  }
  #pending-queue:empty { display: none; }

  #pending-queue-header {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 6px 16px 4px;
  }

  .pending-item {
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    padding: 8px 16px;
    border-radius: 6px;
    background: var(--warning-bg);
    border-left: 3px solid var(--warning);
    opacity: 0.9;
    font-size: 13px;
    line-height: 1.4;
    margin-bottom: 6px;
    display: flex;
    align-items: baseline;
    gap: 8px;
    color: var(--text-primary);
  }
  .pending-item .pending-badge {
    font-size: 10px;
    background: var(--warning);
    color: #1b1b1d;
    padding: 1px 6px;
    border-radius: 3px;
    flex-shrink: 0;
    font-weight: 600;
  }

  #input-area {
    background: var(--bg-surface-1);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    gap: 8px;
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
    flex-shrink: 0;
  }

  #message-input {
    flex: 1;
    width: 100%;
    padding: 10px 14px;
    background: var(--bg-surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    /* Inherit the body font so the slash arg-hint overlay (#arg-ghost), which
       also inherits it, measures text to the exact same width as the input. */
    font-family: inherit;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  #message-input::placeholder { color: var(--text-tertiary); }
  #message-input:focus {
    border-color: var(--accent);
    background: var(--bg-surface-3);
  }
  #message-input:disabled {
    background: var(--bg-surface-1);
    color: var(--text-tertiary);
  }

  #send-btn {
    padding: 10px 20px;
    background: var(--accent);
    color: #131314;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    min-width: 80px;
  }
  #send-btn:hover { background: var(--accent-hover); }
  #send-btn:disabled {
    background: var(--bg-surface-3);
    color: var(--text-tertiary);
    cursor: not-allowed;
  }
  #send-btn.queue-mode {
    background: var(--warning);
    color: #131314;
  }
  #send-btn.queue-mode:hover { background: #ffdd80; }

  /* ----- Slash-command autocomplete -------------------------------------- */
  /* Wraps the input so the arg-hint overlay and command popup can anchor. */
  #input-wrap {
    position: relative;
    flex: 1;
    display: flex;
  }

  /* Inline ghost hint describing the expected arg, e.g. "docs | forum | all".
     Overlays the input: a transparent copy of the typed text pushes the muted
     hint to start exactly where the input text ends. Padding matches the input's
     border (1px) + padding (14px); flex centering matches its vertical centering. */
  #arg-ghost {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    padding: 0 15px;
    font-size: 14px;
    font-family: inherit;
    white-space: pre;
    overflow: hidden;
    pointer-events: none;
  }
  #arg-ghost.visible { display: flex; }
  /* In command mode the input's own text is hidden and re-rendered by the overlay
     with syntax colors; the caret stays visible. Overlay matches the input's font
     metrics (same family/size/weight) so the caret aligns with the painted text. */
  #message-input.cmd-mode { color: transparent; caret-color: var(--text-primary); }
  #arg-ghost .ov-cmd { color: var(--accent); }
  #arg-ghost .ov-arg { color: var(--text-primary); }
  #arg-ghost .ov-hint { color: var(--text-tertiary); font-style: italic; }

  /* Command picker, floating just above the input. */
  #slash-popup {
    position: absolute;
    left: 0;
    right: 0;
    bottom: calc(100% + 8px);
    padding: 4px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
    z-index: 60;
    overflow: hidden;
  }
  #slash-popup[hidden] { display: none; }
  .slash-popup-header {
    padding: 6px 10px 4px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-tertiary);
  }
  .slash-cmd {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 2px 10px;
    align-items: baseline;
    padding: 7px 10px;
    border-radius: 7px;
    cursor: pointer;
  }
  .slash-cmd-name {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
  }
  .slash-cmd-arg {
    justify-self: end;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
    color: var(--text-tertiary);
  }
  .slash-cmd-desc {
    grid-column: 1 / -1;
    font-size: 12px;
    color: var(--text-secondary);
    /* Long descriptions wrap; intentional paragraph breaks (encoded as newlines
       in the description string) render on their own lines. */
    white-space: pre-line;
    line-height: 1.45;
    overflow-wrap: anywhere;
  }
  .slash-cmd.active { background: var(--accent-bg); }
  .slash-cmd.active .slash-cmd-name { color: var(--accent-hover); }

  /* A recognized slash command, echoed in the transcript as light-blue,
     non-card text (the affordance that the UI parsed it as a command). Mono +
     accent, but deliberately NOT link-styled: no underline, default cursor. */
  .slash-msg {
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    padding: 0 16px;
    text-align: right;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px;
    cursor: default;
  }
  .slash-msg-cmd { color: var(--accent); font-weight: 600; }
  .slash-msg-arg { color: var(--accent); opacity: 0.6; }

  /* A system acknowledgement (e.g. a slash-command result) — clearly mechanical,
     not a model reply: muted, italic, no card. */
  .system-reply {
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    padding: 0 16px;
    color: var(--text-tertiary);
    font-style: italic;
    font-size: 13px;
    line-height: 1.5;
  }
  .system-reply p { margin: 0; }
  .system-reply strong { color: var(--text-secondary); font-weight: 600; }

  /* ----- Model-activity indicator ---------------------------------------- */
  /* A pulsing / occasionally-spinning Temporal logo + elapsed timer, shown just
     above the input ONLY while the model itself is running. Reassures the user the
     agent is doing something during otherwise-quiet stretches. */
  #model-activity {
    display: flex;
    align-items: center;
    gap: 11px;
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
    padding: 7px 20px 3px;
    font-size: 14px;
    color: var(--text-secondary);
  }
  #model-activity[hidden] { display: none; }
  .tlogo-img { display: block; width: 30px; height: 30px; }
  /* Scale-pulse and rotate-spin live on separate wrappers so the two transforms
     never clobber each other. Both cadences are re-randomized from JS. */
  .tlogo-pulse {
    display: inline-flex;
    animation: tlogo-pulse var(--pulse-dur, 1.1s) ease-in-out infinite;
    filter: drop-shadow(0 0 5px rgba(138, 180, 248, 0.45));
  }
  .tlogo-spin { display: inline-flex; }
  .tlogo-spin.spin {
    animation: tlogo-spin var(--spin-dur, 0.9s) cubic-bezier(0.45, 0, 0.45, 1) 1;
  }
  @keyframes tlogo-pulse {
    0%, 100% { transform: scale(0.9); opacity: 0.75; }
    50%      { transform: scale(1.12); opacity: 1; }
  }
  @keyframes tlogo-spin {
    to { transform: rotate(calc(var(--spin-turns, 1) * 360deg)); }
  }
  .model-activity-label { font-style: italic; letter-spacing: 0.02em; }
  #model-timer {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px;
    color: var(--text-tertiary);
    font-variant-numeric: tabular-nums;
  }
  @media (prefers-reduced-motion: reduce) {
    .tlogo-pulse { animation: none; }
    .tlogo-spin.spin { animation: none; }
  }

  /* Custom scrollbars to fit the dark theme. */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.08);
    border-radius: 8px;
    border: 2px solid transparent;
    background-clip: padding-box;
  }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.18); background-clip: padding-box; border: 2px solid transparent; }
</style>
