# Registry of agents the ReAct agent example UI can launch.
#
# The shared FastAPI server (examples/app.py) reads this file and passes the parsed
# registry into the packaged SessionManagerWorkflow as its workflow init arg. The
# manager then serves it back over the `available_agents` query, so the app server
# can expose it at /api/agents without hardcoding the agent list.
#
# To expose a new agent: register its @workflow.defn on a worker, then add a
# [[agents]] entry here.

[[agents]]
key = "react-agent"
workflow_type = "ReactAgent"
task_queue = "react-agent"
label = "ReAct Agent"
description = """
A ReAct-style agent on the OpenAI Agents SDK: it reasons, then acts by chaining real tools,
looping on each result until it can answer. Chat in plain text and it finds the weather for a
named city (coordinates -> weather) or your current location (IP -> location -> weather), and
pulls Formula 1 data over an MCP server — chaining tools as needed and replying in prose. Shows
the harness OpenAI streaming path with a multi-tool agentic loop end to end — model call →
streaming activity → live turn stream (reply_delta / tool_requested / tool_start / tool_end /
model_interaction_*)."""
