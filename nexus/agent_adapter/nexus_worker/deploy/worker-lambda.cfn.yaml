AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Agent-adapter Nexus worker (cmd/worker-lambda) as a zip-based Go Lambda on the
  provided.al2023 runtime. This is a Nexus-only Temporal Serverless Worker: Temporal
  Cloud invokes it when Nexus tasks arrive on its task queue (the target of the
  support-agent-nexus). The agent workflow itself runs on the Python worker. See
  deploy/README-lambda.md for the end-to-end runbook.

Parameters:
  ArtifactBucket:
    Type: String
    Description: S3 bucket holding the worker-lambda.zip artifact.
  ArtifactKey:
    Type: String
    Description: >-
      S3 key of the zip artifact. Key it by git SHA (e.g. worker-lambda/<sha>.zip)
      so a stack update actually picks up new code — CloudFormation only
      re-deploys when the S3 key or object version changes.

  FunctionName:
    Type: String
    Default: nexus-agent-worker

  TemporalAddress:
    Type: String
    Description: Temporal Cloud gRPC endpoint, e.g. <region>.aws.api.temporal.io:7233
  TemporalNamespace:
    Type: String
    Description: >-
      Temporal namespace where the agent workflow runs AND this worker polls for
      Nexus tasks. Must match the support-agent-nexus target namespace.
  TemporalTaskQueue:
    Type: String
    Default: nexus-agent-go
    Description: >-
      Nexus task queue this worker listens on. Must match the support-agent-nexus
      target task queue. (Maps to the always-on worker's NEXUS_AGENT_TASK_QUEUE.)
  WorkerDeploymentName:
    Type: String
    Default: nexus-agent-go
    Description: Must match the Worker Deployment name registered in Temporal Cloud.
  WorkerBuildId:
    Type: String
    Description: >-
      Build ID for Worker Deployment Versioning. MUST match both the artifact
      (use the git SHA) and the build-id registered via
      `temporal worker deployment create-version`.

  AgentWorkflowName:
    Type: String
    Description: >-
      Registered Temporal workflow type name of the agent workflow (the Python
      worker's workflow). Required — the worker exits at startup if unset.
  AgentTaskQueue:
    Type: String
    Default: agent
    Description: Task queue the agent workflow runs on (the Python worker's queue).
  AgentWorkflowIdPrefix:
    Type: String
    Default: agent-
    Description: Prefix prepended to the session ID to form the agent workflow ID.

  TemporalApiKeySecretArn:
    Type: String
    Description: ARN of the Secrets Manager secret (plain string) holding the Temporal Cloud API key.
  SecretsKmsKeyArn:
    Type: String
    Default: ''
    Description: >-
      Optional. ARN of the customer-managed KMS key that encrypts the API-key secret.
      Leave empty if it uses the default aws/secretsmanager key. If a CMK is used,
      GetSecretValue also needs kms:Decrypt on it — set this so the execution role
      gets that permission (otherwise the fetch fails at runtime with AccessDenied).

  MemorySize:
    Type: Number
    Default: 256
    Description: >-
      Nexus operations are short (workflow update/query round-trips), so this can be
      modest.
  Timeout:
    Type: Number
    Default: 60
    Description: >-
      Seconds. Nexus operations return quickly, but keep the ~7s worker shutdown
      buffer in mind; 60s is a safe minimum.
  LogRetentionDays:
    Type: Number
    Default: 14

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label: {default: 'Artifact'}
        Parameters: [ArtifactBucket, ArtifactKey, FunctionName]
      - Label: {default: 'Temporal'}
        Parameters: [TemporalAddress, TemporalNamespace, TemporalTaskQueue, WorkerDeploymentName, WorkerBuildId]
      - Label: {default: 'Agent'}
        Parameters: [AgentWorkflowName, AgentTaskQueue, AgentWorkflowIdPrefix]
      - Label: {default: 'Secrets'}
        Parameters: [TemporalApiKeySecretArn, SecretsKmsKeyArn]
      - Label: {default: 'Function tuning'}
        Parameters: [MemorySize, Timeout, LogRetentionDays]

Conditions:
  HasKmsKey: !Not [!Equals [!Ref SecretsKmsKeyArn, '']]

Resources:
  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: lambda.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: read-secrets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource:
                  - !Ref TemporalApiKeySecretArn
              # kms:Decrypt is required only when the secret uses a customer-managed KMS key.
              - !If
                - HasKmsKey
                - Effect: Allow
                  Action: kms:Decrypt
                  Resource: !Ref SecretsKmsKeyArn
                - !Ref AWS::NoValue

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${FunctionName}'
      RetentionInDays: !Ref LogRetentionDays

  WorkerFunction:
    Type: AWS::Lambda::Function
    DependsOn: LogGroup
    Properties:
      FunctionName: !Ref FunctionName
      Description: Agent-adapter Nexus-only Temporal serverless worker.
      Runtime: provided.al2023
      Handler: bootstrap
      Architectures: [arm64] # MUST match LAMBDA_ARCH in the Makefile's build-lambda target.
      Code:
        S3Bucket: !Ref ArtifactBucket
        S3Key: !Ref ArtifactKey
      Role: !GetAtt ExecutionRole.Arn
      MemorySize: !Ref MemorySize
      Timeout: !Ref Timeout
      Environment:
        Variables:
          TEMPORAL_ADDRESS: !Ref TemporalAddress
          TEMPORAL_NAMESPACE: !Ref TemporalNamespace
          TEMPORAL_TASK_QUEUE: !Ref TemporalTaskQueue
          WORKER_DEPLOYMENT_NAME: !Ref WorkerDeploymentName
          WORKER_BUILD_ID: !Ref WorkerBuildId
          AGENT_WORKFLOW_NAME: !Ref AgentWorkflowName
          AGENT_TASK_QUEUE: !Ref AgentTaskQueue
          AGENT_WORKFLOW_ID_PREFIX: !Ref AgentWorkflowIdPrefix
          TEMPORAL_API_KEY_SECRET_ARN: !Ref TemporalApiKeySecretArn

Outputs:
  FunctionArn:
    Description: Function ARN — grant the Temporal Cloud invoke role permission to invoke it, and pass to `temporal worker deployment create-version --aws-lambda-function-arn`.
    Value: !GetAtt WorkerFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-FunctionArn'
  FunctionName:
    Value: !Ref FunctionName
